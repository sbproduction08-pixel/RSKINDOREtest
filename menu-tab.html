<style>
    /* Design & Header */
    .menu-header { color: #D4AF37; font-family: 'Marcellus', serif; text-align: center; border-bottom: 1px solid #D4AF37; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
    .search-box { width:100%; padding:15px; border-radius:30px; border:1px solid #D4AF37; background:#1a1a1a; color:#fff; margin-bottom:20px; outline:none; box-sizing:border-box; }

    /* Sections & Items */
    .cat-title { color: #D4AF37; font-size: 16px; font-weight: bold; text-transform: uppercase; margin: 25px 0 10px; display: block; border-left: 4px solid #D4AF37; padding-left: 10px; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .item-card { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
    .item-name { font-size: 12px; font-weight: bold; color: #fff; min-height: 30px; }
    .price-tag { color: #D4AF37; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
    .add-btn { background: #fff; color: #000; border: none; padding: 10px; border-radius: 5px; font-size: 10px; font-weight: 800; cursor: pointer; width: 100%; }

    /* Floating Cart Button (Right Side) */
    #rskCartBtn { 
        position: fixed; bottom: 100px; right: 20px; 
        background: #D4AF37; color: #000; width: 65px; height: 65px; 
        border-radius: 15px; display: flex; flex-direction: column; 
        align-items: center; justify-content: center; 
        box-shadow: 0 5px 20px #000; z-index: 999; border: 2px solid #fff;
    }
    .cart-badge { position: absolute; top: -10px; left: -10px; background: #fff; color: #000; padding: 2px 8px; border-radius: 50%; font-weight: 900; border: 1px solid #000; }

    /* Cart Modal Overlay */
    #cartOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
    .cart-modal { background: #1a1a1a; border: 2px solid #D4AF37; border-radius: 20px; padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .cart-item-row { display: flex; justify-content: space-between; color: #fff; border-bottom: 1px solid #333; padding: 10px 0; font-size: 14px; }
    
    .btn-action { padding: 15px; border-radius: 10px; border: none; font-weight: 900; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px; }
    .confirm-btn { background: #D4AF37; color: #000; }
    .cancel-btn { background: #ff4444; color: #fff; }
</style>

<div class="menu-tab">
    <h2 class="menu-header">RSK ROYAL MENU</h2>
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Dish search karein..." onkeyup="searchDish()">

    <div id="menuContent">
        <span class="cat-title">👑 Royal Combos</span>
        <div class="menu-grid">
            <div class="dish" data-name="tawa chicken paratha combo"><div class="item-card"><div class="item-name">Tawa Chicken + Paratha</div><div class="price-tag">₹259</div><button class="add-btn" onclick="addToRSKCart('Tawa Chicken Combo', 259)">+ Add</button></div></div>
            <div class="dish" data-name="paneer bhurji paratha combo"><div class="item-card"><div class="item-name">Paneer Bhurji + Paratha</div><div class="price-tag">₹209</div><button class="add-btn" onclick="addToRSKCart('Paneer Bhurji Combo', 209)">+ Add</button></div></div>
        </div>

        <span class="cat-title">🍗 Non-Veg Specials</span>
        <div class="menu-grid">
            <div class="dish" data-name="fry chicken half"><div class="item-card"><div class="item-name">Fry Chicken (H)</div><div class="price-tag">₹149</div><button class="add-btn" onclick="addToRSKCart('Fry Chicken (H)', 149)">+ Add</button></div></div>
        </div>

        <span class="cat-title">🌿 Veg Delights</span>
        <div class="menu-grid">
            <div class="dish" data-name="kastoori paneer"><div class="item-card"><div class="item-name">Kastoori Paneer</div><div class="price-tag">₹179</div><button class="add-btn" onclick="addToRSKCart('Kastoori Paneer', 179)">+ Add</button></div></div>
        </div>

        </div>

    <div id="rskCartBtn" onclick="handleCartClick()">
        <span class="cart-badge" id="cartBadge">0</span>
        <span>🛒</span>
        <span style="font-size: 10px; font-weight: bold;" id="cartTotalText">₹0</span>
    </div>

    <div id="cartOverlay">
        <div class="cart-modal">
            <h2 style="color:#D4AF37;">Review Order</h2>
            <div id="cartList" style="flex:1; overflow-y:auto; margin:15px 0;"></div>
            <div id="finalBill" style="color:#D4AF37; font-size:20px; font-weight:900; text-align:right; border-top:1px solid #D4AF37; padding-top:10px;">Total: ₹0</div>
            
            <button class="btn-action confirm-btn" onclick="placeRSKOrder('Confirmed')">🚀 ORDER (GET TOKEN)</button>
            <button class="btn-action cancel-btn" onclick="placeRSKOrder('Cancelled')">❌ CANCEL ORDER</button>
            <button class="btn-action" style="background:#444; color:#fff;" onclick="document.getElementById('cartOverlay').style.display='none'">BACK</button>
        </div>
    </div>
</div>

<script>
    var rsk_items = [];
    var webapp_url = "https://script.google.com/macros/s/AKfycbzBPKkzFJT5Pqmn-_88ziR1nwcnoJWeXbIPjZGD4P9TYgTr45pcTt2yPxrYwTHe4HFe/exec";
    
    // Yahan check hoga user login hai ya nahi
    var userStatus = false; 

    function addToRSKCart(name, price) {
        rsk_items.push({n: name, p: price});
        var total = 0;
        for(var i=0; i<rsk_items.length; i++) { total += rsk_items[i].p; }
        document.getElementById('cartBadge').innerText = rsk_items.length;
        document.getElementById('cartTotalText').innerText = "₹" + total;
    }

    function searchDish() {
        var q = document.getElementById('searchInput').value.toLowerCase();
        var dishes = document.getElementsByClassName('dish');
        for(var i=0; i<dishes.length; i++) {
            var n = dishes[i].getAttribute('data-name').toLowerCase();
            dishes[i].style.display = n.includes(q) ? "block" : "none";
        }
    }

    function handleCartClick() {
        if(rsk_items.length === 0) { alert("Pehle kuch order toh kijiye!"); return; }
        
        if(!userStatus) {
            alert("Please Login first to view Cart!");
            if(window.showTab) window.showTab('safar');
            return;
        }

        document.getElementById('cartOverlay').style.display = 'flex';
        var listHTML = ""; var total = 0;
        for(var i=0; i<rsk_items.length; i++) {
            listHTML += `<div class="cart-item-row"><span>${rsk_items[i].n}</span><span>₹${rsk_items[i].p}</span></div>`;
            total += rsk_items[i].p;
        }
        document.getElementById('cartList').innerHTML = listHTML;
        document.getElementById('finalBill').innerText = "Total Bill: ₹" + total;
    }

    function placeRSKOrder(status) {
        var itemsStr = ""; var total = 0;
        for(var i=0; i<rsk_items.length; i++) { itemsStr += rsk_items[i].n + ", "; total += rsk_items[i].p; }
        
        var tokenID = "RSK-" + Math.floor(100 + Math.random() * 900);

        fetch(webapp_url, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({status: status, customer: "Urvashi", items: itemsStr, total: total, token: tokenID})
        });

        if(status === 'Confirmed') {
            window.open("https://wa.me/7489999890?text=*TOKEN: " + tokenID + "*%0A*Order:* " + itemsStr + "%0A*Total:* ₹" + total, "_blank");
        } else {
            window.open("https://wa.me/7489999890?text=Order Cancelled", "_blank");
        }

        rsk_items = []; 
        document.getElementById('cartBadge').innerText = "0";
        document.getElementById('cartTotalText').innerText = "₹0";
        document.getElementById('cartOverlay').style.display = 'none';
    }
</script>
