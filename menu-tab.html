<style>
    /* Full Width Image - Badi Image ke liye */
    .full-banner {
        width: 100vw;
        margin-left: calc(-50vw + 50%);
        height: 220px;
        position: relative;
        overflow: hidden;
        border-bottom: 2px solid var(--gold);
        margin-bottom: 20px;
    }
    .full-banner img { width: 100%; height: 100%; object-fit: cover; }

    /* Search & Filters */
    .menu-controls { padding: 10px; position: sticky; top: 0; background: #000; z-index: 10; }
    .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
    .f-btn { 
        background: transparent; border: 1px solid var(--gold); color: #fff; 
        padding: 6px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; white-space: nowrap;
    }
    .f-btn:active { background: var(--gold); color: #000; }

    /* Menu Grid */
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; padding-bottom: 100px; }
    .item-card { 
        background: rgba(255,255,255,0.05); border: 1px solid #222; border-radius: 12px; 
        padding: 12px; transition: 0.3s; position: relative; display: flex; flex-direction: column;
    }
    .item-card:hover { transform: translateY(-5px); border-color: var(--gold); }

    .price-tag { color: var(--gold); font-weight: bold; font-size: 15px; margin: 8px 0; }
    
    .add-btn { 
        background: var(--gold); color: #000; border: none; border-radius: 6px; 
        padding: 10px; font-size: 11px; font-weight: bold; cursor: pointer; width: 100%; 
    }

    /* Floating Place Order Button */
    .checkout-footer {
        position: fixed; bottom: 85px; left: 0; width: 100%;
        display: flex; justify-content: center; z-index: 100;
    }
    .view-cart-btn {
        background: #fff; color: #000; padding: 15px 40px; border-radius: 50px;
        font-weight: 900; border: none; box-shadow: 0 10px 30px rgba(212,175,55,0.4);
        cursor: pointer; letter-spacing: 1px;
    }
</style>

<div class="menu-tab-content">
    <div class="full-banner">
        <img src="ROYAL COMBO.jpg" alt="Royal Combo">
        <div style="position:absolute; bottom:0; left:0; width:100%; background:linear-gradient(transparent, #000); padding:20px;">
            <span style="color:var(--gold); font-weight:bold; letter-spacing:2px;">👑 ROYAL SELECTION</span>
        </div>
    </div>

    <div class="menu-controls">
        <input type="text" id="menuSearch" class="search-box" placeholder="Khao kya khaoge?..." onkeyup="filterMenu()" style="width:100%; padding:12px; border-radius:25px; border:1px solid var(--gold); background:#1a1a1a; color:#fff; outline:none; box-sizing:border-box;">
        
        <div class="filter-bar">
            <button class="f-btn" onclick="filterItems('all')">SAB KUCH</button>
            <button class="f-btn" onclick="filterItems('nonveg')">🍗 NON-VEG</button>
            <button class="f-btn" onclick="filterItems('veg')">🥬 VEG</button>
        </div>
    </div>

    <div class="menu-grid">
        <div class="item-card nonveg">
            <div style="font-size:12px; font-weight:bold; color:#fff;">Tawa Chicken + Paratha</div>
            <div class="price-tag">₹259</div>
            <button class="add-btn" onclick="addToCart('Tawa Chicken Combo', 259)">🛒 ADD TO CART</button>
        </div>

        <div class="item-card veg">
            <div style="font-size:12px; font-weight:bold; color:#fff;">Kastoori Paneer</div>
            <div class="price-tag">₹179</div>
            <button class="add-btn" onclick="addToCart('Kastoori Paneer', 179)">🛒 ADD TO CART</button>
        </div>
        
        </div>

    <div class="checkout-footer">
        <button class="view-cart-btn" onclick="checkout()">
            🚀 PLACE ORDER & GET TOKEN
        </button>
    </div>
</div>
