<style>
    .menu-header { color: var(--gold); font-family: 'Marcellus', serif; text-align: center; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
    .search-box { width:100%; padding:15px; border-radius:30px; border:1px solid var(--gold); background:#1a1a1a; color:#fff; margin-bottom:10px; outline:none; box-sizing:border-box; font-size: 14px; }
    .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; scrollbar-width: none; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .f-btn { background: rgba(255,255,255,0.05); border: 1px solid #444; color: #ccc; padding: 8px 18px; border-radius: 20px; font-size: 11px; white-space: nowrap; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .f-btn.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

    .img-frame { width: 100%; height: 130px; border-radius: 12px; overflow: hidden; border: 1px solid var(--gold); margin: 30px 0 15px; }
    .section-banner { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    .cat-title { color: var(--gold); font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }

    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .item-card { background: rgba(255,255,255,0.05); border-left: 3px solid var(--gold); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; }
    .item-name { font-size: 12px; font-weight: bold; color: #fff; margin-bottom: 5px; min-height: 32px; }
    .price-tag { color: var(--gold); font-size: 11px; font-weight: bold; margin-bottom: 10px; }

    /* Counter Styling */
    .counter-row { display: flex; align-items: center; justify-content: space-between; background: var(--gold); border-radius: 6px; padding: 2px; margin-top: auto; }
    .count-btn { background: none; border: none; color: #000; font-size: 18px; font-weight: bold; width: 30px; cursor: pointer; }
    .add-initial-btn { background: #fff; color: #000; border: none; padding: 10px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; width: 100%; }

    /* Floating Cart */
    .cart-bar { position: fixed; bottom: 85px; left: 5%; width: 90%; background: var(--gold); color: #000; padding: 15px; border-radius: 50px; display: none; justify-content: space-between; z-index: 3000; box-shadow: 0 5px 20px #000; cursor: pointer; }
    .cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 4000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
</style>

<div class="menu-tab">
    <h2 class="menu-header">ROYAL MENU</h2>
    <input type="text" id="menuSearch" class="search-box" placeholder="Search dish..." onkeyup="runMasterFilter()">
    
    <div class="filter-scroll">
        <button class="f-btn active" onclick="setCategory('all', this)">All</button>
        <button class="f-btn" onclick="setCategory('combo', this)">Combos</button>
        <button class="f-btn" onclick="setCategory('nonveg', this)">Non-Veg</button>
        <button class="f-btn" onclick="setCategory('veg', this)">Veg</button>
        <button class="f-btn" onclick="setCategory('maggie', this)">Maggie</button>
        <button class="f-btn" onclick="setCategory('egg', this)">Egg Station</button>
        <button class="f-btn" onclick="setCategory('rice', this)">Rice & Breads</button>
    </div>

    <div class="section-group" id="sec-combo">
        <div class="img-frame"><img src="ROYAL COMBO.jpg" class="section-banner"></div>
        <span class="cat-title">👑 Royal Combos</span>
        <div class="menu-grid">
            <div class="item-card dish-item" data-name="tawa chicken paratha combo">
                <div class="item-name">Tawa Chicken + Paratha</div><div class="price-tag">₹259</div>
                <div id="btn-TawaChickenParatha"><button class="add-initial-btn" onclick="changeQty('Tawa Chicken Paratha', 259, 1)">+ Add</button></div>
            </div>
            </div>
    </div>

    <div class="section-group" id="sec-nonveg">
        <div class="img-frame"><img src="https://images.unsplash.com/photo-1606787366850-de6330128bfc?auto=format&fit=crop&w=1000&q=80" class="section-banner"></div>
        <span class="cat-title">🍗 Non-Veg Specials</span>
        <div class="menu-grid">
            <div class="item-card dish-item" data-name="rsk special chicken half">
                <div class="item-name">RSK Special Chicken (Half)</div><div class="price-tag">₹219</div>
                <div id="btn-RSKChickenHalf"><button class="add-initial-btn" onclick="changeQty('RSK Chicken Half', 219, 1)">+ Add</button></div>
            </div>
            <div class="item-card dish-item" data-name="rsk special chicken full">
                <div class="item-name">RSK Special Chicken (Full)</div><div class="price-tag">₹399</div>
                <div id="btn-RSKChickenFull"><button class="add-initial-btn" onclick="changeQty('RSK Chicken Full', 399, 1)">+ Add</button></div>
            </div>
        </div>
    </div>

    <div class="section-group" id="sec-rice">
        <div class="img-frame"><img src="https://images.pexels.com/photos/3926124/pexels-photo-3926124.jpeg" class="section-banner"></div>
        <span class="cat-title">🍚 Rice & Breads</span>
        <div class="menu-grid">
            <div class="item-card dish-item" data-name="chicken fried rice"><div class="item-name">Chicken Fried Rice</div><div class="price-tag">₹149</div><div id="btn-ChickenFriedRice"><button class="add-initial-btn" onclick="changeQty('Chicken Fried Rice', 149, 1)">+ Add</button></div></div>
        </div>
    </div>

    <div class="cart-bar" id="cartBar" onclick="toggleCartModal(true)">
        <div id="cartSummary" style="font-weight:900;">0 Items | ₹0</div>
        <div style="font-weight:900;">VIEW CART 🛒</div>
    </div>

    <div class="cart-modal" id="cartModal">
        <h2 style="color:var(--gold); font-family:'Marcellus';">Royal Cart</h2>
        <div id="modalItemsList" style="flex:1; overflow-y:auto; margin:20px 0; color:#fff;"></div>
        <div id="modalTotal" style="color:var(--gold); font-size:20px; font-weight:bold; margin-bottom:20px;">Total: ₹0</div>
        <button onclick="cancelOrder()" style="background:#ff4444; color:#fff; border:none; padding:15px; border-radius:8px; width:100%; margin-bottom:10px; font-weight:bold;">❌ CANCEL ORDER</button>
        <button onclick="confirmOrder()" style="background:var(--gold); color:#000; border:none; padding:18px; border-radius:8px; width:100%; font-weight:900;">🚀 PLACE ORDER (WhatsApp)</button>
        <button onclick="toggleCartModal(false)" style="background:#333; color:#fff; border:none; padding:10px; border-radius:8px; width:100%; margin-top:10px;">CLOSE</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzBPKkzFJT5Pqmn-_88ziR1nwcnoJWeXbIPjZGD4P9TYgTr45pcTt2yPxrYwTHe4HFe/exec";
    let cart = {};
    let activeCategory = 'all';

    function changeQty(name, price, delta) {
        if (!cart[name]) cart[name] = { price: price, qty: 0 };
        cart[name].qty += delta;
        if (cart[name].qty <= 0) delete cart[name];
        updateUI(name, price);
    }

    function updateUI(name, price) {
        // Remove spaces for ID matching
        const cleanName = name.replace(/\s+/g, '');
        const container = document.getElementById("btn-" + cleanName);
        if(!container) return;
        
        const qty = cart[name] ? cart[name].qty : 0;
        if (qty > 0) {
            container.innerHTML = `
                <div class="counter-row">
                    <button class="count-btn" onclick="changeQty('${name}', ${price}, -1)">-</button>
                    <span style="color:#000; font-weight:800;">${qty}</span>
                    <button class="count-btn" onclick="changeQty('${name}', ${price}, 1)">+</button>
                </div>`;
        } else {
            container.innerHTML = `<button class="add-initial-btn" onclick="changeQty('${name}', ${price}, 1)">+ Add</button>`;
        }
        updateCartBar();
    }

    function updateCartBar() {
        let total = 0, count = 0;
        for (let name in cart) { 
            total += cart[name].price * cart[name].qty; 
            count += cart[name].qty; 
        }
        const bar = document.getElementById('cartBar');
        bar.style.display = count > 0 ? 'flex' : 'none';
        document.getElementById('cartSummary').innerText = `${count} Items | ₹${total}`;
    }

    function toggleCartModal(show) {
        document.getElementById('cartModal').style.display = show ? 'flex' : 'none';
        if (show) {
            let list = document.getElementById('modalItemsList'), h = '', t = 0;
            for (let name in cart) { 
                let s = cart[name].price * cart[name].qty; 
                t += s; 
                h += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${name} x ${cart[name].qty}</span><span>₹${s}</span></div>`; 
            }
            list.innerHTML = h || 'Cart is empty';
            document.getElementById('modalTotal').innerText = `Total: ₹${t}`;
        }
    }

    function sendToSheet(status) {
        let itms = ""; let total = 0;
        for (let name in cart) { itms += `${name} (${cart[name].qty}), `; total += cart[name].price * cart[name].qty; }
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ status: status, customer: "Urvashi", items: itms, total: total }) });
    }

    function confirmOrder() {
        sendToSheet("Confirmed");
        let msg = "Pranam RSK! Order:%0A";
        for (let name in cart) msg += `- ${name} (${cart[name].qty})%0A`;
        window.open(`https://wa.me/7489999890?text=${msg}`, '_blank');
    }

    function cancelOrder() {
        if(confirm("Cancel order?")) {
            sendToSheet("Cancelled");
            window.open(`https://wa.me/7489999890?text=Order%20Cancelled`, '_blank');
            cart = {}; location.reload();
        }
    }

    function setCategory(cat, btn) {
        activeCategory = cat;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        runMasterFilter();
    }

    function runMasterFilter() {
        let query = document.getElementById('menuSearch').value.toLowerCase();
        document.querySelectorAll('.section-group').forEach(sec => {
            let secID = sec.id.replace('sec-', '');
            let items = sec.querySelectorAll('.dish-item');
            let hasVisible = false;
            items.forEach(i => {
                let m = i.getAttribute('data-name').toLowerCase().includes(query) && (activeCategory === 'all' || secID === activeCategory);
                i.style.display = m ? "flex" : "none";
                if(m) hasVisible = true;
            });
            sec.style.display = hasVisible ? "block" : "none";
        });
    }
</script>
