<style>
    .menu-header { color: var(--gold); font-family: 'Marcellus', serif; text-align: center; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; }
    
    /* --- ROYAL COMBO: RIGHT SIDE IMAGE --- */
    .royal-combo-box { 
        display: flex; 
        flex-direction: row; /* Image Right mein karne ke liye nichli line dekhein */
        background: linear-gradient(to left, rgba(212, 175, 55, 0.2), rgba(0,0,0,0.4)); 
        border: 1px solid var(--gold); border-radius: 12px; overflow: hidden;
        margin-bottom: 25px; min-height: 140px;
    }
    .combo-details { width: 60%; padding: 15px; display: flex; flex-direction: column; justify-content: center; }
    .combo-img-side { width: 40%; object-fit: cover; border-left: 1px solid var(--gold); }
    
    .combo-tag { color: var(--gold); font-size: 9px; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 1px; }
    .combo-title { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 8px; font-family: 'Marcellus', serif; line-height: 1.2; }

    /* --- SECTION HEADERS WITH HIGHLIGHTS --- */
    .section-header { 
        display: flex; align-items: center; gap: 12px; 
        margin: 35px 0 15px; padding-bottom: 8px;
        border-bottom: 1px solid rgba(212,175,55,0.15);
    }
    .section-icon { width: 45px; height: 45px; border-radius: 50%; border: 1.5px solid var(--gold); object-fit: cover; box-shadow: 0 0 10px rgba(212,175,55,0.2); }
    .cat-title { color: var(--gold); font-size: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; }

    /* --- GRID & CARDS --- */
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 20px; }
    .item-card { 
        background: rgba(255,255,255,0.03); border-left: 3px solid var(--gold); 
        border-radius: 6px; padding: 12px; display: flex; flex-direction: column; 
    }
    .item-name { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 6px; min-height: 30px; line-height: 1.3; }
    .price { color: var(--gold); font-size: 13px; font-weight: 800; margin-bottom: 12px; }
    .add-btn { background: #fff; color: #000; border: none; padding: 7px; border-radius: 4px; font-size: 10px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
    .add-btn:active { background: var(--gold); transform: scale(0.95); }

    /* Floating Order Button */
    .checkout-wrap { position: fixed; bottom: 85px; left: 0; width: 100%; display: none; justify-content: center; z-index: 2000; }
    .place-order-btn { background: var(--gold); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; box-shadow: 0 5px 25px #000; cursor: pointer; font-size: 14px; letter-spacing: 1px; }
</style>
