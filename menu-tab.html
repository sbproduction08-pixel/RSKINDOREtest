<script>
(function() {
function renderMenu() {
var area = document.getElementById('dynamic-menu-render');
if (!area || !window.menuData) {
setTimeout(renderMenu, 100);
return;
}
var html = "";
window.menuData.forEach(function(sec) {
html += '<div style="margin-bottom:30px;">';
html += '<img src="' + sec.sectionPhoto + '" style="width:100%; border-radius:12px; margin-bottom:15px;" onerror="this.style.display=&#39;none&#39;">';
html += '<div style="color:#D4AF37; font-weight:bold; border-left:4px solid #D4AF37; padding-left:12px; margin-bottom:15px; text-transform:uppercase;">' + sec.sectionName + '</div>';
html += '<div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">';
sec.items.forEach(function(it) {
html += '<div style="background:rgba(255,255,255,0.05); border:1px solid #333; border-radius:12px; padding:12px; display:flex; flex-direction:column; justify-content:space-between;">';
html += '<div style="color:#fff; font-size:13px;">' + it.name + '</div>';
if (it.type === "single") {
html += '<div style="color:#D4AF37; font-weight:bold; margin:8px 0;">₹' + it.price + '</div>';
html += '<button onclick="window.addToCart(&#39;' + it.name + '&#39;,' + it.price + ')" style="background:#D4AF37; color:#000; border:none; padding:10px; border-radius:6px; font-weight:800; cursor:pointer;">+ ADD</button>';
} else {
html += '<div style="color:#D4AF37; font-size:11px; margin:8px 0;">H: ₹' + it.halfPrice + ' | F: ₹' + it.fullPrice + '</div>';
html += '<button onclick="window.addToCart(&#39;' + it.name + ' (H)&#39;,' + it.halfPrice + ')" style="background:#f0f0f0; border:none; padding:8px; border-radius:6px; margin-bottom:5px; font-weight:700; cursor:pointer;">HALF</button>';
html += '<button onclick="window.addToCart(&#39;' + it.name + ' (F)&#39;,' + it.fullPrice + ')" style="background:#D4AF37; border:none; padding:8px; border-radius:6px; font-weight:700; cursor:pointer;">FULL</button>';
}
html += '</div>';
});
html += '</div></div>';
});
area.innerHTML = html;
}
renderMenu();
})();

</script>
