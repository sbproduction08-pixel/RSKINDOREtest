<div class="admin-panel-wrapper" style="padding-bottom: 50px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
        <div style="background: linear-gradient(45deg, #af8d19, #f1d36d); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: #3a0d0d; font-weight: 800;">Total Tokens Today</div>
            <div id="admin-total-orders" style="font-size: 26px; font-weight: bold; color: #000;">0</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: var(--gold); font-weight: 800;">Estimated Sale</div>
            <div style="font-size: 26px; font-weight: bold; color: var(--gold);">₹<span id="admin-total-sale">0</span></div>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="font-family: 'Marcellus', serif; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 10px; margin: 0; font-size: 16px;">Live Kitchen Feed</h3>
        <button onclick="refreshAdminData()" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 10px; padding: 4px 10px; border-radius: 4px;">🔄 Refresh</button>
    </div>
    
    <div id="admin-orders-list" style="display: flex; flex-direction: column; gap: 20px;">
        <div style="text-align: center; padding: 40px; color: #555;">👑 Loading Royal Data...</div>
    </div>
</div>

<audio id="kitchenBell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>

<style>
    .order-card {
        background: rgba(255,255,255,0.03);
        border: 2px solid rgba(212,175,55,0.25); /* Border wapas aa gaya */
        padding: 18px;
        border-radius: 15px;
        position: relative;
        margin-bottom: 5px;
    }
    .status-badge {
        font-size: 9px; padding: 4px 10px; border-radius: 50px; text-transform: uppercase; font-weight: 800;
        position: absolute; top: 15px; right: 15px;
    }
    .status-pending { background: #af8d19; color: #000; }
    .status-cancelled { background: #3a0d0d; color: #ff4444; border: 1px solid #ff4444; }
    .status-done { background: #1a3a1d; color: #25D366; border: 1px solid #25D366; }
    .order-time { font-size: 10px; color: #888; margin-top: 5px; font-weight: bold; }
    .cust-info { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; display: block; }
    .cust-phone { font-size: 11px; color: var(--gold); margin-bottom: 8px; display: block; }
</style>

<script>
    const adminBridge = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';
    let lastKnownToken = parseInt(localStorage.getItem('lastProcessedToken')) || 0;
    const bell = document.getElementById('kitchenBell');

    function refreshAdminData() {
        const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
        const script = document.createElement('script');
        script.id = 'jsonp-temp-script';
        window[callbackName] = function(data) {
            renderOrders(data);
            delete window[callbackName];
            if(document.getElementById('jsonp-temp-script')) document.getElementById('jsonp-temp-script').remove();
        };
        script.src = adminBridge + "?action=readAdmin&callback=" + callbackName;
        document.body.appendChild(script);
    }

    function renderOrders(orders) {
        const list = document.getElementById('admin-orders-list');
        let html = ""; let totalSale = 0; let todayCount = 0; let currentMaxToken = 0;
        const todayStr = new Date().toDateString();

        orders.reverse().forEach(order => {
            const dateObj = new Date(order.date);
            const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const dateStr = dateObj.toLocaleDateString();
            let cancelDisplay = "";
            if(order.cancelTime && order.status.includes("Cancelled")) {
                const cTime = new Date(order.cancelTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                cancelDisplay = `<div style="color:#ff4444; font-size:10px; margin-top:5px; font-weight:bold;">❌ CANCELLED AT: ${cTime}</div>`;
            }
            
            if(dateObj.toDateString() === todayStr) {
                todayCount++;
                if(!order.status.includes("Cancelled")) totalSale += parseFloat(order.total || 0);
                if(parseInt(order.token) > currentMaxToken) currentMaxToken = parseInt(order.token);
            }

            let statusClass = order.status === "Done" ? "status-done" : (order.status.includes("Cancelled") ? "status-cancelled" : "status-pending");

            // Loop ke andar wala card ka HTML replace karein:
            html += `
                <div class="order-card" style="
                    background: ${order.status.includes('Cancelled') ? 'rgba(58, 13, 13, 0.4)' : 'rgba(255,255,255,0.03)'}; 
                    border: 2px solid ${order.status.includes('Cancelled') ? '#ff4444' : 'var(--gold)'};
                    margin-bottom: 20px; /* Do cards ke beech gap */
                    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
                ">
                    <span class="status-badge ${statusClass}">${order.status}</span>
                    <div style="color: var(--gold); font-size: 11px; font-weight:bold; letter-spacing: 1px;">TOKEN #${order.token}</div>
                    <span class="cust-info" style="font-size: 18px; color: #fff; margin-top: 5px;">${order.name}</span>
                    <span class="cust-phone" style="color: var(--gold);">📱 ${order.phone}</span>
                    
                    <div class="order-items" style="color:#eee; font-size:13px; background:rgba(0,0,0,0.4); padding:12px; border-radius:10px; margin:12px 0; border: 1px solid rgba(212,175,55,0.1);">
                        ${order.items}
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:flex-end; border-top: 1px solid rgba(212,175,55,0.1); padding-top: 10px;">
                        <div>
                            <span style="font-weight:bold; color:var(--gold); font-size:20px;">₹${order.total}</span>
                            <div class="order-time" style="opacity: 0.7;">🕒 Ordered: ${timeStr}</div>
                            ${cancelDisplay} 
                        </div>
                        
                        ${order.status === 'Pending' ? `
                            <div style="display:flex; gap:8px;">
                                <button onclick="updateStatus('${order.token}', '${order.name}', 'Cancelled By Admin')" style="background:#3a0d0d; color:#ff4444; border:1px solid #ff4444; padding:8px 12px; border-radius:8px; font-size:11px; cursor:pointer; font-weight:bold;">CANCEL</button>
                                <button onclick="updateStatus('${order.token}', '${order.name}', 'Done')" style="background:#25D366; color:white; border:none; padding:8px 18px; border-radius:8px; font-size:11px; font-weight:bold; cursor:pointer; box-shadow: 0 0 10px rgba(37,211,102,0.3);">DONE ✅</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        });

        if(currentMaxToken > lastKnownToken && lastKnownToken !== 0) { bell.play(); setTimeout(() => { bell.pause(); bell.currentTime = 0; }, 6000); }
        if(currentMaxToken > 0) { lastKnownToken = currentMaxToken; localStorage.setItem('lastProcessedToken', currentMaxToken); }
        
        list.innerHTML = html;
        document.getElementById('admin-total-orders').innerText = todayCount;
        document.getElementById('admin-total-sale').innerText = totalSale.toLocaleString();
    }

    document.addEventListener('click', () => { bell.pause(); bell.currentTime = 0; }, {once: false});

    window.updateStatus = function(token, name, status) {
    if(!confirm(status + " Token #" + token + "?")) return;
    
    // JSON ki jagah parameters bhejenge taaki Apps Script turant pakad le
    const url = adminBridge + "?token=" + token + "&name=" + encodeURIComponent(name) + "&status=" + encodeURIComponent(status);

    fetch(url, {
        method: 'POST',
        mode: 'no-cors' 
    }).then(() => {
        alert("Action Saved!");
        setTimeout(refreshAdminData, 1000);
    }).catch(err => {
        alert("Network Error!");
    });
};

    setInterval(refreshAdminData, 30000);
    refreshAdminData();
</script>
