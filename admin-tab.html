<div class="admin-panel-wrapper" style="padding-bottom: 50px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
        <div style="background: linear-gradient(45deg, #af8d19, #f1d36d); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: #3a0d0d; font-weight: 800;">Total Tokens Today</div>
            <div id="admin-total-orders" style="font-size: 26px; font-weight: bold; color: #000;">0</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: var(--gold); font-weight: 800;">Estimated Sale</div>
            <div style="font-size: 26px; font-weight: bold; color: var(--gold);">₹<span id="admin-total-sale">0</span></div>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="font-family: 'Marcellus', serif; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 10px; margin: 0; font-size: 16px;">Live Kitchen Feed</h3>
        <button onclick="refreshAdminData()" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 10px; padding: 4px 10px; border-radius: 4px;">🔄 Refresh</button>
    </div>
    
    <div id="admin-orders-list" style="display: flex; flex-direction: column; gap: 20px;">
        <div style="text-align: center; padding: 40px; color: #555;">👑 Loading Royal Data...</div>
    </div>
</div>

<audio id="kitchenBell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>

<style>
    .order-card {
        background: rgba(255,255,255,0.03);
        border: 2px solid rgba(212,175,55,0.25); /* Border wapas aa gaya */
        padding: 18px;
        border-radius: 15px;
        position: relative;
        margin-bottom: 5px;
    }
    .status-badge {
        font-size: 9px; padding: 4px 10px; border-radius: 50px; text-transform: uppercase; font-weight: 800;
        position: absolute; top: 15px; right: 15px;
    }
    .status-pending { background: #af8d19; color: #000; }
    .status-cancelled { background: #3a0d0d; color: #ff4444; border: 1px solid #ff4444; }
    .status-done { background: #1a3a1d; color: #25D366; border: 1px solid #25D366; }
    .order-time { font-size: 10px; color: #888; margin-top: 5px; font-weight: bold; }
    .cust-info { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; display: block; }
    .cust-phone { font-size: 11px; color: var(--gold); margin-bottom: 8px; display: block; }
</style>

<script>
    const adminBridge = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';
    const bell = document.getElementById('kitchenBell');
    let lastOrderCount = 0;

    function refreshAdminData() {
        fetch(adminBridge + "?action=readAdmin")
            .then(res => res.json())
            .then(data => {
                if (lastOrderCount !== 0 && data.length > lastOrderCount && bell) {
                    bell.play().catch(e => console.log("Sound blocked"));
                    setTimeout(() => { bell.pause(); bell.currentTime = 0; }, 3000);
                }
                lastOrderCount = data.length;
                renderOrders(data);
            })
            .catch(err => console.error("Fetch Error:", err));
    }

    function renderOrders(orders) {
        const list = document.getElementById('admin-orders-list');
        let html = ""; let totalSale = 0; let todayCount = 0;
        const todayStr = new Date().toDateString();

        [...orders].reverse().forEach(order => {
            const dateObj = new Date(order.date);
            const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            if(dateObj.toDateString() === todayStr) {
                todayCount++;
                if(order.status === "Done") totalSale += parseFloat(order.total || 0);
            }

            let status = (order.status || "").trim();
            let statusClass = status === "Done" ? "status-done" : (status.toLowerCase().includes("cancel") ? "status-cancelled" : "status-pending");

            // Soft Action Group
            let billGroup = `
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button onclick='window.downloadAdminBillByData(${JSON.stringify(order)})' style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:9px; padding:3px 8px; border-radius:4px; cursor:pointer;">📥 BILL</button>
                    <button onclick='window.shareBillOnWAByData(${JSON.stringify(order)})' style="background:none; border:1px solid #25D366; color:#25D366; font-size:9px; padding:3px 8px; border-radius:4px; cursor:pointer;">💬 SHARE</button>
                    ${status !== "Done" && !status.toLowerCase().includes("cancel") ? 
                    `<button onclick="updateStatus('${order.token}', 'Cancelled By Admin', this)" style="background:#3a0d0d; border:none; color:#ff4444; font-size:9px; padding:3px 8px; border-radius:4px;">X</button>` : ""}
                </div>
            `;

            // Status Step Button
            let nextBtn = "";
            if(status === "Awaiting Payment" || status === "Pending") nextBtn = `<button onclick="updateStatus('${order.token}', 'Received', this)" style="width:100%; margin-top:8px; background:#3498db; color:#fff; border:none; padding:6px; border-radius:6px; font-weight:bold; font-size:11px;">PAID ✅</button>`;
            else if(status === "Received") nextBtn = `<button onclick="updateStatus('${order.token}', 'Preparing', this)" style="width:100%; margin-top:8px; background:#e67e22; color:#fff; border:none; padding:6px; border-radius:6px; font-weight:bold; font-size:11px;">PREPARE 👨‍🍳</button>`;
            else if(status === "Preparing") nextBtn = `<button onclick="updateStatus('${order.token}', 'Ready', this)" style="width:100%; margin-top:8px; background:#f1c40f; color:#000; border:none; padding:6px; border-radius:6px; font-weight:bold; font-size:11px;">READY 🔔</button>`;
            else if(status === "Ready") nextBtn = `<button onclick="verifyOTP('${order.token}')" style="width:100%; margin-top:8px; background:#25D366; color:#fff; border:none; padding:6px; border-radius:6px; font-weight:bold; font-size:11px;">DELIVER 🎁</button>`;

            html += `
                <div class="order-card" style="padding:12px; margin-bottom:10px; border-radius:12px; border-left:4px solid ${getStatusColor(status)}; background:rgba(255,255,255,0.02);">
                    <span class="status-badge ${statusClass}" style="font-size:8px; top:8px; right:8px; padding:3px 8px;">${status}</span>
                    <div style="color:var(--gold); font-size:10px; font-weight:bold;">TOKEN #${order.token}</div>
                    <div style="font-size:14px; font-weight:bold; color:#fff; margin-top:2px;">${order.name}</div>
                    
                    <div style="font-size:12px; color:#bbb; margin:6px 0;">${order.items}</div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div style="flex:1;">
                            <div style="font-size:18px; font-weight:bold; color:var(--gold);">₹${order.total} <span style="font-size:9px; color:#666; font-weight:normal;">🕒 ${timeStr}</span></div>
                            ${billGroup}
                        </div>
                    </div>
                    ${nextBtn}
                </div>
            `;
        });
        
        list.innerHTML = html || "<div style='text-align:center; padding:20px; opacity:0.5;'>No Orders</div>";
        document.getElementById('admin-total-orders').innerText = todayCount;
        document.getElementById('admin-total-sale').innerText = totalSale.toLocaleString();
    }

    function getStatusColor(s) {
        const st = s.toLowerCase();
        if(st === "done") return "#25D366";
        if(st.includes("cancel")) return "#ff4444";
        if(st === "ready") return "#f1c40f";
        return "#D4AF37";
    }

    window.downloadAdminBillByData = function(order) {
        if(typeof generateRoyalBill === 'function') generateRoyalBill(order);
        else alert("Refresh Page!");
    };

    window.shareBillOnWAByData = function(order) {
        const msg = `*ROYAL STREET KITCHEN* 👑%0A*Token
