<div class="admin-panel-wrapper" style="animation: fadeIn 0.5s ease;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
        <div style="background: linear-gradient(45deg, #af8d19, #f1d36d); padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(212,175,55,0.3);">
            <div style="font-size: 10px; color: #3a0d0d; font-weight: 800; text-transform: uppercase;">Today's Orders</div>
            <div id="admin-total-orders" style="font-size: 24px; font-weight: bold; color: #000;">--</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: var(--gold); font-weight: 800; text-transform: uppercase;">Today's Sale</div>
            <div style="font-size: 24px; font-weight: bold; color: var(--gold);">₹<span id="admin-total-sale">0</span></div>
        </div>
    </div>

    <h3 style="font-family: 'Marcellus', serif; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 10px; margin-bottom: 15px; font-size: 16px;">Live Order Feed</h3>
    
    <div id="admin-orders-container" style="display: flex; flex-direction: column; gap: 12px;">
        <div style="text-align: center; padding: 40px; color: #555;">Kripya wait karein, orders load ho rahe hain...</div>
    </div>
</div>

<style>
    .order-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(212,175,55,0.1);
        padding: 15px;
        border-radius: 10px;
        position: relative;
        transition: 0.3s;
    }
    .status-badge {
        font-size: 9px;
        padding: 3px 8px;
        border-radius: 4px;
        text-transform: uppercase;
        font-weight: bold;
        position: absolute;
        top: 10px;
        right: 10px;
    }
    .status-pending { background: #af8d19; color: #000; }
    .status-cancelled { background: #ff4444; color: #fff; }
    .status-done { background: #25D366; color: #fff; }
    
    .btn-action {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        border-radius: 5px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        font-size: 12px;
    }
</style>

<script>
    // Ye function sirf layout check karne ke liye dummy data dikhayega
    // Baad mein hum ise Google Sheet se connect karenge
    function loadDummyAdminData() {
        const container = document.getElementById('admin-orders-container');
        container.innerHTML = `
            <div class="order-card">
                <span class="status-badge status-pending">Pending</span>
                <div style="color: var(--gold); font-weight: bold;">Token #05</div>
                <div style="font-size: 14px; margin: 5px 0;">Customer: Urvashi Khatri</div>
                <div style="font-size: 11px; color: #aaa;">Items: Veg Maggi x1, Cold Coffee x2</div>
                <div style="font-weight: bold; margin-top: 5px;">Total: ₹240</div>
                <button class="btn-action" style="background: #25D366; color: white;">Mark as Prepared ✅</button>
            </div>
            
            <div class="order-card" style="border-color: #ff4444; opacity: 0.7;">
                <span class="status-badge status-cancelled">Cancelled</span>
                <div style="color: #ff4444;">Token #04</div>
                <div style="font-size: 14px;">Customer: Deeksha</div>
                <button class="btn-action" style="background: #555; color: #fff;" disabled>Order Cancelled</button>
            </div>
        `;
        document.getElementById('admin-total-orders').innerText = "12";
        document.getElementById('admin-total-sale').innerText = "1,850";
    }

    loadDummyAdminData();
</script>
