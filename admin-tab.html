<div class="admin-panel-wrapper" style="padding-bottom: 80px; font-family: 'Poppins', sans-serif; color: #fff; max-width: 600px; margin: auto;">
    
    <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 25px; backdrop-filter: blur(10px);">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div style="color: var(--gold); font-size: 16px; font-weight: 800; font-family: 'Marcellus', serif;">ROYAL CONTROL CENTER 👑</div>
                <div style="font-size: 10px; color: #aaa; letter-spacing: 1px;">LIVE KITCHEN MANAGEMENT</div>
            </div>
            <button onclick="window.logoutAdmin()" style="background: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; color: #ff4444; padding: 6px 15px; border-radius: 30px; font-size: 11px; cursor: pointer; font-weight: bold; transition: 0.3s;">LOGOUT</button>
        </div>
        
        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button onclick="showAdminSection('orders')" id="btn-view-orders" style="flex: 1; background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 12px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);">📦 ORDERS</button>
            <button onclick="showAdminSection('stock')" id="btn-view-stock" style="flex: 1; background: rgba(255,255,255,0.05); color: var(--gold); border: 1px solid var(--gold); padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 12px;">🥦 INVENTORY</button>
        </div>
    </div>

    <div id="admin-orders-view">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
            <div style="background: linear-gradient(135deg, #af8d19, #f1d36d); padding: 15px; border-radius: 15px; text-align: center; color: #000;">
                <div style="font-size: 10px; font-weight: 800; text-transform: uppercase;">Today's Tokens</div>
                <div id="admin-total-orders" style="font-size: 28px; font-weight: 900;">0</div>
            </div>
            <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 15px; text-align: center;">
                <div style="font-size: 10px; color: var(--gold); font-weight: 800; text-transform: uppercase;">Total Sale</div>
                <div style="font-size: 28px; font-weight: 900; color: var(--gold);">₹<span id="admin-total-sale">0</span></div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px;">
            <h3 style="font-family: 'Marcellus', serif; color: var(--gold); font-size: 16px; margin: 0;">Live Orders Flow</h3>
            <button onclick="refreshAdminData()" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 10px; padding: 5px 12px; border-radius: 8px; cursor: pointer;">🔄 Sync</button>
        </div>
        
        <div id="admin-orders-list" style="display: flex; flex-direction: column; gap: 18px;">
            <div style="text-align: center; padding: 50px; color: #555;">👑 Fetching Shahi Orders...</div>
        </div>
    </div>

    <div id="stock-manager-view" style="display: none;">
        <div style="margin-bottom: 20px;">
            <input type="text" id="stockSearch" oninput="filterStockItems()" placeholder="🔍 Search Dish Name..." 
                   style="width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; outline: none; box-sizing: border-box;">
        </div>
        <div id="admin-inventory-list" style="display: flex; flex-direction: column; gap: 12px; max-height: 60vh; overflow-y: auto; padding-right: 5px;"></div>
    </div>
</div>

<audio id="kitchenBell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<style>
    .order-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.15); padding: 20px; border-radius: 20px; position: relative; transition: 0.3s; }
    .status-badge { font-size: 9px; padding: 5px 12px; border-radius: 50px; text-transform: uppercase; font-weight: 800; position: absolute; top: 18px; right: 18px; letter-spacing: 1px; }
    .action-btn { width: 100%; margin-top: 15px; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
    .action-btn:active { transform: scale(0.98); }
    
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ff4444; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #25D366; }
    input:checked + .slider:before { transform: translateX(24px); }
</style>

<script>
    const adminBridge = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';
    let lastCount = 0;

    // --- NAVIGATION ---
    function showAdminSection(sec) {
        document.getElementById('admin-orders-view').style.display = (sec === 'orders') ? 'block' : 'none';
        document.getElementById('stock-manager-view').style.display = (sec === 'stock') ? 'block' : 'none';
        document.getElementById('btn-view-orders').style.background = (sec === 'orders') ? 'var(--gold)' : 'rgba(255,255,255,0.05)';
        document.getElementById('btn-view-orders').style.color = (sec === 'orders') ? '#000' : 'var(--gold)';
        document.getElementById('btn-view-stock').style.background = (sec === 'stock') ? 'var(--gold)' : 'rgba(255,255,255,0.05)';
        document.getElementById('btn-view-stock').style.color = (sec === 'stock') ? '#000' : 'var(--gold)';
        if(sec === 'stock') loadInventoryInAdmin();
        else refreshAdminData();
    }

    // --- LIVE SYNC ---
    function refreshAdminData() {
        fetch(adminBridge + "?action=readAdmin")
            .then(res => res.json())
            .then(data => {
                if (lastCount !== 0 && data.length > lastCount) {
                    document.getElementById('kitchenBell').play().catch(e => {});
                }
                lastCount = data.length;
                renderOrders(data);
            });
    }

    function renderOrders(orders) {
        const list = document.getElementById('admin-orders-list');
        let html = ""; let sale = 0; let count = 0;
        const today = new Date().toDateString();

        [...orders].reverse().forEach(order => {
            if(new Date(order.date).toDateString() === today) {
                count++;
                if(order.status === "Done") sale += parseFloat(order.total || 0);
            }

            const status = (order.status || "Pending").trim();
            const isCancelled = status.toLowerCase().includes("cancel");
            const isDone = status.toLowerCase() === "done";

            let actionBtn = "";
            if (status === "Awaiting Payment" || status === "Pending") {
                actionBtn = `<button onclick="updateStatus('${order.token}', 'Received', this)" class="action-btn" style="background:#3498db; color:white;">RECEIVE PAYMENT ✅</button>`;
            } else if (status === "Received") {
                actionBtn = `<button onclick="updateStatus('${order.token}', 'Preparing', this)" class="action-btn" style="background:#e67e22; color:white;">START COOKING 👨‍🍳</button>`;
            } else if (status === "Preparing") {
                actionBtn = `<button onclick="updateStatus('${order.token}', 'Ready', this)" class="action-btn" style="background:#f1c40f; color:black;">MARK AS READY 🔔</button>`;
            } else if (status === "Ready") {
                actionBtn = `<button onclick="verifyOTP('${order.token}')" class="action-btn" style="background:#25D366; color:white;">DELIVER 🎁</button>`;
            }

            html += `
                <div class="order-card" style="border-left: 5px solid ${getStatusColor(status)};">
                    <span class="status-badge" style="background:${getStatusColor(status)}; color:${status === 'Ready' ? '#000':'#fff'}">${status}</span>
                    <div style="color:var(--gold); font-size:11px; font-weight:bold;">TOKEN #${order.token}</div>
                    <div style="font-size:18px; font-weight:bold; color:#fff; margin:5px 0;">${order.name}</div>
                    
                    <div style="font-size:10px; color:#888; margin-bottom:10px;">
                        📅 Order: ${new Date(order.date).toLocaleTimeString()} 
                        ${order.updatedAt ? ` | 🕒 Update: ${new Date(order.updatedAt).toLocaleTimeString()}` : ""}
                    </div>

                    <div style="font-size:13px; background:rgba(0,0,0,0.2); padding:12px; border-radius:12px; margin-bottom:15px; color:#ddd;">
                        ${order.items}
                    </div>

                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-size:22px; font-weight:900; color:var(--gold);">₹${order.total}</div>
                        <div style="display:flex; gap:10px;">
                            <button onclick='window.handleAdminBillPDF(${JSON.stringify(order)})' style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:10px; padding:6px 12px; border-radius:8px; cursor:pointer; font-weight:bold;">📥 BILL</button>
                            ${!isCancelled ? `<button onclick='window.handleAdminWAShare(${JSON.stringify(order)})' style="background:none; border:1px solid #25D366; color:#25D366; font-size:10px; padding:6px 12px; border-radius:8px; cursor:pointer; font-weight:bold;">💬 SHARE</button>` : ""}
                            ${!isDone && !isCancelled ? `<button onclick="updateStatus('${order.token}', 'Cancelled By Admin', this)" style="background:rgba(255,68,68,0.1); border:1px solid #ff4444; color:#ff4444; font-size:10px; padding:6px 12px; border-radius:8px; cursor:pointer;">❌</button>` : ""}
                        </div>
                    </div>
                    ${actionBtn}
                </div>`;
        });
        
        list.innerHTML = html || "<div style='text-align:center; padding:50px; opacity:0.3;'>No orders to display.</div>";
        document.getElementById('admin-total-orders').innerText = count;
        document.getElementById('admin-total-sale').innerText = sale.toLocaleString();
    }

    // --- 📄 PAKKA GST BILL PDF (EXACT FORMAT) ---
    window.handleAdminBillPDF = function(order) {
    if (!window.jspdf) { alert("Library missing!"); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // --- 1. LOGO & BANNER ---
    // Note: 'MAIN_LOGO.jpeg' aur 'royalstreetkitchen.png' wahi files hain jo Index mein hain
    try {
        // Logo (Top Left)
        doc.addImage('MAIN_LOGO.jpeg', 'JPEG', 15, 10, 25, 25); 
        // Banner Title (Middle)
        doc.addImage('royalstreetkitchen.png', 'PNG', 50, 10, 110, 15);
    } catch (e) {
        console.log("Images not found, using text instead.");
        doc.setFontSize(22);
        doc.text("ROYAL STREET KITCHEN", 105, 20, { align: "center" });
    }

    // --- 2. SHOP ADDRESS & GST ---
    doc.setFontSize(9);
    doc.setFont("helvetica", "normal");
    const addr = "Township, opp. Elite Apex, nearby Bun Tea,\nMahalaxmi Nagar, Indore, MP 452010\nGSTIN: 06IDLPK8248E1Z6";
    doc.text(addr, 105, 30, { align: "center" });

    // --- 3. ORDER INFO BOX ---
    doc.setDrawColor(212, 175, 55); // Royal Gold Border
    doc.rect(15, 48, 180, 22);
    doc.setFontSize(10);
    doc.text(`Order Token: #${order.token}`, 20, 55);
    doc.text(`Date: ${new Date(order.date).toLocaleDateString('en-GB')}`, 140, 55);
    doc.text(`Customer: ${order.name.toUpperCase()}`, 20, 63);
    
    // Status color logic in PDF
    const currentStatus = (order.status || "Pending").toUpperCase();
    if(currentStatus.includes("CANCEL")) doc.setTextColor(200, 0, 0); // Red for Cancel
    doc.text(`Status: ${currentStatus}`, 140, 63);
    doc.setTextColor(0, 0, 0); // Back to black

    // --- 4. ITEMS TABLE ---
    doc.setFont("helvetica", "bold");
    doc.setFillColor(240, 240, 240);
    doc.rect(15, 75, 180, 8, 'F');
    doc.text("S.No", 20, 80);
    doc.text("Description", 45, 80);
    doc.text("Amount (INR)", 165, 80);
    doc.line(15, 83, 195, 83);

    doc.setFont("helvetica", "normal");
    let y = 90;
    const items = order.items.split(', ');
    items.forEach((item, i) => {
        doc.text(`${i + 1}`, 22, y);
        doc.text(item, 45, y);
        y += 8;
    });

    // --- 5. AUDIT TIMELINE (CANCELLATION/DONE TIME) ---
    doc.line(15, y, 195, y);
    doc.setFontSize(8);
    doc.setTextColor(100);
    
    let timeLog = `Ordered At: ${new Date(order.date).toLocaleTimeString()}`;
    
    // 🔥 CANCELLATION TIME LOGIC
    if(currentStatus.includes("CANCEL")) {
        // Agar order cancel hua hai toh uska update time dikhao
        const cancelTime = order.updatedAt ? new Date(order.updatedAt).toLocaleTimeString() : "N/A";
        timeLog += ` | ❌ Cancelled At: ${cancelTime}`;
    } else if (currentStatus === "DONE" || currentStatus === "PAID & DELIVERED") {
        const deliverTime = order.updatedAt ? new Date(order.updatedAt).toLocaleTimeString() : "N/A";
        timeLog += ` | ✅ Delivered At: ${deliverTime}`;
    }
    
    doc.text(timeLog, 105, y + 8, { align: "center" });

    // --- 6. GRAND TOTAL & FOOTER ---
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(14);
    doc.setFont("helvetica", "bold");
    doc.text(`GRAND TOTAL: Rs. ${order.total}/-`, 190, y + 20, { align: "right" });

    doc.setFontSize(10);
    doc.setFont("helvetica", "italic");
    doc.setTextColor(212, 175, 55);
    doc.text("Thank you for dining Royally! Visit Again.", 105, y + 35, { align: "center" });

    doc.save(`RSK_Invoice_${order.token}.pdf`);
};
    // --- 💬 WHATSAPP SHARE (COMPLETE DETAIL) ---
    window.handleAdminWAShare = function(order) {
        const msg = `*ROYAL STREET KITCHEN* 👑%0A--------------------------%0A*Token:* #${order.token}%0A*Customer:* ${order.name}%0A--------------------------%0A*Items:*%0A${order.items.replace(/, /g, '%0A')}%0A--------------------------%0A*Grand Total: ₹${order.total}*%0A*Status:* ${order.status}%0A--------------------------%0A_Thank you for dining Royally!_`;
        window.open(`https://wa.me/91${order.phone || ''}?text=${msg}`, '_blank');
    };

    // --- SYSTEM UTILS ---
    window.updateStatus = function(token, status, btn) {
        if(btn) { btn.innerText = "..."; btn.disabled = true; }
        fetch(adminBridge, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ token: token, status: status, updatedAt: new Date().toISOString() })
        }).then(() => setTimeout(refreshAdminData, 1200));
    };

    window.verifyOTP = function(token) {
        let otp = prompt("Customer OTP:");
        if(otp) updateStatus(token, 'Done', null);
    };

    function getStatusColor(s) {
        const st = (s || "").toLowerCase();
        if(st === "done") return "#25D366";
        if(st.includes("cancel")) return "#ff4444";
        if(st === "ready") return "#f1c40f";
        if(st === "preparing") return "#e67e22";
        if(st === "received") return "#3498db";
        return "#D4AF37";
    }

    async function loadInventoryInAdmin() {
        const list = document.getElementById('admin-inventory-list');
        list.innerHTML = "<div style='text-align:center; padding:30px; color:var(--gold);'>Syncing...</div>";
        const menuItems = ["Tawa Chicken + Paratha", "Tawa Chicken + Kulcha", "Paneer Bhurji + Paratha", "Paneer Bhurji + Kulcha", "Tawa Paneer + Paratha", "Tawa Paneer + Kulcha", "Tawa Egg + Paratha", "Tawa Egg + Kulcha", "Egg Bhurji + Paratha", "Egg Bhurji + Kulcha", "RSK Special Chicken", "Tawa Chicken", "Chilly Chicken", "Diet Paper Chicken", "Creamy Paper Chicken", "Fry Chicken", "Finger Chicken", "Chicken Cheese Balls", "Kastoori Paneer", "Tawa Paneer", "Paneer Bhurji", "Garlic Bread", "French Fries / Potato Bites", "Chips of Choice", "RSK Special Maggie", "Cheese / Veg Maggie", "Butter Maggie", "Masala Maggie", "Tawa Egg", "Kastoori Egg / Egg Bhurji", "Boiled Egg (2 pc)", "Chicken Fried Rice", "Egg Fried Rice", "Veg Fried Rice", "Paratha", "Kulcha"];
        try {
            const res = await fetch(adminBridge + "?action=getInventory");
            const data = await res.json();
            let html = "";
            menuItems.forEach(name => {
                const isOut = data[name] === "Out";
                html += `<div class="order-card" style="padding:12px 20px; display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                    <div><div style="font-size:13px; font-weight:bold;">${name}</div><div id="lbl-${name.replace(/\s+/g, '')}" style="font-size:9px; color:${isOut?'#ff4444':'#25D366'}">${isOut?'● OUT':'● IN STOCK'}</div></div>
                    <label class="switch"><input type="checkbox" ${!isOut?'checked':''} onchange="toggleStockItem('${name}', this.checked)"><span class="slider"></span></label>
                </div>`;
            });
            list.innerHTML = html;
        } catch(e) { list.innerHTML = "Error."; }
    }

    window.toggleStockItem = function(name, check) {
        fetch(adminBridge, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "updateInventory", itemName: name, newStatus: check ? "In" : "Out" }) });
        const lbl = document.getElementById('lbl-' + name.replace(/\s+/g, ''));
        if(lbl) { lbl.innerText = check ? "● IN STOCK" : "● OUT"; lbl.style.color = check ? "#25D366" : "#ff4444"; }
    };

    window.logoutAdmin = function() { if(confirm("Logout?")) { localStorage.removeItem('isAdminLoggedIn'); location.reload(); } };

    setInterval(refreshAdminData, 15000);
    refreshAdminData();
</script>
