<div class="admin-panel-wrapper" style="padding-bottom: 50px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
        <div style="background: linear-gradient(45deg, #af8d19, #f1d36d); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: #3a0d0d; font-weight: 800;">Total Tokens Today</div>
            <div id="admin-total-orders" style="font-size: 26px; font-weight: bold; color: #000;">0</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: var(--gold); font-weight: 800;">Estimated Sale</div>
            <div style="font-size: 26px; font-weight: bold; color: var(--gold);">₹<span id="admin-total-sale">0</span></div>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="font-family: 'Marcellus', serif; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 10px; margin: 0; font-size: 16px;">Live Kitchen Feed</h3>
        <button onclick="refreshAdminData()" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 10px; padding: 4px 10px; border-radius: 4px;">🔄 Refresh</button>
    </div>
    
    <div id="admin-orders-list" style="display: flex; flex-direction: column; gap: 20px;">
        <div style="text-align: center; padding: 40px; color: #555;">👑 Loading Royal Data...</div>
    </div>
</div>

<audio id="kitchenBell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>

<style>
    .order-card {
        background: rgba(255,255,255,0.03);
        border: 2px solid rgba(212,175,55,0.25); /* Border wapas aa gaya */
        padding: 18px;
        border-radius: 15px;
        position: relative;
        margin-bottom: 5px;
    }
    .status-badge {
        font-size: 9px; padding: 4px 10px; border-radius: 50px; text-transform: uppercase; font-weight: 800;
        position: absolute; top: 15px; right: 15px;
    }
    .status-pending { background: #af8d19; color: #000; }
    .status-cancelled { background: #3a0d0d; color: #ff4444; border: 1px solid #ff4444; }
    .status-done { background: #1a3a1d; color: #25D366; border: 1px solid #25D366; }
    .order-time { font-size: 10px; color: #888; margin-top: 5px; font-weight: bold; }
    .cust-info { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; display: block; }
    .cust-phone { font-size: 11px; color: var(--gold); margin-bottom: 8px; display: block; }
</style>

<script>
    const adminBridge = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';
    const bell = document.getElementById('kitchenBell');

    function refreshAdminData() {
        fetch(adminBridge + "?action=readAdmin")
            .then(res => res.json())
            .then(data => {
                renderOrders(data);
            })
            .catch(err => {
                console.error("Admin Fetch Error:", err);
                document.getElementById('admin-orders-list').innerHTML = "<div style='color:red; text-align:center;'>Fetch Error!</div>";
            });
    }

    function renderOrders(orders) {
        const list = document.getElementById('admin-orders-list');
        let html = ""; let totalSale = 0; let todayCount = 0;
        const todayStr = new Date().toDateString();

        [...orders].reverse().forEach(order => {
            const dateObj = new Date(order.date);
            const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            if(dateObj.toDateString() === todayStr) {
                todayCount++;
                if(order.status === "Done") totalSale += parseFloat(order.total || 0);
            }

            let status = (order.status || "").trim();
            let statusClass = "status-pending"; 
            let actionBtn = "";
            let cancelBtn = "";

            // --- STATUS & BUTTON LOGIC ---
            if (status === "Awaiting Payment" || status === "Pending") {
                statusClass = "status-pending";
                actionBtn = `<button onclick="updateStatus('${order.token}', 'Received', this)" style="background:#3498db; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold; flex:1;">PAID (REC) ✅</button>`;
            } else if (status === "Received") {
                statusClass = "status-received";
                actionBtn = `<button onclick="updateStatus('${order.token}', 'Preparing', this)" style="background:#e67e22; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold; flex:1;">PREPARE 👨‍🍳</button>`;
            } else if (status === "Preparing") {
                statusClass = "status-preparing";
                actionBtn = `<button onclick="updateStatus('${order.token}', 'Ready', this)" style="background:#f1c40f; color:black; border:none; padding:10px; border-radius:8px; font-weight:bold; flex:1;">READY 🔔</button>`;
            } else if (status === "Ready") {
                statusClass = "status-ready";
                actionBtn = `<button onclick="verifyOTP('${order.token}')" style="background:#25D366; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold; flex:1;">DELIVER 🎁</button>`;
            } else if (status === "Done") {
                statusClass = "status-done";
            } else if (status.toLowerCase().includes("cancel")) {
                statusClass = "status-cancelled";
            }

            if (status !== "Done" && !status.toLowerCase().includes("cancel")) {
                cancelBtn = `<button onclick="updateStatus('${order.token}', 'Cancelled By Admin', this)" style="background:#3a0d0d; color:#ff4444; border:1px solid #ff4444; padding:10px; border-radius:8px; font-weight:bold; width:80px; font-size:10px;">CANCEL</button>`;
            }

            // 🔥 FEATURE: ADMIN BILL & SHARE GROUP
            let billActionGroup = `
                <div style="display:flex; gap:5px; margin-top:8px;">
                    <button onclick='downloadAdminBillByData(${JSON.stringify(order)})' style="background:#d4af37; color:black; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; font-size:10px; font-weight:bold;">📥 BILL</button>
                    <button onclick='shareBillOnWAByData(${JSON.stringify(order)})' style="background:#25D366; color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; font-size:10px; font-weight:bold;">💬 SHARE</button>
                </div>
            `;

            html += `
                <div class="order-card" style="border-left: 5px solid ${getStatusColor(status)};">
                    <span class="status-badge ${statusClass}">${status}</span>
                    <div style="color: var(--gold); font-size: 11px; font-weight:bold;">TOKEN #${order.token}</div>
                    <span class="cust-info">${order.name}</span>
                    <span class="cust-phone">📱 ${order.phone}</span>
                    <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin:10px 0; font-size:13px;">${order.items}</div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div style="flex:1;">
                            <span style="font-weight:bold; color:var(--gold); font-size:20px;">₹${order.total}</span>
                            <div class="order-time">🕒 ${timeStr}</div>
                            ${billActionGroup}
                        </div>
                        <div style="display:flex; gap:8px; flex:2; justify-content:flex-end;">
                            ${cancelBtn}
                            ${actionBtn}
                        </div>
                    </div>
                </div>
            `;
        });
        
        list.innerHTML = html || "<div style='text-align:center; padding:40px;'>Aaj koi order nahi hai.</div>";
        document.getElementById('admin-total-orders').innerText = todayCount;
        document.getElementById('admin-total-sale').innerText = totalSale.toLocaleString();
    }

    function getStatusColor(s) {
        if(s === "Done") return "#25D366";
        if(s.includes("Cancel")) return "#ff4444";
        if(s === "Ready") return "#f1c40f";
        return "#D4AF37";
    }

    // --- NEW ADMIN FUNCTIONS ---
    window.downloadAdminBillByData = function(order) {
        if(typeof generateRoyalBill === 'function') {
            generateRoyalBill(order);
        } else {
            alert("PDF Engine Load nahi hua. Page refresh karein.");
        }
    };

    window.shareBillOnWAByData = function(order) {
        const msg = `*ROYAL STREET KITCHEN*%0A---------------------------%0A*INVOICE* %23${order.token}%0A*Customer:* ${order.name}%0A*Items:* ${order.items}%0A*Total:* ₹${order.total}%0A---------------------------%0AAapka digital bill taiyar hai. Visit again! 👑`;
        window.open(`https://wa.me/91${order.phone}?text=${msg}`, '_blank');
    };

    window.verifyOTP = function(token) {
        let otp = prompt("Customer se OTP puchiye:");
        if(!otp) return;
        updateStatus(token, 'Done', null, otp);
    };

    window.updateStatus = function(token, status, btn, otp = "") {
        if(btn) { btn.innerText = "⏳..."; btn.disabled = true; }
        fetch(adminBridge, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ token: token, status: status, otp: otp })
        })
        .then(() => { setTimeout(refreshAdminData, 1000); })
        .catch(err => { alert("Update Failed!"); if(btn) btn.disabled = false; });
    };

    setInterval(refreshAdminData, 30000);
    refreshAdminData();
</script>
