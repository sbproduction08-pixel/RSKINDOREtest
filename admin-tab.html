<div class="admin-panel-wrapper" style="padding-bottom: 50px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
        <div style="background: linear-gradient(45deg, #af8d19, #f1d36d); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: #3a0d0d; font-weight: 800;">Total Tokens Today</div>
            <div id="admin-total-orders" style="font-size: 26px; font-weight: bold; color: #000;">0</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: var(--gold); font-weight: 800;">Estimated Sale</div>
            <div style="font-size: 26px; font-weight: bold; color: var(--gold);">₹<span id="admin-total-sale">0</span></div>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="font-family: 'Marcellus', serif; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 10px; margin: 0; font-size: 16px;">Live Kitchen Feed</h3>
        <button onclick="refreshAdminData()" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 10px; padding: 4px 10px; border-radius: 4px;">🔄 Refresh</button>
    </div>
    
    <div id="admin-orders-list" style="display: flex; flex-direction: column; gap: 20px;">
        <div style="text-align: center; padding: 40px; color: #555;">👑 Loading Royal Data...</div>
    </div>
    // Admin Tab mein ye HTML daalna jahan jagah ho
<div id="stock-manager" style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--gold);">
    <h3 style="color: var(--gold); margin-top: 0;">📦 Stock Control</h3>
    <div id="admin-inventory-list">
        <div style="display:flex; justify-content:space-between; padding: 10px; border-bottom: 1px solid #333;">
            <span>Tawa Chicken</span>
            <button onclick="updateStock('Tawa Chicken', 'Out')" style="background:red; color:white; border-radius:5px; border:none; padding:5px 10px;">MARK OUT</button>
        </div>
    </div>
</div>
</div>

<audio id="kitchenBell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>

<style>
    .order-card {
        background: rgba(255,255,255,0.03);
        border: 2px solid rgba(212,175,55,0.25); /* Border wapas aa gaya */
        padding: 18px;
        border-radius: 15px;
        position: relative;
        margin-bottom: 5px;
    }
    .status-badge {
        font-size: 9px; padding: 4px 10px; border-radius: 50px; text-transform: uppercase; font-weight: 800;
        position: absolute; top: 15px; right: 15px;
    }
    .status-pending { background: #af8d19; color: #000; }
    .status-cancelled { background: #3a0d0d; color: #ff4444; border: 1px solid #ff4444; }
    .status-done { background: #1a3a1d; color: #25D366; border: 1px solid #25D366; }
    .order-time { font-size: 10px; color: #888; margin-top: 5px; font-weight: bold; }
    .cust-info { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; display: block; }
    .cust-phone { font-size: 11px; color: var(--gold); margin-bottom: 8px; display: block; }
</style>

<script>
    const adminBridge = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';
    const bell = document.getElementById('kitchenBell');
    let lastOrderCount = 0;

    // --- 1. DATA REFRESH (Ghanti Logic ke saath) ---
    function refreshAdminData() {
        fetch(adminBridge + "?action=readAdmin")
            .then(res => res.json())
            .then(data => {
                if (lastOrderCount !== 0 && data.length > lastOrderCount) {
                    if(bell) {
                        bell.play().catch(e => console.log("Sound Blocked"));
                        setTimeout(() => { bell.pause(); bell.currentTime = 0; }, 3000);
                    }
                }
                lastOrderCount = data.length;
                renderOrders(data);
            })
            .catch(err => console.error("Fetch Error:", err));
    }

    // --- 2. ORDER RENDERER (Detailed & Soft UI) ---
    function renderOrders(orders) {
        const list = document.getElementById('admin-orders-list');
        let html = ""; let totalSale = 0; let todayCount = 0;
        const todayStr = new Date().toDateString();

        [...orders].reverse().forEach(order => {
            const dateObj = new Date(order.date);
            const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            if(dateObj.toDateString() === todayStr) {
                todayCount++;
                if(order.status === "Done") totalSale += parseFloat(order.total || 0);
            }

            let status = (order.status || "").trim();
            let statusClass = "status-pending";
            if(status === "Done") statusClass = "status-done";
            else if(status.toLowerCase().includes("cancel")) statusClass = "status-cancelled";

            // --- SOFT ACTION BUTTONS ---
            let billActionGroup = `
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <button onclick='window.downloadAdminBillByData(${JSON.stringify(order)})' style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:10px; padding:4px 10px; border-radius:6px; cursor:pointer; font-weight:bold;">📥 BILL</button>
                    <button onclick='window.shareBillOnWAByData(${JSON.stringify(order)})' style="background:none; border:1px solid #25D366; color:#25D366; font-size:10px; padding:4px 10px; border-radius:6px; cursor:pointer; font-weight:bold;">💬 SHARE</button>
                    ${status !== "Done" && !status.toLowerCase().includes("cancel") ? 
                    `<button onclick="updateStatus('${order.token}', 'Cancelled By Admin', this)" style="background:rgba(255,68,68,0.1); border:1px solid #ff4444; color:#ff4444; font-size:10px; padding:4px 10px; border-radius:6px; cursor:pointer;">CANCEL</button>` : ""}
                </div>
            `;

            // --- STEP-BY-STEP STATUS BUTTONS ---
            let mainActionBtn = "";
            if (status === "Awaiting Payment" || status === "Pending") {
                mainActionBtn = `<button onclick="updateStatus('${order.token}', 'Received', this)" style="width:100%; margin-top:12px; background:#3498db; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">PAID (REC) ✅</button>`;
            } else if (status === "Received") {
                mainActionBtn = `<button onclick="updateStatus('${order.token}', 'Preparing', this)" style="width:100%; margin-top:12px; background:#e67e22; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">PREPARE 👨‍🍳</button>`;
            } else if (status === "Preparing") {
                mainActionBtn = `<button onclick="updateStatus('${order.token}', 'Ready', this)" style="width:100%; margin-top:12px; background:#f1c40f; color:black; border:none; padding:10px; border-radius:8px; font-weight:bold;">READY 🔔</button>`;
            } else if (status === "Ready") {
                mainActionBtn = `<button onclick="verifyOTP('${order.token}')" style="width:100%; margin-top:12px; background:#25D366; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">DELIVER 🎁</button>`;
            }

            html += `
                <div class="order-card" style="background:rgba(255,255,255,0.02); padding:15px; border-radius:15px; border-left:5px solid ${getStatusColor(status)}; margin-bottom:15px; position:relative;">
                    <span class="status-badge ${statusClass}" style="position:absolute; top:12px; right:12px; font-size:9px; padding:4px 10px;">${status}</span>
                    <div style="color:var(--gold); font-size:11px; font-weight:bold;">TOKEN #${order.token}</div>
                    <div style="font-size:16px; font-weight:bold; color:#fff; margin-top:4px;">${order.name}</div>
                    <div style="font-size:11px; color:#888;">📱 ${order.phone}</div>
                    
                    <div style="background:rgba(0,0,0,0.2); padding:12px; border-radius:10px; margin:12px 0; font-size:14px; border:1px solid rgba(212,175,55,0.1);">
                        ${order.items}
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div style="flex:1;">
                            <div style="font-size:20px; font-weight:bold; color:var(--gold);">₹${order.total}</div>
                            <div style="font-size:10px; color:#666;">🕒 ${timeStr}</div>
                            ${billActionGroup}
                        </div>
                    </div>
                    ${mainActionBtn}
                </div>
            `;
        });
        
        list.innerHTML = html || "<div style='text-align:center; padding:40px; opacity:0.5;'>No Orders Today.</div>";
        document.getElementById('admin-total-orders').innerText = todayCount;
        document.getElementById('admin-total-sale').innerText = totalSale.toLocaleString();
    }

    // --- 3. MASTER FUNCTIONS ---
    function getStatusColor(s) {
        const st = s.toLowerCase();
        if(st === "done") return "#25D366";
        if(st.includes("cancel")) return "#ff4444";
        if(st === "ready") return "#f1c40f";
        if(st === "preparing") return "#e67e22";
        if(st === "received") return "#3498db";
        return "#D4AF37";
    }

    window.downloadAdminBillByData = function(order) {
        if(typeof generateRoyalBill === 'function') {
            generateRoyalBill(order);
        } else {
            alert("PDF Engine load nahi hua. Refresh karein.");
        }
    };

    window.shareBillOnWAByData = function(order) {
        const msg = `*ROYAL STREET KITCHEN* 👑%0A---------------------------%0A*INVOICE* %23${order.token}%0A*Customer:* ${order.name}%0A*Items:* ${order.items}%0A*Total:* ₹${order.total}%0A---------------------------%0AAapka bill taiyar hai. Visit Again!`;
        window.open(`https://wa.me/91${order.phone}?text=${msg}`, '_blank');
    };

    window.verifyOTP = function(token) {
        let otp = prompt("Customer se OTP puchiye:");
        if(otp) updateStatus(token, 'Done', null, otp);
    };

    window.updateStatus = function(token, status, btn, otp = "") {
        if(btn) { btn.innerText = "⏳ Updating..."; btn.disabled = true; }
        fetch(adminBridge, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ token: token, status: status, otp: otp })
        })
        .then(() => setTimeout(refreshAdminData, 1200))
        .catch(err => { alert("Failed!"); if(btn) btn.disabled = false; });
    }

    setInterval(refreshAdminData, 20000);
    refreshAdminData();
</script>
