<div class="admin-panel-wrapper" style="padding-bottom: 50px; font-family: 'Poppins', sans-serif; color: #fff;">
    <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div style="color: var(--gold); font-size: 14px; font-weight: 800;">WELCOME RSK ADMIN 👑</div>
                <div style="font-size: 10px; color: #888;">Live Control Center</div>
            </div>
            <button onclick="window.logoutAdmin()" style="background: none; border: 1px solid #ff4444; color: #ff4444; padding: 5px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: bold;">Logout 🚪</button>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="showAdminSection('orders')" id="btn-view-orders" style="flex: 1; background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">📦 ORDERS</button>
            <button onclick="showAdminSection('stock')" id="btn-view-stock" style="flex: 1; background: rgba(255,255,255,0.1); color: var(--gold); border: 1px solid var(--gold); padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">🥦 MANAGE STOCK</button>
        </div>
    </div>

    <div id="admin-orders-view">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
            <div style="background: linear-gradient(45deg, #af8d19, #f1d36d); padding: 15px; border-radius: 12px; text-align: center;">
                <div style="font-size: 10px; color: #3a0d0d; font-weight: 800;">Total Tokens Today</div>
                <div id="admin-total-orders" style="font-size: 26px; font-weight: bold; color: #000;">0</div>
            </div>
            <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; text-align: center;">
                <div style="font-size: 10px; color: var(--gold); font-weight: 800;">Estimated Sale</div>
                <div style="font-size: 26px; font-weight: bold; color: var(--gold);">₹<span id="admin-total-sale">0</span></div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="font-family: 'Marcellus', serif; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 10px; margin: 0; font-size: 16px;">Live Kitchen Feed</h3>
            <button onclick="refreshAdminData()" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 10px; padding: 4px 10px; border-radius: 4px;">🔄 Refresh</button>
        </div>
        
        <div id="admin-orders-list" style="display: flex; flex-direction: column; gap: 15px;">
            <div style="text-align: center; padding: 40px; color: #555;">Loading...</div>
        </div>
    </div>

    <div id="stock-manager-view" style="display: none;">
        <div style="margin-bottom: 15px;">
            <input type="text" id="stockSearch" oninput="filterStockItems()" placeholder="🔍 Search Dish Name..." 
                   style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--gold); background: #111; color: #fff; font-size: 14px; outline: none; box-sizing: border-box;">
        </div>
        <div id="admin-inventory-list" style="display: flex; flex-direction: column; gap: 10px; max-height: 60vh; overflow-y: auto; padding-right: 5px;"></div>
    </div>
</div>

<audio id="kitchenBell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    const adminBridge = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';
    let lastOrderCount = 0;

    // --- RSK MASTER MENU ---
    const rskMenu = [
        "Tawa Chicken + Paratha", "Tawa Chicken + Kulcha", "Paneer Bhurji + Paratha", "Paneer Bhurji + Kulcha",
        "Tawa Paneer + Paratha", "Tawa Paneer + Kulcha", "Tawa Egg + Paratha", "Tawa Egg + Kulcha",
        "Egg Bhurji + Paratha", "Egg Bhurji + Kulcha", "RSK Special Chicken", "Tawa Chicken", 
        "Chilly Chicken", "Diet Paper Chicken", "Creamy Paper Chicken", "Fry Chicken", 
        "Finger Chicken", "Chicken Cheese Balls", "Kastoori Paneer", "Tawa Paneer", 
        "Paneer Bhurji", "Garlic Bread", "French Fries / Potato Bites", "Chips of Choice",
        "RSK Special Maggie", "Cheese / Veg Maggie", "Butter Maggie", "Masala Maggie",
        "Tawa Egg", "Kastoori Egg / Egg Bhurji", "Boiled Egg (2 pc)",
        "Chicken Fried Rice", "Egg Fried Rice", "Veg Fried Rice", "Paratha", "Kulcha"
    ];

    // --- 📄 PDF BILL GENERATOR (jsPDF) ---
    window.downloadAdminBillByData = function(order) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: [80, 150] });

        doc.setFillColor(0, 0, 0);
        doc.rect(0, 0, 80, 25, 'F');
        doc.setTextColor(212, 175, 55);
        doc.setFontSize(14);
        doc.text("ROYAL STREET KITCHEN", 40, 12, { align: "center" });
        doc.setFontSize(8);
        doc.text("Accountant Copy - Shahi Receipt", 40, 18, { align: "center" });

        doc.setTextColor(0, 0, 0);
        doc.setFontSize(10);
        doc.text(`Token: #${order.token}`, 5, 35);
        doc.setFontSize(8);
        doc.text(`Status: ${order.status.toUpperCase()}`, 75, 35, { align: "right" });
        doc.text(`Customer: ${order.name}`, 5, 42);
        doc.text(`Date: ${new Date(order.date).toLocaleString()}`, 5, 48);

        doc.line(5, 52, 75, 52);
        doc.setFont("helvetica", "bold");
        doc.text("ITEMS", 5, 58);
        doc.setFont("helvetica", "normal");
        
        let splitItems = doc.splitTextToSize(order.items, 70);
        doc.text(splitItems, 5, 65);
        
        let yShift = 65 + (splitItems.length * 5);
        doc.line(5, yShift, 75, yShift);
        doc.setFontSize(12);
        doc.text(`TOTAL: ₹${order.total}`, 40, yShift + 10, { align: "center" });

        doc.setFontSize(7);
        doc.text(`Generated on: ${new Date().toLocaleString()}`, 40, yShift + 20, { align: "center" });
        
        doc.save(`RSK_Bill_${order.token}.pdf`);
    };

    // --- 💬 WHATSAPP SHARE LOGIC ---
    window.shareBillOnWAByData = function(order) {
        const msg = `*ROYAL STREET KITCHEN* 👑%0A---------------------%0A*Token:* %23${order.token}%0A*Customer:* ${order.name}%0A*Items:* ${order.items}%0A*Total: ₹${order.total}*%0A*Status:* ${order.status}%0A---------------------%0A_Thank you for ordering!_`;
        window.open(`https://wa.me/91${order.phone || ''}?text=${msg}`, '_blank');
    };

    // --- REFRESH & RENDER ---
    function refreshAdminData() {
        fetch(adminBridge + "?action=readAdmin")
            .then(res => res.json())
            .then(data => {
                if (lastOrderCount !== 0 && data.length > lastOrderCount) {
                    document.getElementById('kitchenBell').play().catch(e => {});
                }
                lastOrderCount = data.length;
                renderOrders(data);
            });
    }

    function renderOrders(orders) {
        const list = document.getElementById('admin-orders-list');
        let html = ""; let totalSale = 0; let todayCount = 0;
        const todayStr = new Date().toDateString();

        [...orders].reverse().forEach(order => {
            const dateObj = new Date(order.date);
            if(dateObj.toDateString() === todayStr) {
                todayCount++;
                if(order.status === "Done") totalSale += parseFloat(order.total || 0);
            }

            let status = (order.status || "Pending").trim();
            let isCancelled = status.toLowerCase().includes("cancel");

            let mainActionBtn = "";
            if (status === "Awaiting Payment" || status === "Pending") {
                mainActionBtn = `<button onclick="updateStatus('${order.token}', 'Received', this)" style="width:100%; margin-top:12px; background:#3498db; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">PAID (REC) ✅</button>`;
            } else if (status === "Received") {
                mainActionBtn = `<button onclick="updateStatus('${order.token}', 'Preparing', this)" style="width:100%; margin-top:12px; background:#e67e22; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">PREPARE 👨‍🍳</button>`;
            } else if (status === "Preparing") {
                mainActionBtn = `<button onclick="updateStatus('${order.token}', 'Ready', this)" style="width:100%; margin-top:12px; background:#f1c40f; color:black; border:none; padding:10px; border-radius:8px; font-weight:bold;">READY 🔔</button>`;
            } else if (status === "Ready") {
                mainActionBtn = `<button onclick="verifyOTP('${order.token}')" style="width:100%; margin-top:12px; background:#25D366; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">DELIVER 🎁</button>`;
            }

            html += `
                <div class="order-card" style="border-left: 5px solid ${getStatusColor(status)};">
                    <span class="status-badge" style="background:${getStatusColor(status)}; color:${status === 'Ready' ? '#000':'#fff'}">${status}</span>
                    <div style="color:var(--gold); font-size:11px; font-weight:bold;">TOKEN ${order.token}</div>
                    <div style="font-size:16px; font-weight:bold; color:#fff; margin:4px 0;">${order.name}</div>
                    <div style="font-size:13px; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin:10px 0;">${order.items}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-size:20px; font-weight:bold; color:var(--gold);">₹${order.total}</div>
                        <div style="display:flex; gap:8px;">
                            <button onclick='window.downloadAdminBillByData(${JSON.stringify(order)})' style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:10px; padding:4px 10px; border-radius:6px; cursor:pointer; font-weight:bold;">📥 BILL</button>
                            ${!isCancelled ? `<button onclick='window.shareBillOnWAByData(${JSON.stringify(order)})' style="background:none; border:1px solid #25D366; color:#25D366; font-size:10px; padding:4px 10px; border-radius:6px; cursor:pointer; font-weight:bold;">💬 SHARE</button>` : ""}
                            ${status !== "Done" && !isCancelled ? `<button onclick="updateStatus('${order.token}', 'Cancelled By Admin', this)" style="background:rgba(255,68,68,0.1); border:1px solid #ff4444; color:#ff4444; font-size:10px; padding:4px 10px; border-radius:6px; cursor:pointer;">CANCEL ❌</button>` : ""}
                        </div>
                    </div>
                    ${mainActionBtn}
                </div>`;
        });
        
        document.getElementById('admin-orders-list').innerHTML = html || "<div style='text-align:center; padding:40px; opacity:0.5;'>No Orders Today.</div>";
        document.getElementById('admin-total-orders').innerText = todayCount;
        document.getElementById('admin-total-sale').innerText = totalSale.toLocaleString();
    }

    // --- OTHER UTILS ---
    window.updateStatus = function(token, status, btn, otp = "") {
        if(btn) { btn.innerText = "⏳..."; btn.disabled = true; }
        fetch(adminBridge, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ token: token, status: status, otp: otp })
        }).then(() => setTimeout(refreshAdminData, 1200));
    };

    function getStatusColor(s) {
        const st = (s || "").toLowerCase();
        if(st === "done") return "#25D366";
        if(st.includes("cancel")) return "#ff4444";
        if(st === "ready") return "#f1c40f";
        if(st === "preparing") return "#e67e22";
        if(st === "received") return "#3498db";
        return "#D4AF37";
    }

    window.logoutAdmin = function() {
        if(confirm("Logout?")) { localStorage.removeItem('isAdminLoggedIn'); location.reload(); }
    };

    setInterval(refreshAdminData, 15000);
    refreshAdminData();
</script>
