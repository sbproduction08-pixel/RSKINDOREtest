<div class="admin-panel-wrapper" style="padding-bottom: 50px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
        <div style="background: linear-gradient(45deg, #af8d19, #f1d36d); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: #3a0d0d; font-weight: 800;">Total Tokens Today</div>
            <div id="admin-total-orders" style="font-size: 26px; font-weight: bold; color: #000;">0</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; text-align: center;">
            <div style="font-size: 10px; color: var(--gold); font-weight: 800;">Estimated Sale</div>
            <div style="font-size: 26px; font-weight: bold; color: var(--gold);">₹<span id="admin-total-sale">0</span></div>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="font-family: 'Marcellus', serif; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 10px; margin: 0; font-size: 16px;">Live Kitchen Feed</h3>
        <button onclick="refreshAdminData()" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 10px; padding: 4px 10px; border-radius: 4px;">🔄 Refresh</button>
    </div>
    
    <div id="admin-orders-list" style="display: flex; flex-direction: column; gap: 20px;">
        <div style="text-align: center; padding: 40px; color: #555;">👑 Loading Royal Data...</div>
    </div>
</div>

<audio id="kitchenBell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>

<style>
    .order-card {
        background: rgba(255,255,255,0.03);
        border: 2px solid rgba(212,175,55,0.25); /* Border wapas aa gaya */
        padding: 18px;
        border-radius: 15px;
        position: relative;
        margin-bottom: 5px;
    }
    .status-badge {
        font-size: 9px; padding: 4px 10px; border-radius: 50px; text-transform: uppercase; font-weight: 800;
        position: absolute; top: 15px; right: 15px;
    }
    .status-pending { background: #af8d19; color: #000; }
    .status-cancelled { background: #3a0d0d; color: #ff4444; border: 1px solid #ff4444; }
    .status-done { background: #1a3a1d; color: #25D366; border: 1px solid #25D366; }
    .order-time { font-size: 10px; color: #888; margin-top: 5px; font-weight: bold; }
    .cust-info { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; display: block; }
    .cust-phone { font-size: 11px; color: var(--gold); margin-bottom: 8px; display: block; }
</style>

<script>
    const adminBridge = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';
    let lastKnownToken = parseInt(localStorage.getItem('lastProcessedToken')) || 0;
    const bell = document.getElementById('kitchenBell');

    function refreshAdminData() {
        const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
        const script = document.createElement('script');
        script.id = 'jsonp-temp-script';
        window[callbackName] = function(data) {
            renderOrders(data);
            delete window[callbackName];
            if(document.getElementById('jsonp-temp-script')) document.getElementById('jsonp-temp-script').remove();
        };
        script.src = adminBridge + "?action=readAdmin&callback=" + callbackName;
        document.body.appendChild(script);
    }

    function renderOrders(orders) {
        const list = document.getElementById('admin-orders-list');
        let html = ""; let totalSale = 0; let todayCount = 0; let currentMaxToken = 0;
        const todayStr = new Date().toDateString();

        orders.reverse().forEach(order => {
            const dateObj = new Date(order.date);
            const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const todayStr = new Date().toDateString();
            
            if(dateObj.toDateString() === todayStr) {
                todayCount++;
                if(order.status === "Done") totalSale += parseFloat(order.total || 0);
                if(parseInt(order.token) > currentMaxToken) currentMaxToken = parseInt(order.token);
            }

            // --- Dynamic Button & Status Logic ---
            let status = order.status.trim();
            let statusClass = "status-pending";
            let actionButtons = "";
            let cancelButton = "";

            // Status wise color and buttons
            if (status === "Awaiting Payment") {
                statusClass = "status-pending"; // Orange-ish
                actionButtons = `<button onclick="updateStatus('${order.token}', '${order.name}', 'Received')" style="background:#3498db; color:white; border:none; padding:8px 12px; border-radius:8px; font-weight:bold; cursor:pointer;">PAID ✅</button>`;
            } else if (status === "Received") {
                statusClass = "status-received"; // Blue
                actionButtons = `<button onclick="updateStatus('${order.token}', '${order.name}', 'Preparing')" style="background:#e67e22; color:white; border:none; padding:8px 12px; border-radius:8px; font-weight:bold; cursor:pointer;">START COOKING 👨‍🍳</button>`;
            } else if (status === "Preparing") {
                statusClass = "status-preparing"; // Dark Orange
                actionButtons = `<button onclick="updateStatus('${order.token}', '${order.name}', 'Ready')" style="background:#f1c40f; color:black; border:none; padding:8px 12px; border-radius:8px; font-weight:bold; cursor:pointer;">READY 🔔</button>`;
            } else if (status === "Ready") {
                statusClass = "status-ready"; // Yellow
                actionButtons = `<button onclick="verifyOTP('${order.token}', '${order.name}')" style="background:#25D366; color:white; border:none; padding:8px 12px; border-radius:8px; font-weight:bold; cursor:pointer;">DELIVER (OTP) 🎁</button>`;
            } else if (status === "Done") {
                statusClass = "status-done"; // Green
            } else if (status.includes("Cancelled")) {
                statusClass = "status-cancelled"; // Red
            }

            // Cancel button logic (Only till Preparing)
            if (status !== "Done" && status !== "Ready" && !status.includes("Cancelled")) {
                cancelButton = `<button onclick="updateStatus('${order.token}', '${order.name}', 'Cancelled By Admin')" style="background:#3a0d0d; color:#ff4444; border:1px solid #ff4444; padding:8px 12px; border-radius:8px; font-size:11px; cursor:pointer;">CANCEL</button>`;
            }

            html += `
                <div class="order-card" style="border: 2px solid ${status === 'Ready' ? '#f1c40f' : 'rgba(212,175,55,0.25)'};">
                    <span class="status-badge ${statusClass}">${status}</span>
                    <div style="color: var(--gold); font-size: 11px; font-weight:bold;">TOKEN #${order.token}</div>
                    <span class="cust-info">${order.name}</span>
                    <span class="cust-phone">📱 ${order.phone}</span>
                    <div class="order-items">${order.items}</div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <span style="font-weight:bold; color:var(--gold); font-size:18px;">₹${order.total}</span>
                            <div class="order-time">🕒 ${timeStr}</div>
                        </div>
                        <div style="display:flex; gap:8px;">
                            ${cancelButton}
                            ${actionButtons}
                        </div>
                    </div>
                </div>
            `;
        });
        list.innerHTML = html;
        document.getElementById('admin-total-orders').innerText = todayCount;
        document.getElementById('admin-total-sale').innerText = totalSale.toLocaleString();
    }

    document.addEventListener('click', () => { bell.pause(); bell.currentTime = 0; }, {once: false});

    // OTP verification function
    window.verifyOTP = function(token, name) {
        let otp = prompt("Customer se OTP puchiye:");
        if(!otp) return;
        updateStatus(token, name, 'Done', otp);
    };

    window.updateStatus = function(token, name, status, otp = "") {
        if(!confirm(status + " Token #" + token + "?")) return;
        const url = adminBridge + "?token=" + token + "&status=" + encodeURIComponent(status) + "&otp=" + otp;
        fetch(url, { method: 'POST', mode: 'no-cors' })
        .then(() => {
            alert("Updated!");
            setTimeout(refreshAdminData, 1000);
        });
    };

    setInterval(refreshAdminData, 30000);
    refreshAdminData();
</script>
