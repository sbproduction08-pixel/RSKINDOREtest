<div id="dashboard-container" style="max-width: 500px; margin: auto; padding: 10px; font-family: 'Marcellus', serif; color: white;">
    
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; background: rgba(212, 175, 55, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.3);">
        <div>
            <h2 id="welcome-name" style="color: #d4af37; margin: 0; font-size: 18px;">Namaste!</h2>
            <p id="user-phone-disp" style="font-size: 11px; opacity: 0.7; margin: 0; color: #fff;"></p>
        </div>
        <button onclick="window.logout()" style="background: transparent; border: 1px solid #ff4444; color: #ff4444; padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; cursor: pointer;">Logout</button>
    </div>

    <div id="live-tracker" style="display: none; background: linear-gradient(145deg, rgba(30,30,30,0.9), rgba(10,10,10,1)); border: 2px solid #d4af37; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #d4af37; margin-bottom: 10px;">👑 Current Order Status 👑</div>
        <h1 id="order-status" style="margin: 10px 0; font-size: 32px; text-shadow: 0 0 15px rgba(212,175,55,0.4);">⌛ LOADING...</h1>
        
        <div style="background: rgba(212,175,55,0.08); padding: 20px; border-radius: 15px; border: 1px solid rgba(212,175,55,0.2); margin-top: 20px;">
            <div style="font-size: 11px; opacity: 0.8; letter-spacing: 1px;">SHOW THIS OTP AT COUNTER</div>
            <div id="order-otp" style="font-size: 42px; font-weight: bold; letter-spacing: 8px; color: #d4af37; margin: 10px 0;">----</div>
            <div id="order-items-summary" style="font-size: 12px; color: #aaa; font-style: italic;"></div>
        </div>
    </div>

    <div id="profile-setup" style="display: none; background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px solid #444; text-align: center;">
        <h3 style="color: var(--gold);">Complete Your Royal Profile</h3>
        <p style="font-size: 12px; color: #888;">Ek baar details bhar dein, phir lifetime tension khatam!</p>
        
        <input type="number" id="new-phone" placeholder="WhatsApp Number" style="width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #d4af37; background: #000; color: white; text-align: center; font-size: 16px;">
        <input type="text" id="new-pref" placeholder="Taste Preference (e.g. Less Spicy)" style="width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: white; text-align: center;">
        
        <button onclick="saveRoyalProfile()" style="width: 95%; background: linear-gradient(gold, #b8860b); color: black; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer;">SAVE PROFILE 👑</button>
    </div>

    <div id="no-order" style="display: none; text-align: center; padding: 40px; opacity: 0.5;">
        <p>Aapka koi active order nahi hai.</p>
        <button onclick="showTab('menu')" style="background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold;">Order Now 🍲</button>
    </div>
    <div id="order-history-section" style="margin-top: 30px; border-top: 1px solid rgba(212,175,55,0.2); padding-top: 20px;">
    <h3 style="color: #d4af37; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px;">📜 Your Royal History</h3>
    <div id="history-list" style="display: flex; flex-direction: column; gap: 12px;">
        <p style="font-size: 11px; opacity: 0.5;">Loading your past treats...</p>
    </div>
    
    <div id="bill-download-area" style="display: none; margin-top: 25px; padding: 15px; border-top: 1px dashed rgba(212,175,55,0.3);">
    <p style="font-size: 12px; color: #aaa; margin-bottom: 10px;">Aapka Royal Bill taiyar hai!</p>
    <button onclick="downloadLatestBill()" style="background: linear-gradient(45deg, #af8d19, #f1d36d); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(175, 141, 25, 0.4);">
        <span style="font-size: 18px;">📥</span> DOWNLOAD GST BILL
    </button>
</div>

</div>

<script>
    // --- GLOBAL STATE ---
    let currentActiveOrder = null;
    let lastKnownStatus = "";

    // --- 1. INITIALIZE ENGINE ---
    function initDashboard() {
        const userName = localStorage.getItem('userName');
        const userPhone = localStorage.getItem('userPhone');

        if (userName) {
            // Personalized Greeting
            const firstName = userName.split(' ')[0];
            document.getElementById('welcome-name').innerText = "Namaste, " + firstName + "!";
            document.getElementById('user-phone-disp').innerText = "📱 " + (userPhone || "No Phone Linked");
            
            // Layout Logic: Profile Setup vs Live Tracker
            if (!userPhone || userPhone === "" || userPhone === "null") {
                document.getElementById('profile-setup').style.display = 'block';
                document.getElementById('live-tracker').style.display = 'none';
                document.getElementById('no-order').style.display = 'none';
                document.getElementById('order-history-section').style.display = 'none';
            } else {
                document.getElementById('profile-setup').style.display = 'none';
                document.getElementById('order-history-section').style.display = 'block';
                // Trigger Background Sync
                startTracking();
            }
        }
    }

    // --- 2. FAST IMAGE CONVERTER (For PDF Branding) ---
    async function getBase64ImageFromURL(url) {
        try {
            const res = await fetch(url);
            const blob = await res.blob();
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        } catch (e) {
            console.warn("Logo Image skip: " + e);
            return null;
        }
    }

    // --- 3. LIVE ORDER & STATUS SYNC ---
    function startTracking() {
        const phone = localStorage.getItem('userPhone');
        // Pure JSON API call for speed
        const gasUrl = "https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec?action=readAdmin";

        fetch(gasUrl)
            .then(response => response.json())
            .then(data => {
                // Filter all orders for current user
                const allMyOrders = data.filter(order => order.phone == phone).reverse();
                
                // Identify the Current Active Order
                const liveOrder = allMyOrders.find(o => 
                    !o.status.toLowerCase().includes('done') && 
                    !o.status.toLowerCase().includes('cancel')
                );

                if (liveOrder) {
                    currentActiveOrder = liveOrder;
                    
                    document.getElementById('live-tracker').style.display = 'block';
                    document.getElementById('no-order').style.display = 'none';
                    
                    const statusText = liveOrder.status.toUpperCase();
                    document.getElementById('order-status').innerText = statusText;
                    document.getElementById('order-otp').innerText = liveOrder.otp || "WAIT";

                    // ✅ FEATURE: TIMER STOP LOGIC
                    // Jaise hi status 'Awaiting' se aage badhe, timer khatam
                    const statusCheck = liveOrder.status.toLowerCase();
                    if (statusCheck !== "awaiting payment" && statusCheck !== "pending") {
                        if (window.cancelTimerInterval) {
                            clearInterval(window.cancelTimerInterval);
                            localStorage.removeItem('timerStartTime');
                            if(document.getElementById('cancel-timer-display')) {
                                document.getElementById('cancel-timer-display').style.display = 'none';
                            }
                        }
                    }

                    // Status Change Alert (Console for now)
                    if (lastKnownStatus !== "" && lastKnownStatus !== statusText) {
                        console.log("Status Changed: " + statusText);
                    }
                    lastKnownStatus = statusText;

                } else {
                    document.getElementById('live-tracker').style.display = 'none';
                    document.getElementById('no-order').style.display = 'block';
                }

                // ✅ FEATURE: UPDATE HISTORY LIST
                renderHistory(allMyOrders);

                // Auto Refresh Loop (15 seconds)
                setTimeout(startTracking, 15000);
            })
            .catch(error => {
                console.error("Data Sync Error:", error);
                setTimeout(startTracking, 10000);
            });
    }

    // --- 4. ROYAL HISTORY RENDERER ---
    function renderHistory(orders) {
        const historyList = document.getElementById('history-list');
        let htmlRows = "";

        orders.forEach(order => {
            const currentStatus = order.status.toLowerCase();
            
            // History only shows Completed or Cancelled orders
            if (currentStatus.includes('done') || currentStatus.includes('cancel')) {
                
                const isCancelled = currentStatus.includes('cancel');
                const orderDate = new Date(order.date).toLocaleDateString('en-GB');

                htmlRows += `
                    <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border-left: 4px solid ${isCancelled ? '#ff4444' : '#d4af37'}; margin-bottom: 8px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-size: 10px; color: #888;">${orderDate} | TOKEN #${order.token}</div>
                                <div style="font-size: 13px; color: #fff; margin: 3px 0; font-weight: bold;">${order.items}</div>
                                <div style="font-size: 10px; font-weight: 800; color: ${isCancelled ? '#ff4444' : '#25D366'}">
                                    ${order.status.toUpperCase()}
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <div style="color: #d4af37; font-weight: bold; font-size: 16px;">₹${order.total}</div>
                                ${!isCancelled ? 
                                    `<button onclick='generateRoyalBill(${JSON.stringify(order)})' style="background:none; border: 1px solid #d4af37; color:#d4af37; padding:4px 10px; border-radius:6px; font-size:10px; margin-top:8px; cursor:pointer; font-weight: bold;">BILL 📥</button>` 
                                    : ''
                                }
                            </div>
                        </div>
                    </div>
                `;
            }
        });

        historyList.innerHTML = htmlRows || "<p style='font-size:11px; opacity:0.4; text-align:center;'>No past royal orders found.</p>";
    }

    // --- 5. PROFESSIONAL GST PDF GENERATOR ---
    window.generateRoyalBill = async function(orderData) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');

        // Logo & Branding Setup
        const logoData = await getBase64ImageFromURL('logo.png');

        // Gold Header Border
        doc.setDrawColor(184, 134, 11);
        doc.setLineWidth(1.2);
        doc.line(10, 10, 200, 10);

        if (logoData) {
            doc.addImage(logoData, 'PNG', 15, 15, 25, 25);
        }

        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.setTextColor(30, 30, 30);
        doc.text("ROYAL STREET KITCHEN", 45, 25);
        
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(100, 100, 100);
        doc.text("Mahalakshmi Nagar, Indore (MP) | GSTIN: [YAHAN_GST_DAALEIN]", 45, 31);
        doc.text("Customer Support: +91 7489999890", 45, 36);

        // Invoice Details Table
        doc.autoTable({
            startY: 45,
            body: [
                ['Token No:', `#${orderData.token}`, 'Date:', new Date(orderData.date).toLocaleDateString()],
                ['Customer:', orderData.name.toUpperCase(), 'Status:', 'PAID & DELIVERED']
            ],
            theme: 'plain',
            styles: { fontSize: 10, cellPadding: 2 }
        });

        // Main Billing Table
        doc.autoTable({
            startY: 65,
            head: [['Description', 'Qty', 'Total (INR)']],
            body: [[orderData.items, "1", "Rs. " + orderData.total]],
            theme: 'grid',
            headStyles: { fillColor: [184, 134, 11] },
            styles: { fontSize: 11, cellPadding: 5 }
        });

        // Grand Total Calculation
        let finalY = doc.lastAutoTable.finalY + 15;
        doc.setFontSize(16);
        doc.setTextColor(184, 134, 11);
        doc.text(`GRAND TOTAL: Rs. ${orderData.total}/-`, 190, finalY, { align: "right" });

        // Footer Message
        doc.setFontSize(10);
        doc.setFont("helvetica", "italic");
        doc.setTextColor(120, 120, 120);
        doc.text("Visit again to experience the royalty in every bite!", 105, finalY + 30, { align: "center" });

        // Save & Download
        doc.save(`RSK_Bill_Token_${orderData.token}.pdf`);
    };

    // --- 6. LIVE BILL DOWNLOAD BUTTON (Dashboard Trigger) ---
    window.downloadLatestBill = function() {
        if (currentActiveOrder) {
            generateRoyalBill(currentActiveOrder);
        } else {
            alert("Order data loading... Please wait.");
        }
    };

    // --- 7. PROFILE HANDLER ---
    window.saveRoyalProfile = function() {
        const phoneVal = document.getElementById('new-phone').value;
        const prefVal = document.getElementById('new-pref').value;
        
        if (phoneVal.length < 10) {
            return alert("Kripya 10 anko ka sahi number daalein!");
        }
        
        localStorage.setItem('userPhone', phoneVal);
        if (prefVal) {
            localStorage.setItem('userPreference', prefVal);
        }
        
        alert("Royal Profile Save Ho Gaya Hai! 👑");
        location.reload(); 
    };

    // --- 8. INITIALIZE START ---
    initDashboard();

</script>
