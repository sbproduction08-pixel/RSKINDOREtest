<div id="dashboard-container" style="max-width: 500px; margin: auto; padding: 10px; font-family: 'Marcellus', serif; color: white;">
    
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; background: rgba(212, 175, 55, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.3);">
        <div>
            <h2 id="welcome-name" style="color: #d4af37; margin: 0; font-size: 18px;">Namaste!</h2>
            <p id="user-phone-disp" style="font-size: 11px; opacity: 0.7; margin: 0; color: #fff;"></p>
        </div>
        <button onclick="window.logout()" style="background: transparent; border: 1px solid #ff4444; color: #ff4444; padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; cursor: pointer;">Logout</button>
    </div>

    <div id="live-tracker" style="display: none; background: linear-gradient(145deg, rgba(30,30,30,0.9), rgba(10,10,10,1)); border: 2px solid #d4af37; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        
        <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #d4af37; margin-bottom: 10px;">👑 Current Order Status 👑</div>
        <h1 id="order-status" style="margin: 10px 0; font-size: 28px; text-shadow: 0 0 15px rgba(212,175,55,0.4);">⌛ LOADING...</h1>
        
        <div style="background: rgba(212,175,55,0.08); padding: 20px; border-radius: 15px; border: 1px solid rgba(212,175,55,0.2); margin-top: 10px;">
            <div style="font-size: 11px; opacity: 0.8; letter-spacing: 1px;">SHOW THIS OTP AT COUNTER</div>
            <div id="order-otp" style="font-size: 42px; font-weight: bold; letter-spacing: 8px; color: #d4af37; margin: 10px 0;">----</div>
            <div id="order-items-summary" style="font-size: 12px; color: #aaa; font-style: italic;"></div>
        </div>

        <div id="status-line-container" style="margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; border: 1px solid rgba(212,175,55,0.1);">
            <div style="display: flex; justify-content: space-between; position: relative;">
                <div style="position: absolute; top: 12px; left: 8%; right: 8%; height: 2px; background: #333; z-index: 1;"></div>
                <div id="gold-progress" style="position: absolute; top: 12px; left: 8%; width: 0%; height: 2px; background: #d4af37; box-shadow: 0 0 10px #d4af37; z-index: 2; transition: 1s;"></div>
                
                <div class="shahi-step active" style="z-index:3; text-align:center;">
                    <div class="dot" style="width:10px; height:10px; background:#d4af37; border-radius:50%; margin:0 auto;"></div>
                    <div style="font-size:7px; margin-top:5px; color:#d4af37;">PLACED</div>
                </div>
                <div class="shahi-step" style="z-index:3; text-align:center;">
                    <div class="dot" id="dot-received" style="width:10px; height:10px; background:#333; border-radius:50%; margin:0 auto;"></div>
                    <div style="font-size:7px; margin-top:5px; color:#555;">RECEIVED</div>
                </div>
                <div class="shahi-step" style="z-index:3; text-align:center;">
                    <div class="dot" id="dot-cooking" style="width:10px; height:10px; background:#333; border-radius:50%; margin:0 auto;"></div>
                    <div style="font-size:7px; margin-top:5px; color:#555;">COOKING</div>
                </div>
                <div class="shahi-step" style="z-index:3; text-align:center;">
                    <div class="dot" id="dot-ready" style="width:10px; height:10px; background:#333; border-radius:50%; margin:0 auto;"></div>
                    <div style="font-size:7px; margin-top:5px; color:#555;">READY</div>
                </div>
                <div class="shahi-step" style="z-index:3; text-align:center;">
                    <div class="dot" id="dot-done" style="width:10px; height:10px; background:#333; border-radius:50%; margin:0 auto;"></div>
                    <div style="font-size:7px; margin-top:5px; color:#555;">DONE</div>
                </div>
            </div>
        </div>

        <div id="bill-download-area" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(212,175,55,0.3);">
            <button onclick="downloadLatestBill()" style="background: linear-gradient(45deg, #af8d19, #f1d36d); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; font-size: 12px;">📥 DOWNLOAD GST BILL</button>
        </div>
    </div>

    <div id="profile-setup" style="display: none; background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px solid #444; text-align: center;">
        <h3 style="color: #d4af37;">Complete Your Royal Profile</h3>
        <input type="number" id="new-phone" placeholder="WhatsApp Number" style="width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #d4af37; background: #000; color: white; text-align: center;">
        <input type="text" id="new-pref" placeholder="Taste Preference" style="width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: white; text-align: center;">
        <button onclick="saveRoyalProfile()" style="width: 95%; background: linear-gradient(gold, #b8860b); color: black; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px;">SAVE PROFILE 👑</button>
    </div>

    <div id="no-order" style="display: none; text-align: center; padding: 40px; opacity: 0.5;">
        <p>Aapka koi active order nahi hai.</p>
        <button onclick="showTab('menu')" style="background: #d4af37; color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold;">Order Now 🍲</button>
    </div>

    <div id="order-history-section" style="margin-top: 30px; border-top: 1px solid rgba(212,175,55,0.2); padding-top: 20px;">
        <h3 style="color: #d4af37; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px;">📜 Your Royal History</h3>
        <div id="history-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
    </div>
</div>

<script>
    // --- GLOBAL STATE ---
    var rskLiveOrder = null; 
    var lastKnownStatus = "";
    const gasUrl = "https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec";
    
    // ADDITION: Royal Notification Sound (Tring-Tring)
    const rskNotificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2045/2045-preview.mp3');

    function initDashboard() {
        const userName = localStorage.getItem('userName');
        const userPhone = localStorage.getItem('userPhone');

        if (userName) {
            const firstName = userName.split(' ')[0];
            document.getElementById('welcome-name').innerText = "Namaste, " + firstName + "!";
            document.getElementById('user-phone-disp').innerText = "📱 " + (userPhone || "No Phone Linked");
            
            if (!userPhone || userPhone === "" || userPhone === "null") {
                document.getElementById('profile-setup').style.display = 'block';
                document.getElementById('live-tracker').style.display = 'none';
                document.getElementById('no-order').style.display = 'none';
                document.getElementById('order-history-section').style.display = 'none';
            } else {
                document.getElementById('profile-setup').style.display = 'none';
                document.getElementById('order-history-section').style.display = 'block';
                startTracking(); 
            }
        }
    }

    function startTracking() {
        const phone = localStorage.getItem('userPhone');
        if (!phone) return;

        fetch(gasUrl + "?action=readAdmin")
            .then(res => res.json())
            .then(data => {
                const allMyOrders = data.filter(o => o.phone == phone).reverse();
                const liveOrder = allMyOrders.find(o => !o.status.toLowerCase().includes('done') && !o.status.toLowerCase().includes('cancel'));

                if (liveOrder) {
                    // ADDITION: Agar status change ho toh "Tring-Tring" bajao
                    if (lastKnownStatus !== "" && lastKnownStatus !== liveOrder.status) {
                        rskNotificationSound.play().catch(e => console.log("Sound enabled after first click"));
                    }
                    lastKnownStatus = liveOrder.status;
                    
                    rskLiveOrder = liveOrder;
                    document.getElementById('live-tracker').style.display = 'block';
                    document.getElementById('no-order').style.display = 'none';
                    
                    renderLiveTracker(liveOrder);

                    // --- UPDATION: Received hote hi Cancel Button Gayab ---
                    const s = liveOrder.status.toLowerCase();
                    const cancelBar = document.getElementById('cancel-bar');
                    
                    if (s.includes('received') || s.includes('preparing') || s.includes('ready')) {
                        if (cancelBar) {
                            cancelBar.style.display = 'none';
                            if (window.cancelInterval) clearInterval(window.cancelInterval);
                            localStorage.removeItem('timerStartTime');
                        }
                    }
                } else {
                    document.getElementById('live-tracker').style.display = 'none';
                    document.getElementById('no-order').style.display = 'block';
                    lastKnownStatus = ""; // Reset status
                }
                renderHistory(allMyOrders);
                setTimeout(startTracking, 10000); 
            })
            .catch(err => {
                console.log("Tracking Error:", err);
                setTimeout(startTracking, 5000);
            });
    }

    function renderLiveTracker(liveOrder) {
        const trackerDiv = document.getElementById('live-tracker');
        const s = liveOrder.status.toLowerCase();
        
        trackerDiv.innerHTML = `
            <div style="background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(0,0,0,0.5)); border: 1.5px dashed #d4af37; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 0 15px rgba(212,175,55,0.2);">
                <div style="font-size: 11px; color: #888; letter-spacing: 2px;">SHOW THIS OTP AT COUNTER</div>
                <div style="font-size: 38px; font-weight: 900; color: #fff; margin: 10px 0; text-shadow: 0 0 10px rgba(212,175,55,0.5);">${liveOrder.otp || 'WAIT'}</div>
                <div style="font-size: 14px; color: #d4af37; font-weight: bold;">STATUS: <span id="order-status">${liveOrder.status.toUpperCase()}</span></div>
            </div>

            <div style="margin-bottom: 20px; padding: 0 10px;">
                <div style="height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden;">
                    <div id="gold-progress" style="height: 100%; width: 0%; background: linear-gradient(90deg, #d4af37, #f1c40f); transition: width 1s ease;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 10px; color: #d4af37; margin-top: 8px; font-weight:bold;">
                    <span id="step-received">RECEIVED</span><span id="step-cooking">PREPARING</span><span id="step-ready">READY</span>
                </div>
            </div>
        `;
        syncRoyalProgress(liveOrder.status);
    }

    function syncRoyalProgress(status) {
        const s = status.toLowerCase();
        const bar = document.getElementById('gold-progress');
        if (!bar) return;
        if (s.includes('received')) bar.style.width = '33%';
        else if (s.includes('preparing')) bar.style.width = '66%';
        else if (s.includes('ready')) bar.style.width = '100%';
        else if (s.includes('pending')) bar.style.width = '10%';
    }

    function renderHistory(orders) {
        const historyList = document.getElementById('history-list');
        let html = "";
        const historyItems = orders.filter(o => o.status.toLowerCase().includes('done') || o.status.toLowerCase().includes('cancel'));
        
        historyItems.forEach((order) => {
            const isCancelled = order.status.toLowerCase().includes('cancel');
            html += `
                <div style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border-left: 4px solid ${isCancelled ? '#ff4444' : '#d4af37'}; margin-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-size: 10px; color: #888;">TOKEN ${order.token}</div>
                            <div style="font-size: 12px; color: #fff; margin: 3px 0;">${order.items}</div>
                            <div style="font-size: 10px; font-weight: bold; color: ${isCancelled ? '#ff4444' : '#25D366'}">${order.status.toUpperCase()}</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="color: #d4af37; font-weight: bold;">₹${order.total}</div>
                            ${!isCancelled ? `<button onclick='window.generateRoyalBill(${JSON.stringify(order)})' style="background:var(--gold); color:#000; border:none; padding:5px 12px; border-radius:8px; font-size:11px; margin-top:8px; cursor:pointer; font-weight:bold;">BILL 📥</button>` : ''}
                        </div>
                    </div>
                </div>`;
        });
        historyList.innerHTML = html || "<p style='font-size:11px; opacity:0.5; text-align:center;'>No past orders found.</p>";
    }

    window.generateRoyalBill = function(order) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: 'a5' });
        try {
            doc.addImage('https://sbproduction08-pixel.github.io/royalstreetkitchen.png', 'PNG', 0, 0, 148, 25);
        } catch(e) { 
            doc.setFontSize(18); doc.text("ROYAL STREET KITCHEN", 74, 15, {align: "center"}); 
        }
        doc.setFontSize(10); doc.text("GSTIN: 23ABCDE1234F1Z5", 74, 35, {align: "center"});
        doc.text(`Token: #${order.token}`, 12, 48);
        doc.text(`Description: ${order.items}`, 12, 60);
        doc.setFontSize(14); doc.text(`TOTAL: ₹${order.total}/-`, 135, 90, { align: "right" });
        doc.save(`RSK_Bill_${order.token}.pdf`);
    };

    window.saveRoyalProfile = function() {
        const phoneVal = document.getElementById('new-phone').value;
        if (phoneVal.length < 10) return alert("Sahi number daalein!");
        localStorage.setItem('userPhone', phoneVal);
        alert("Saved! 👑");
        location.reload(); 
    };

    initDashboard();
</script>
