<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Street Kitchen | RSK Indore</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --royal-red: #3a0d0d; }
        
        body { margin: 0; background: var(--black); background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* --- HEADER --- */
        header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(212,175,55,0.3); }
        .main-logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 20px var(--gold); }
        h1 { font-family: 'Marcellus', serif; color: var(--gold); margin: 15px 0 5px; letter-spacing: 2px; text-transform: uppercase; }
        .i-love-ind { width: 120px; margin-top: 5px; filter: drop-shadow(0 0 5px var(--gold)); }

        /* --- STICKY NAV LINE --- */
        .bottom-nav { position: sticky; top: 0; z-index: 2000; width: 100%; background: rgba(15, 12, 5, 0.95); border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; padding: 15px 0; backdrop-filter: blur(10px); }
        .nav-item { color: #888; font-size: 11px; text-transform: uppercase; font-weight: 800; cursor: pointer; letter-spacing: 1px; transition: 0.3s; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; text-shadow: 0 0 10px var(--gold); }

        /* --- CONTENT AREA --- */
        .app-container { max-width: 500px; margin: 0 auto; min-height: 70vh; padding: 15px; padding-bottom: 50px; }
        #content-area { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- INSTA JUMPU --- */
        .insta-jumpu { position: fixed; bottom: 30px; right: 20px; z-index: 1001; width: 55px; height: 55px; border-radius: 50%; background: #fff; display: flex; justify-content: center; align-items: center; animation: jump 3s infinite; box-shadow: 0 0 15px var(--gold); text-decoration: none; }
        @keyframes jump { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-25px);} 60% {transform: translateY(-12px);} }

        /* --- FOOTER --- */
        .footer-section { text-align: center; padding: 30px 20px; border-top: 1px solid rgba(212,175,55,0.2); background: rgba(0,0,0,0.5); }
        .fssai-main { width: 180px; margin-bottom: 15px; }
        .sub-logos { display: flex; justify-content: center; gap: 25px; align-items: center; }
        .sub-logos img { height: 40px; filter: grayscale(1) invert(1); }
    </style>
</head>
<body>

<header>
    <img src="MAIN_LOGO.jpeg" class="main-logo" alt="RSK Logo">
    <h1>Royal Street Kitchen</h1>
    <img src="i_love_ind.png" class="i-love-ind" alt="I Love Indore">
</header>

<div class="bottom-nav">
    <div class="nav-item" id="btn-home" onclick="showTab('home')">Home</div>
    <div class="nav-item" id="btn-menu" onclick="showTab('menu')">Menu</div>
    <div class="nav-item" id="btn-safar" onclick="showTab('safar')">Safar</div>
    <div class="nav-item" id="btn-reach" onclick="showTab('reach')">Reach</div>
</div>

<div class="app-container" id="content-area">
    </div>

<a href="https://www.instagram.com/rsk.indore/" class="insta-jumpu" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="30">
</a>

<div class="footer-section">
    <img src="FSSAI_Logo.png" class="fssai-main">
    <div class="sub-logos">
        <img src="msme_logo.avif" alt="MSME">
        <img src="Swachh_Bharat_Mission_Logo.png.png" alt="Swachh Bharat">
    </div>
</div>

<script>
    function showTab(tabId) {
        // 1. Navigation highlight
        var navItems = document.getElementsByClassName('nav-item');
        for (var i = 0; i < navItems.length; i++) { 
            navItems[i].classList.remove('active'); 
        }
        
        const activeBtn = document.getElementById('btn-' + tabId);
        if(activeBtn) activeBtn.classList.add('active');

        // 2. Content area mein loading dikhao
        const contentArea = document.getElementById('content-area');
        contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>👑 Loading...</div>";

        // 3. Fetch ka sahi rasta (Path)
        // ./ lagane se ye usi folder mein dhoondega
        fetch('./' + tabId + '-tab.html')
            .then(response => {
                if (!response.ok) throw new Error("File Missing");
                return response.text();
            })
            .then(data => {
                contentArea.innerHTML = data;
            })
            .catch(err => {
                console.error(err);
                contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>File '" + tabId + "-tab.html' nahi mili. GitHub par naam check karein.</div>";
            });

        localStorage.setItem('activeTab', tabId);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    window.onload = function() {
        var savedTab = localStorage.getItem('activeTab') || 'home';
        showTab(savedTab);
    };
</script>
    
</body>
</html>
