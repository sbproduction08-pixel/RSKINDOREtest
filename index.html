    <style>
        /* --- 1. THE SHAHI THEME COLORS --- */
        :root { 
            --gold: #D4AF37; 
            --black: #0a0a0a; 
            --royal-red: #3a0d0d; 
            --gold-glow: rgba(212, 175, 55, 0.6); 
            --fire: #ff4500;
        }

        /* --- 2. GLOBAL RESET & BASE STYLING --- */
        body { 
            margin: 0; 
            padding: 0;
            background: var(--black); 
            background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
        }

        /* --- 3. ROYAL HEADER & ANIMATIONS --- */
        header { 
            padding: 30px 10px; 
            text-align: center; 
            border-bottom: 2px solid rgba(212,175,55,0.3); 
            position: relative;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: row; 
            justify-content: space-around; 
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap; 
        }

        .logo-box { 
            position: relative; 
            flex-shrink: 0; 
            width: 85px; 
            height: 85px; 
        }

        .main-logo { 
            position: relative; 
            width: 75px; 
            height: 75px; 
            border-radius: 50%; 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 15px var(--gold); 
            cursor: pointer; 
            z-index: 10; 
            background: #000; 
        }

        .fire-motion { 
            position: absolute; 
            top: -5px; 
            left: -5px; 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            border: 3px solid var(--fire); 
            filter: blur(1px); 
            box-shadow: 0 0 15px var(--fire), inset 0 0 10px var(--fire); 
            animation: burn 3s linear infinite; 
            z-index: 5; 
        }
        
        @keyframes burn { 
            0% { transform: rotate(0deg) scale(1); opacity: 0.8; } 
            50% { transform: rotate(180deg) scale(1.1); opacity: 0.5; } 
            100% { transform: rotate(360deg) scale(1); opacity: 0.8; } 
        }

        .title-wrapper { 
            position: relative; 
            flex-grow: 1; 
            max-width: 500px; 
            display: flex; 
            justify-content: center; 
        }

        .royal-title-img { 
            width: 100%; 
            max-width: 500px; 
            filter: drop-shadow(0 0 10px var(--gold)); 
            animation: titlePulse 3s infinite ease-in-out; 
        }
        
        @keyframes titlePulse { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
        }

        /* --- 4. LOGIN & USER PANEL --- */
        .user-panel { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            margin-top: 15px; 
            min-height: 40px; 
        }

        #welcome-user { 
            color: var(--gold); 
            font-weight: bold; 
            font-size: 17px; 
            font-family: 'Marcellus', serif; 
        }
        
        #loginBtn { 
            background: linear-gradient(45deg, #8a6d3b, #D4AF37, #f1d36d); 
            color: #000; 
            border: 1px solid #5c4013; 
            padding: 10px 30px; 
            border-radius: 30px; 
            font-weight: 800; 
            cursor: pointer; 
        }

        #logoutBtn { 
            background: rgba(20, 20, 20, 0.8); 
            color: #ff4444; 
            border: 1px solid #ff4444; 
            display: none; 
            padding: 8px 20px; 
            border-radius: 30px; 
            cursor: pointer; 
        }

        /* --- 5. STICKY NAVIGATION --- */
        .bottom-nav { 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
            width: 100%; 
            background: rgba(15, 12, 5, 0.95); 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            justify-content: space-around; 
            padding: 15px 0; 
            backdrop-filter: blur(10px); 
        }

        .nav-item { 
            color: #888; 
            font-size: 11px; 
            text-transform: uppercase; 
            font-weight: 800; 
            cursor: pointer; 
        }

        .nav-item.active { 
            color: var(--gold); 
            border-bottom: 2px solid var(--gold); 
        }

        /* --- 6. MAIN CONTENT WRAPPER --- */
        .app-container { 
            max-width: 500px; 
            margin: 0 auto; 
            min-height: 65vh; 
            padding: 15px; 
            padding-bottom: 120px; 
        }

        /* --- 7. FLOATING ELEMENTS & CHECKOUT --- */
        #floatingCheckout { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #1a1a1a; 
            border-top: 2px solid #D4AF37; 
            padding: 15px; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 9999; 
            box-sizing: border-box;
        }

        #cancel-bar { 
            display: none; 
            background: rgba(0,0,0,0.9); 
            border: 1px solid var(--gold); 
            padding: 15px; 
            margin: 10px; 
            border-radius: 10px; 
            text-align: center;
            position: sticky;
            top: 70px;
            z-index: 3000;
        }

        /* --- 8. ROYAL SOCIAL FLOATING ICONS --- */
        #royal-social-float { 
            position: fixed; 
            right: 20px; 
            bottom: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            z-index: 9999; 
        }

        .social-icon { 
            width: 50px; 
            height: 50px; 
            background: var(--black); 
            border: 2px solid var(--gold); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 0 10px var(--gold-glow); 
            text-decoration: none; 
            transition: transform 0.3s; 
            animation: royalJump 3s infinite ease-in-out; 
        }

        .social-icon img { width: 28px; height: 28px; }

        @keyframes royalJump { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }

        /* --- 9. SHAHI SIDE DRAWER --- */
        #side-drawer { 
            position: fixed; 
            top: 0; 
            right: -280px; 
            width: 260px; 
            height: 100%; 
            background: rgba(10, 10, 10, 0.98); 
            border-left: 2px solid var(--gold); 
            z-index: 5000; 
            transition: 0.4s ease-in-out; 
            padding: 30px 20px; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.8); 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        #side-drawer.open { right: 0; }

        .drawer-item { 
            color: #fff; 
            font-family: 'Marcellus', serif; 
            font-size: 18px; 
            padding: 15px; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }

        #drawer-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); 
            display: none; 
            z-index: 4500; 
            backdrop-filter: blur(5px); 
        }

        .footer-section { text-align: center; padding: 50px 20px; color: #555; font-size: 10px; }
    </style>
</head>

    <div id="royal-social-float">

    <script>
        /**
         * 1. GLOBAL STATE & CONFIG
         */
        window.cart = JSON.parse(localStorage.getItem('userCart')) || []; 
        let cancelInterval;
        const bridgeUrl = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';

        /**
         * 2. SHAHI TAB ENGINE
         * Manages tab switching and script injection
         */
        function showTab(tabId) {
            // UI Update
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const activeBtn = document.getElementById('btn-' + tabId);
            if(activeBtn) activeBtn.classList.add('active');
            
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = "<div style='text-align:center; padding:50px; color:var(--gold);'>👑 Shahi Section Khul Raha Hai...</div>";
            
            // Fetch Tab Data
            fetch('./' + tabId + '-tab.html?v=' + Date.now())
            .then(res => res.text())
            .then(data => {
                contentArea.innerHTML = data;
                updateUserUI();
                
                // Re-execute scripts inside the tab
                const scripts = contentArea.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.textContent = oldScript.textContent; 
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            })
            .catch(err => { 
                console.error("Tab Load Error:", err);
                contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>Swagatam!</div>"; 
            });

            // Persistence
            if(tabId !== 'admin') localStorage.setItem('activeTab', tabId);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        /**
         * 3. USER INTERFACE UPDATER
         */
        function updateUserUI() {
            const userName = localStorage.getItem('userName');
            const welcomeSpan = document.getElementById('welcome-user');
            if(welcomeSpan) {
                welcomeSpan.innerHTML = userName ? "Namaste, " + userName + "! ✨" : "";
            }
            document.getElementById('loginBtn').style.display = userName ? 'none' : 'inline-block';
            document.getElementById('logoutBtn').style.display = userName ? 'inline-block' : 'none';
            const trackBtn = document.getElementById('trackBtn');
            if(trackBtn) trackBtn.style.display = userName ? 'inline-block' : 'none';
        }

        /**
         * 🛡️ 4. THE ROYAL GATEKEEPER CHECKOUT
         * Audits inventory before proceeding with order
         */
        window.checkout = async function() {
            // Check Login
            if(!localStorage.getItem('userName')) { 
                alert("Pehle Login Karein!"); 
                return window.registerUser(); 
            }
            
            const uPhone = localStorage.getItem('userPhone');
            if(!uPhone || uPhone === "null") { 
                alert("Mobile number missing! Dashboard mein update karein."); 
                return showTab('dashboard'); 
            }
            
            if(window.cart.length === 0) return alert("Aapki cart khali hai!");

            const btn = document.getElementById('orderNowBtn');
            btn.innerText = "processing... 🛡️"; 
            btn.disabled = true;

            try {
                // Step 1: Stock Audit
                const invRes = await fetch(bridgeUrl + "?action=getInventory");
                const stockStatus = await invRes.json();
                let outItems = [];

                window.cart.forEach(item => {
                    let cleanName = item.name.split(' (')[0].trim(); 
                    if (stockStatus[cleanName] === "Out" || stockStatus[item.name] === "Out") {
                        outItems.push(item.name);
                    }
                });

                if (outItems.length > 0) {
                    alert(`🛑 MAAF KIJIYE!\n\nYe items khatam ho gaye hain:\n- ${outItems.join('\n- ')}\n\nHumne inhe cart se hata diya hai.`);
                    window.cart = window.cart.filter(i => !outItems.includes(i.name));
                    updateCartUI();
                    btn.innerText = "Order Now"; 
                    btn.disabled = false;
                    return; 
                }

                // Step 2: Order Booking
                btn.innerText = "BOOKING... 👑";
                const tokenRes = await fetch(bridgeUrl);
                const nextToken = await tokenRes.text(); 
                
                let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
                let itemsStr = window.cart.map(i => `${i.name} x${i.qty}`).join(', ');

                const finalUrl = bridgeUrl + 
                    "?token=" + encodeURIComponent(nextToken) + 
                    "&name=" + encodeURIComponent(localStorage.getItem('userName')) + 
                    "&phone=" + encodeURIComponent(uPhone) + 
                    "&items=" + encodeURIComponent(itemsStr) + 
                    "&total=" + total + 
                    "&status=Awaiting%20Payment";

                await fetch(finalUrl, { method: 'POST', mode: 'no-cors' });

                // Step 3: Confirmation
                localStorage.setItem('lastTokenNo', nextToken);
                let waMsg = `*ROYAL STREET KITCHEN* 👑%0A---------------------%0A*Token:* %23${nextToken}%0A*Order:* ${itemsStr}%0A*Total: ₹${total}*`;
                window.open(`https://wa.me/917489999890?text=${waMsg}`, '_blank');

                alert("Waah! Order place ho gaya hai. Token #" + nextToken);
                window.cart = []; 
                updateCartUI();
                showTab('dashboard'); 
                startCancelTimer(300, true);

            } catch (err) {
                console.error("Checkout Fail:", err);
                alert("Technical Error! Dubara koshish karein.");
            } finally {
                btn.innerText = "Order Now"; 
                btn.disabled = false;
            }
        };

        /**
         * 5. TIMER & CANCELLATION ENGINE
         */
        function startCancelTimer(duration, isNew = false) {
            clearInterval(cancelInterval);
            let startTime = isNew ? Date.now() : parseInt(localStorage.getItem('timerStartTime'));
            if (isNew) localStorage.setItem('timerStartTime', startTime);
            
            const token = localStorage.getItem('lastTokenNo');
            if(!token || !startTime) return;

            document.getElementById('last-token').innerText = token;
            document.getElementById('cancel-bar').style.display = 'block';

            cancelInterval = setInterval(async function () {
                let rem = duration - Math.floor((Date.now() - startTime) / 1000);
                
                // Status Sync every 15s
                if (rem % 15 === 0 && rem > 0) {
                    try {
                        const res = await fetch(bridgeUrl + "?action=readAdmin");
                        const data = await res.json();
                        const myOrder = data.find(o => o.token === token);
                        if (myOrder && !["awaiting payment", "pending", ""].includes(myOrder.status.toLowerCase())) {
                            stopAndHideTimer(); return;
                        }
                    } catch(e) {}
                }

                if (rem <= 0) { 
                    stopAndHideTimer(); 
                } else {
                    let m = Math.floor(rem / 60), s = rem % 60;
                    document.getElementById('timer-display').textContent = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                }
            }, 1000);
        }

        function stopAndHideTimer() {
            clearInterval(cancelInterval);
            const bar = document.getElementById('cancel-bar');
            if(bar) bar.style.display = 'none';
            localStorage.removeItem('lastTokenNo'); 
            localStorage.removeItem('timerStartTime');
        }

        window.cancelOrder = function() {
            const token = localStorage.getItem('lastTokenNo');
            const name = localStorage.getItem('userName');
            if(!token || !confirm("Aap ye order cancel karna chahte hain?")) return;
            
            fetch(bridgeUrl, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: new URLSearchParams({token, name, status: 'Cancelled By User'}).toString() 
            });

            window.open(`https://wa.me/917489999890?text=*CANCELLED* ❌%0A*Token:* ${encodeURIComponent(token)}`, '_blank');
            stopAndHideTimer(); 
            alert("Cancelled Successfully!");
        };

        /**
         * 6. CART SYSTEM
         */
        window.addToCart = function(name, price) {
            if(!localStorage.getItem('userName')) return window.registerUser();
            const ex = window.cart.find(i => i.name === name);
            if (ex) { ex.qty += 1; } else { window.cart.push({ name, price, qty: 1 }); }
            updateCartUI();
        };

        window.removeFromCart = function(name) {
            const idx = window.cart.findIndex(i => i.name === name);
            if (idx > -1) { 
                if (window.cart[idx].qty > 1) { window.cart[idx].qty -= 1; } 
                else { window.cart.splice(idx, 1); } 
            }
            updateCartUI();
        };

        function updateCartUI() {
            const bar = document.getElementById('floatingCheckout');
            const totalDisp = document.getElementById('cart-total-display');
            let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            
            if (window.cart.length > 0) {
                bar.style.display = 'flex'; 
                totalDisp.innerText = total;
                document.getElementById('cart-items-list').innerHTML = window.cart.map(i => `
                    <div style="display:flex;justify-content:space-between;margin-bottom:4px;align-items:center;">
                        <span>${i.name} x${i.qty}</span>
                        <button onclick="window.removeFromCart('${i.name}')" style="color:red;border:none;background:none;font-weight:bold;cursor:pointer;">-</button>
                    </div>`).join('');
                document.getElementById('royal-social-float').style.display = 'none';
            } else {
                bar.style.display = 'none'; 
                document.getElementById('royal-social-float').style.display = 'flex';
            }
            localStorage.setItem('userCart', JSON.stringify(window.cart));
        }

        /**
         * 7. ADMIN & DRAWER UTILS
         */
        window.handleAdminAccess = function() {
            window.clickCnt = (window.clickCnt || 0) + 1;
            setTimeout(() => window.clickCnt = 0, 3000);
            if (window.clickCnt === 3) {
                if (prompt("Admin Key:") === "RSK@2026") { 
                    localStorage.setItem('isAdminLoggedIn', 'true'); 
                    showTab('admin'); 
                }
            }
        };

        function toggleSideMenu() {
            const d = document.getElementById('side-drawer');
            const o = document.getElementById('drawer-overlay');
            d.classList.toggle('open');
            o.style.display = d.classList.contains('open') ? 'block' : 'none';
        }

        window.onload = () => { 
            let tab = localStorage.getItem('isAdminLoggedIn') === 'true' ? 'admin' : (localStorage.getItem('activeTab') || 'home');
            showTab(tab); updateUserUI(); 
            if(localStorage.getItem('lastTokenNo')) startCancelTimer(300, false);
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const fbConfig = { 
            apiKey: "AIzaSyDGbHAorUN14LmXtRCd1IYzKQzP8hP02AE", 
            authDomain: "rsk-test-63cee.firebaseapp.com", 
            projectId: "rsk-test-63cee", 
            storageBucket: "rsk-test-63cee.firebasestorage.app", 
            messagingSenderId: "805798855186", 
            appId: "1:805798855186:web:9b0d09decca344a9478ecb" 
        };

        const app = initializeApp(fbConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        window.auth = auth;

        window.registerUser = async () => {
            try {
                const res = await signInWithPopup(auth, new GoogleAuthProvider());
                const user = res.user;
                const uDoc = await getDoc(doc(db, "users", user.uid));
                if (!uDoc.exists()) {
                    let phoneNum = prompt("Aapka WhatsApp Number?");
                    if(phoneNum && phoneNum.length >= 10) {
                        await setDoc(doc(db, "users", user.uid), { name: user.displayName, email: user.email, phone: phoneNum, joinedAt: serverTimestamp() });
                        localStorage.setItem('userName', user.displayName); 
                        localStorage.setItem('userPhone', phoneNum);
                    }
                } else {
                    localStorage.setItem('userName', uDoc.data().name); 
                    localStorage.setItem('userPhone', uDoc.data().phone);
                }
                location.reload();
            } catch (e) { alert("Auth failed! " + e.message); }
        };

        window.logout = async () => { 
            if(confirm("Logout?")) { 
                await signOut(auth); 
                localStorage.clear(); 
                location.reload(); 
            } 
        };
    </script>
</body>
</html>
