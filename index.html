<div id="floatingCheckout">
    <div style="flex: 1; padding-right: 10px;">
        <div id="cart-items-list" style="font-size: 11px; color: #fff; margin-bottom: 8px; max-height: 80px; overflow-y: auto;"></div>
        
        <div style="font-size: 10px; color: var(--gold); text-transform: uppercase;">Total Amount</div>
        <div style="font-size: 18px; font-weight: bold; color: var(--gold);">₹<span id="cart-total-display">0</span></div>
    </div>
    <button onclick="window.checkout()" class="checkout-btn">Order on WhatsApp</button>
</div>

<script>
    window.cart = []; 

    // --- Tab Switching Logic ---
    function showTab(tabId) {
        var navItems = document.getElementsByClassName('nav-item');
        for (var i = 0; i < navItems.length; i++) { navItems[i].classList.remove('active'); }
        const activeBtn = document.getElementById('btn-' + tabId);
        if(activeBtn) activeBtn.classList.add('active');

        const contentArea = document.getElementById('content-area');
        contentArea.innerHTML = "<div style='text-align:center; padding:50px; color:var(--gold);'>👑 Loading...</div>";

        fetch('./' + tabId + '-tab.html?v=' + Date.now())
            .then(res => res.text())
            .then(data => {
                contentArea.innerHTML = data;
                updateUserUI(); 
                const scripts = contentArea.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            })
            .catch(err => { contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>Swagat Hai!</div>"; });

        localStorage.setItem('activeTab', tabId);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // --- User Auth UI ---
    function updateUserUI() {
        const userName = localStorage.getItem('userName');
        const welcomeDiv = document.getElementById('welcome-user');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        if(userName) {
            welcomeDiv.innerHTML = "Namaste, " + userName + "! ✨";
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
        } else {
            welcomeDiv.innerHTML = "";
            loginBtn.style.display = 'inline-block';
            logoutBtn.style.display = 'none';
        }
    }

    window.registerUser = function() {
        let name = prompt("Aapka Naam?");
        let phone = prompt("Aapka WhatsApp Number?");
        if(name && phone && phone.length >= 10) {
            localStorage.setItem('userName', name);
            localStorage.setItem('userPhone', phone);
            updateUserUI();
            alert("Login Safal! Ab aap order kar sakte hain.");
        }
    };

    window.logout = function() {
        if(confirm("Logout karna chahte hain?")) {
            localStorage.clear();
            location.reload();
        }
    };

    // --- Cart Logic (ADD with LOGIN Check) ---
    window.addToCart = function(name, price) {
        // Step 1: Login Check
        const user = localStorage.getItem('userName');
        if(!user) {
            alert("Pehle Login/Register karein!");
            window.registerUser();
            return;
        }

        const existingItem = window.cart.find(item => item.name === name);
        if (existingItem) {
            existingItem.qty += 1;
        } else {
            window.cart.push({ name: name, price: price, qty: 1 });
        }
        updateCartUI();
    };

    // --- Cart Logic (REMOVE from Bar) ---
    window.removeFromCart = function(name) {
        const itemIndex = window.cart.findIndex(item => item.name === name);
        if (itemIndex > -1) {
            if (window.cart[itemIndex].qty > 1) {
                window.cart[itemIndex].qty -= 1;
            } else {
                window.cart.splice(itemIndex, 1);
            }
        }
        updateCartUI();
    };

    function updateCartUI() {
        const bar = document.getElementById('floatingCheckout');
        const totalDisp = document.getElementById('cart-total-display');
        const itemsListDisp = document.getElementById('cart-items-list');
        
        let total = window.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        if (window.cart.length > 0) {
            bar.style.display = 'flex';
            totalDisp.innerText = total;

            // List with Minus Buttons
            itemsListDisp.innerHTML = window.cart.map(item => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:4px;">
                    <span>${item.name} (x${item.qty})</span>
                    <button onclick="window.removeFromCart('${item.name}')" style="background:#ff4444; color:white; border:none; border-radius:30%; width:18px; height:18px; font-size:12px; cursor:pointer; line-height:1;">-</button>
                </div>
            `).join('');
        } else {
            bar.style.display = 'none';
        }
    }

    window.checkout = function() {
        let uName = localStorage.getItem('userName') || "Guest";
        let uPhone = localStorage.getItem('userPhone') || "N/A";
        
        if(window.cart.length === 0) return alert("Pehle kuch add karein!");

        let today = new Date().toDateString();
        let lastDate = localStorage.getItem('tokenDate');
        let count = parseInt(localStorage.getItem('dailyCount')) || 0;
        if (lastDate !== today) { count = 1; localStorage.setItem('tokenDate', today); } 
        else { count++; }
        localStorage.setItem('dailyCount', count);
        let tokenNo = count.toString().padStart(2, '0');

        let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
        let itemDetails = window.cart.map((i, idx) => `*${idx+1}.* ${i.name} x ${i.qty} = ₹${i.price * i.qty}`).join('%0A');

        // WhatsApp message with User Details
        let message = `*ROYAL STREET KITCHEN* 👑%0A━━━━━━━━━━━━━━━%0A*Token No:* %23${tokenNo}%0A*Customer:* ${uName}%0A*Mobile:* ${uPhone}%0A━━━━━━━━━━━━━━━%0A*Order Details:*%0A${itemDetails}%0A━━━━━━━━━━━━━━━%0A*Grand Total: ₹${total}*%0A━━━━━━━━━━━━━━━%0A_Order verified via RSK App_`;

        window.open(`https://wa.me/917489999890?text=${message}`, '_blank');
        window.cart = [];
        updateCartUI();
    };

    window.onload = () => { showTab(localStorage.getItem('activeTab') || 'home'); };
</script>
