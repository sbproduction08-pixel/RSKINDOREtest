    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Street Kitchen | RSK Indore</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #0a0a0a; 
            --royal-red: #3a0d0d; 
            --gold-glow: rgba(212, 175, 55, 0.6); 
            --fire: #ff4500;
        }

        body { 
            margin: 0; 
            background: var(--black); 
            background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
        }

        /* --- HEADER SECTION --- */
        header { 
            padding: 30px 10px; 
            text-align: center; 
            border-bottom: 2px solid rgba(212,175,55,0.3); 
            position: relative;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: row; 
            justify-content: space-around; 
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap; 
        }

        .logo-box { position: relative; flex-shrink: 0; width: 85px; height: 85px; }
        .main-logo { position: relative; width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 15px var(--gold); cursor: pointer; z-index: 10; background: #000; }
        .fire-motion { position: absolute; top: -5px; left: -5px; width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--fire); filter: blur(1px); box-shadow: 0 0 15px var(--fire), inset 0 0 10px var(--fire); animation: burn 3s linear infinite; z-index: 5; }
        
        @keyframes burn { 0% { transform: rotate(0deg) scale(1); opacity: 0.8; } 50% { transform: rotate(180deg) scale(1.1); opacity: 0.5; } 100% { transform: rotate(360deg) scale(1); opacity: 0.8; } }

        .title-wrapper { position: relative; flex-grow: 1; max-width: 500px; display: flex; justify-content: center; }
        .royal-title-img { width: 100%; max-width: 500px; filter: drop-shadow(0 0 10px var(--gold)); animation: titlePulse 3s infinite ease-in-out; }
        
        @keyframes titlePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .user-panel { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 15px; min-height: 40px; }
        #welcome-user { color: var(--gold); font-weight: bold; font-size: 17px; font-family: 'Marcellus', serif; }
        
        #loginBtn { background: linear-gradient(45deg, #8a6d3b, #D4AF37, #f1d36d); color: #000; border: 1px solid #5c4013; padding: 10px 30px; border-radius: 30px; font-weight: 800; cursor: pointer; }
        #logoutBtn { background: rgba(20, 20, 20, 0.8); color: #ff4444; border: 1px solid #ff4444; display: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }

        /* --- ACTIVE ORDER BAR --- */
        #cancel-bar { 
            display: none; 
            background: rgba(0,0,0,0.9); 
            border: 1px solid var(--gold); 
            padding: 15px; 
            margin: 10px; 
            border-radius: 10px; 
            text-align: center;
            position: sticky;
            top: 70px;
            z-index: 3000;
        }

        .bottom-nav { position: sticky; top: 0; z-index: 2000; width: 100%; background: rgba(15, 12, 5, 0.95); border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; padding: 15px 0; backdrop-filter: blur(10px); }
        .nav-item { color: #888; font-size: 11px; text-transform: uppercase; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .app-container { max-width: 500px; margin: 0 auto; min-height: 65vh; padding: 15px; padding-bottom: 120px; }
        #floatingCheckout { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-top: 2px solid #D4AF37; padding: 15px; display: none; justify-content: space-between; align-items: center; z-index: 9999; }
        
        .footer-section { text-align: center; padding: 50px 20px; background: linear-gradient(to bottom, #1a1a1a, #2a0a0a); border-top: 3px solid var(--gold); margin-top: 30px; }
   
    /* Floating Social Bar */
#royal-social-float
{    position: fixed;
    right: 20px;       /* Right se doori */
    bottom: 30px;      /* Niche se doori */
    display: flex;
    flex-direction: column;
    gap: 12px;         /* Icons ke beech ka gap */
    z-index: 9999;
}

.social-icon {
    width: 50px;
    height: 50px;
    background: var(--black);
    border: 2px solid var(--gold); /* Royal Gold Boundary */
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 10px var(--gold-glow);
    text-decoration: none;
    transition: transform 0.3s;
    animation: royalJump 3s infinite ease-in-out; /* Jumping Animation */
}

.social-icon img {
    width: 28px;
    height: 28px;
}

/* Har icon thoda alag time par jump karega */
.wa-icon { animation-delay: 0s; }
.fb-icon { animation-delay: 0.5s; }
.ig-icon { animation-delay: 1s; }

@keyframes royalJump {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); } /* Jump height */
}

.social-icon:hover {
    background: var(--gold);
    box-shadow: 0 0 20px var(--gold);
}

 /* --- SHAHI SIDE DRAWER --- */
#side-drawer {
    position: fixed;
    top: 0;
    right: -280px; /* Shuru mein bahar rahega */
    width: 260px;
    height: 100%;
    background: rgba(10, 10, 10, 0.98);
    border-left: 2px solid var(--gold);
    z-index: 5000;
    transition: 0.4s ease-in-out;
    padding: 30px 20px;
    box-shadow: -10px 0 30px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    gap: 20px;
}

#side-drawer.open { right: 0; } /* Click par andar aayega */

.drawer-item {
    color: #fff;
    font-family: 'Marcellus', serif;
    font-size: 18px;
    padding: 15px;
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 15px;
}

.drawer-item:hover { color: var(--gold); background: rgba(212, 175, 55, 0.1); }

/* Background Blur Overlay */
#drawer-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    z-index: 4500;
    backdrop-filter: blur(5px);
}       
    
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <div class="fire-motion"></div>
        <img src="MAIN_LOGO.jpeg" class="main-logo" onclick="handleAdminAccess()">
    </div>
    <div class="title-wrapper">
        <img src="royalstreetkitchen.png" class="royal-title-img">
    </div>
    <div class="vector-container" style="width:100px;">
        <img src="vectoriloveindore.png" style="width:160%;">
    </div>
</header>

<div class="user-panel">
    <span id="welcome-user"></span>
    <button onclick="window.registerUser()" id="loginBtn">👑 Login with Google 👑</button>
    <button onclick="window.logout()" id="logoutBtn">Logout</button>
    
    <button id="trackBtn" onclick="showTab('dashboard')" style="display:none; background:var(--gold); color:black; border:none; padding:10px 20px; border-radius:30px; font-weight:bold; margin-top:5px;">Track My Order 📍</button>
</div>

<div class="bottom-nav">
    <div class="nav-item" id="btn-home" onclick="showTab('home')">Home</div>
    <div class="nav-item" id="btn-menu" onclick="showTab('menu')">Menu</div>
    <div class="nav-item" id="btn-safar" onclick="showTab('safar')">Safar</div>
    <div class="nav-item" id="btn-reach" onclick="showTab('reach')">Reach</div>
    <div class="nav-item" id="btn-feedback" onclick="showTab('feedback')">Feedback</div>
    <div class="nav-item" id="btn-more" onclick="toggleSideMenu()" style="color: var(--gold); font-size: 18px;">☰</div>
</div>

<div id="cancel-bar">
    <div style="font-size: 12px; color: #fff;">
        🕒 <b>Active Order: Token #<span id="last-token">00</span></b><br>
        Cancel karne ke liye <span id="timer-display" style="color: #ff4444; font-weight: bold;">05:00</span> bache hain.
    </div>
    <button onclick="window.cancelOrder()" style="background:#ff4444; color:white; border:none; padding:8px 15px; border-radius:5px; margin-top:8px; cursor:pointer; font-weight:bold;">Urgent Cancel ❌</button>
</div>

<div class="app-container" id="content-area"></div>

<div id="floatingCheckout">
    <div style="flex: 1; padding-right: 10px;">
        <div id="cart-items-list" style="font-size: 11px; color: #fff; margin-bottom: 8px; max-height: 80px; overflow-y: auto;"></div>
        <div style="font-size: 20px; font-weight: bold; color: #D4AF37;">₹<span id="cart-total-display">0</span></div>
    </div>
    <button onclick="window.checkout()" id="orderNowBtn" style="background: #25D366; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">Order Now</button>
</div>

<div class="footer-section">
    <p>© 2026 ROYAL STREET KITCHEN • RSK INDORE</p>
</div>

    <div id="royal-social-float">
    <a href="https://wa.me/917489999890" class="social-icon wa-icon" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
    </a>
    <a href="https://www.facebook.com/ROYALSTREETKITCHENRSKINDORE" class="social-icon fb-icon" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
    </a>
    <a href="https://www.instagram.com/royalstreetkitchenrskindore/?hl=en" class="social-icon ig-icon" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
    </a>
</div>

<div id="drawer-overlay" onclick="toggleSideMenu()"></div>

<div id="side-drawer">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="royalstreetkitchen.png" style="width: 120px;">
        <p style="color: var(--gold); font-size: 10px; letter-spacing: 2px;">SHAHI PITARA</p>
    </div>

    <div class="drawer-item" onclick="showTab('gallery'); toggleSideMenu()">📸 Shahi Jhalak</div>
    <div class="drawer-item" onclick="showTab('offers'); toggleSideMenu()">🎁 Shahi Saugat</div>
    
    <div style="margin-top: auto; text-align: center; font-size: 10px; color: #555;">
        V 2.0 • ROYAL STREET KITCHEN
    </div>
</div>    
    
<script>
    window.cart = JSON.parse(localStorage.getItem('userCart')) || []; 
    let cancelInterval;
    const bridgeUrl = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';

    // --- TAB SYSTEM ---
    function showTab(tabId) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + tabId);
        if(activeBtn) activeBtn.classList.add('active');
        
        const contentArea = document.getElementById('content-area');
        contentArea.innerHTML = "<div style='text-align:center; padding:50px; color:var(--gold);'>👑 Loading...</div>";
        
        fetch('./' + tabId + '-tab.html?v=' + Date.now())
        .then(res => res.text())
        .then(data => {
            contentArea.innerHTML = data;
            updateUserUI();
            const scripts = contentArea.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        })
        .catch(err => { contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>Welcome!</div>"; });
        
        if(tabId !== 'admin') localStorage.setItem('activeTab', tabId);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

   function updateUserUI() {
    const userName = localStorage.getItem('userName');
    document.getElementById('welcome-user').innerHTML = userName ? "Namaste, " + userName + "! ✨" : "";
    document.getElementById('loginBtn').style.display = userName ? 'none' : 'inline-block';
    document.getElementById('logoutBtn').style.display = userName ? 'inline-block' : 'none';
    document.getElementById('trackBtn').style.display = userName ? 'inline-block' : 'none';
}

    // --- TIMER LOGIC ---
    function startCancelTimer(duration, isNew = false) {
        clearInterval(cancelInterval);
        const display = document.getElementById('timer-display');
        const bar = document.getElementById('cancel-bar');
        const tokenSpan = document.getElementById('last-token');
        
        let startTime;
        if (isNew) {
            startTime = Date.now();
            localStorage.setItem('timerStartTime', startTime);
        } else {
            startTime = parseInt(localStorage.getItem('timerStartTime'));
        }

        const token = localStorage.getItem('lastTokenNo');
        if(!token || !startTime) return;

        tokenSpan.innerText = token;
        bar.style.display = 'block';

        cancelInterval = setInterval(function () {
            let elapsedTime = Math.floor((Date.now() - startTime) / 1000);
            let remainingTime = duration - elapsedTime;

            if (remainingTime <= 0) {
                clearInterval(cancelInterval);
                bar.style.display = 'none';
                localStorage.removeItem('lastTokenNo');
                localStorage.removeItem('timerStartTime');
            } else {
                let minutes = Math.floor(remainingTime / 60);
                let seconds = remainingTime % 60;
                display.textContent = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
            }
        }, 1000);
    }

    // --- ORDER & CANCEL ---
    window.checkout = function() {
        let uName = localStorage.getItem('userName');
        let uPhone = localStorage.getItem('userPhone');
        if(!uName) { alert("Pehle Login Karein!"); return window.registerUser(); }
        if(window.cart.length === 0) return alert("Cart khali hai!");

        const btn = document.getElementById('orderNowBtn');
        btn.innerText = "Processing... ⏳"; btn.disabled = true;

        fetch(bridgeUrl)
        .then(res => res.text())
        .then(currentCount => {
            let nextToken = (parseInt(currentCount) + 1).toString().padStart(2, '0');
            let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            let itemsStr = window.cart.map(i => `${i.name} x${i.qty}`).join(', ');

            fetch(bridgeUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ token: nextToken, name: uName,phone: localStorage.getItem('userPhone'), items: itemsStr, total: total, status: "Pending" })
            });

            localStorage.setItem('lastTokenNo', nextToken);
            startCancelTimer(300, true);
            
            let waMsg = `*ROYAL STREET KITCHEN*%0A*Token:* %23${nextToken}%0A*Order:* ${itemsStr}%0A*Total: ₹${total}*`;
            window.open(`https://wa.me/917489999890?text=${waMsg}`, '_blank');

            window.cart = []; updateCartUI();
            btn.innerText = "Order Now"; btn.disabled = false;
        })
        .catch(() => { 
            alert("Connection Error!"); 
            btn.innerText = "Order Now"; 
            btn.disabled = false; 
        });
    };

    window.cancelOrder = function() {
        const token = localStorage.getItem('lastTokenNo');
        const name = localStorage.getItem('userName');
        if(!token || !name) return alert("Order details missing!");
        
        if(confirm("Order cancel karein?")) {
        // Data ko URL format mein taiyar karna
        const formData = new URLSearchParams();
        formData.append('token', token);
        formData.append('name', name);
        formData.append('status', 'Cancelled By User');

        fetch(bridgeUrl, {
            method: 'POST',
            mode: 'no-cors', 
            body: formData.toString(), // JSON ki jagah string bhej rahe hain
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
        });

            // WhatsApp aur UI logic
        let cancelMsg = `*CANCELLED*%0A*Token:* ${token}`;
            window.open(`https://wa.me/917489999890?text=*CANCELLED*%0A*Token:* ${token}`, '_blank');
            clearInterval(cancelInterval);
            document.getElementById('cancel-bar').style.display = 'none';
            localStorage.removeItem('lastTokenNo');
            localStorage.removeItem('timerStartTime');
            alert("Order Cancelled!");
        }
    };

    // --- AUTH & CART ---
    window.registerUser = function() {
        let name = prompt("Aapka Naam?"); 
        let phone = prompt("WhatsApp Number?");
        if(name && phone && phone.length >= 10) { 
            localStorage.setItem('userName', name); 
            localStorage.setItem('userPhone', phone); 
            updateUserUI(); 
        }
    };

    window.addToCart = function(name, price) {
        if(!localStorage.getItem('userName')) return window.registerUser();
        const existing = window.cart.find(item => item.name === name);
        if (existing) { existing.qty += 1; } else { window.cart.push({ name: name, price: price, qty: 1 }); }
        updateCartUI();
    };

    window.removeFromCart = function(name) {
        const idx = window.cart.findIndex(item => item.name === name);
        if (idx > -1) { if (window.cart[idx].qty > 1) { window.cart[idx].qty -= 1; } else { window.cart.splice(idx, 1); } }
        updateCartUI();
    };

    function updateCartUI() {
    const bar = document.getElementById('floatingCheckout');
    const listDisp = document.getElementById('cart-items-list');
    const totalDisp = document.getElementById('cart-total-display');
    const socialBar = document.getElementById('royal-social-float');
    
    let total = window.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    
    if (window.cart.length > 0) {
        bar.style.display = 'flex'; 
        totalDisp.innerText = total;
        listDisp.innerHTML = window.cart.map(item => `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${item.name} x${item.qty}</span><button onclick="window.removeFromCart('${item.name}')">-</button></div>`).join('');
        
        if(socialBar) socialBar.style.display = 'none';
    } else {
        bar.style.display = 'none';
        if(socialBar) socialBar.style.display = 'flex';
    }
    // Cart ko memory mein save karne ke liye:
    localStorage.setItem('userCart', JSON.stringify(window.cart));
}

    // --- ADMIN ---
    let logoClicks = 0; let clickTimer;
    window.handleAdminAccess = function() {
        logoClicks++; clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { logoClicks = 0; }, 3000);
        if (logoClicks === 3) {
            logoClicks = 0;
            let pass = prompt("🔐 Enter Royal Admin Key:");
            if (pass === "RSK@2026") { showTab('admin'); }
        }
    };

    window.logout = function() { if(confirm("Logout?")) { localStorage.clear(); location.reload(); } };

   // --- INITIAL LOAD ---
    window.onload = () => { 
        let tabToShow = localStorage.getItem('activeTab') || 'home';
        if(localStorage.getItem('isAdminLoggedIn') === 'true') {
            tabToShow = 'admin';
        }
        showTab(tabToShow);
        updateCartUI(); 
        if(localStorage.getItem('lastTokenNo') && localStorage.getItem('timerStartTime')) {
            startCancelTimer(300, false);
        }
    };

    function toggleSideMenu() {
        const drawer = document.getElementById('side-drawer');
        const overlay = document.getElementById('drawer-overlay');
        if (drawer.classList.contains('open')) {
            drawer.classList.remove('open');
            overlay.style.display = 'none';
        } else {
            drawer.classList.add('open');
            overlay.style.display = 'block';
        }
    }   
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp, getDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDGbHAorUN14LmXtRCd1IYzKQzP8hP02AE",
    authDomain: "rsk-test-63cee.firebaseapp.com",
    projectId: "rsk-test-63cee",
    storageBucket: "rsk-test-63cee.firebasestorage.app",
    messagingSenderId: "805798855186",
    appId: "1:805798855186:web:9b0d09decca344a9478ecb",
    measurementId: "G-3YGPTCBQVP"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // --- 👑 ROYAL LOGIN SYSTEM ---
  window.registerUser = async function() {
    const provider = new GoogleAuthProvider();
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      
      // Check if user exists in Firestore
      const userDoc = await getDoc(doc(db, "users", user.uid));
      
      if (!userDoc.exists()) {
        // Naya User: Mobile mangne ke liye Dashboard par bhejo ya yahin prompt karo
        let phone = prompt("Namaste! Aapka WhatsApp number kya hai?");
        if(phone && phone.length >= 10) {
          await setDoc(doc(db, "users", user.uid), {
            name: user.displayName,
            email: user.email,
            phone: phone,
            preference: "Normal",
            joinedAt: serverTimestamp()
          });
          localStorage.setItem('userName', user.displayName);
          localStorage.setItem('userPhone', phone);
        }
      } else {
        // Purana User: Data recover karo
        const userData = userDoc.data();
        localStorage.setItem('userName', userData.name);
        localStorage.setItem('userPhone', userData.phone);
      }
      
      location.reload(); // UI update karne ke liye
    } catch (e) {
      alert("Login Error: " + e.message);
    }
  };

  // --- LOGOUT ---
  window.logout = async function() {
    if(confirm("Logout?")) {
      await signOut(auth);
      localStorage.clear();
      location.reload();
    }
  };

  // --- STATE CHECK ---
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // User is logged in, show Tracker Tab instead of Home if needed
      if(!localStorage.getItem('activeTab')) showTab('dashboard'); 
    }
  });
</script>
