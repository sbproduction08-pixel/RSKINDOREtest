<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Street Kitchen | RSK Indore</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --royal-red: #3a0d0d; }
        body { margin: 0; background: var(--black); background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(212,175,55,0.3); }
        .main-logo { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 20px var(--gold); }
        h1 { font-family: 'Marcellus', serif; color: var(--gold); margin: 10px 0 5px; letter-spacing: 2px; text-transform: uppercase; font-size: 20px; }
        .i-love-ind { width: 100px; margin-top: 5px; filter: drop-shadow(0 0 5px var(--gold)); }

        /* User Auth Panel */
        .user-panel { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; min-height: 30px; }
        #welcome-user { color: var(--gold); font-weight: bold; font-size: 14px; font-family: 'Marcellus', serif; }
        
        .auth-btn { padding: 4px 12px; border-radius: 4px; font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; }
        #loginBtn { background: var(--gold); border: 1px solid var(--gold); color: #000; display: inline-block; }
        #logoutBtn { background: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; color: #ff4444; display: none; }

        .bottom-nav { position: sticky; top: 0; z-index: 2000; width: 100%; background: rgba(15, 12, 5, 0.95); border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; padding: 15px 0; backdrop-filter: blur(10px); }
        .nav-item { color: #888; font-size: 11px; text-transform: uppercase; font-weight: 800; cursor: pointer; letter-spacing: 1px; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; text-shadow: 0 0 10px var(--gold); }

        .app-container { max-width: 500px; margin: 0 auto; min-height: 60vh; padding: 15px; padding-bottom: 80px; }
        #content-area { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .insta-jumpu { position: fixed; bottom: 25px; right: 20px; z-index: 1001; width: 50px; height: 50px; border-radius: 50%; background: #fff; display: flex; justify-content: center; align-items: center; animation: jump 3s infinite; box-shadow: 0 0 15px var(--gold); }
        @keyframes jump { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }

        .footer-section { text-align: center; padding: 30px 20px; border-top: 1px solid rgba(212,175,55,0.2); background: rgba(0,0,0,0.5); }
        .fssai-main { width: 150px; margin-bottom: 15px; }
        .sub-logos img { height: 35px; filter: grayscale(1) invert(1); margin: 0 10px; }
    </style>
</head>
<body>

<header>
    <img src="MAIN_LOGO.jpeg" class="main-logo" alt="RSK Logo">
    <h1>Royal Street Kitchen</h1>
    <img src="i_love_ind.png" class="i-love-ind" alt="I Love Indore">
    
    <div class="user-panel">
        <span id="welcome-user"></span>
        <button onclick="window.registerUser()" id="loginBtn" class="auth-btn">Login / Register</button>
        <button onclick="window.logout()" id="logoutBtn" class="auth-btn">Logout</button>
    </div>
</header>

<div class="bottom-nav">
    <div class="nav-item" id="btn-home" onclick="showTab('home')">Home</div>
    <div class="nav-item" id="btn-menu" onclick="showTab('menu')">Menu</div>
    <div class="nav-item" id="btn-safar" onclick="showTab('safar')">Safar</div>
    <div class="nav-item" id="btn-reach" onclick="showTab('reach')">Reach</div>
</div>

<div class="app-container" id="content-area"></div>

<a href="https://www.instagram.com/rsk.indore/" class="insta-jumpu" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="28">
</a>

<div class="footer-section">
    <img src="FSSAI_Logo.png" class="fssai-main">
    <div class="sub-logos">
        <img src="msme_logo.avif" alt="MSME">
        <img src="Swachh_Bharat_Mission_Logo.png.png" alt="Swachh Bharat">
    </div>
</div>

<script>
    window.cart = []; 

    // --- TAB MANAGEMENT ---
    function showTab(tabId) {
        var navItems = document.getElementsByClassName('nav-item');
        for (var i = 0; i < navItems.length; i++) { navItems[i].classList.remove('active'); }
        const activeBtn = document.getElementById('btn-' + tabId);
        if(activeBtn) activeBtn.classList.add('active');

        const contentArea = document.getElementById('content-area');
        contentArea.innerHTML = "<div style='text-align:center; padding:50px; color:var(--gold);'>👑 Loading Royal Experience...</div>";

        fetch('./' + tabId + '-tab.html?v=' + Date.now())
            .then(res => res.text())
            .then(data => {
                contentArea.innerHTML = data;
                updateUserUI(); 
            })
            .catch(err => {
                contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>File Missing: " + tabId + "</div>";
            });

        localStorage.setItem('activeTab', tabId);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // --- LOGIN/LOGOUT UI LOGIC ---
    function updateUserUI() {
        const userName = localStorage.getItem('userName');
        const welcomeDiv = document.getElementById('welcome-user');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        
        if(userName) {
            if(welcomeDiv) welcomeDiv.innerHTML = "Namaste, " + userName + "! ✨";
            if(loginBtn) loginBtn.style.display = 'none';
            if(logoutBtn) logoutBtn.style.display = 'inline-block';
        } else {
            if(welcomeDiv) welcomeDiv.innerHTML = "";
            if(loginBtn) loginBtn.style.display = 'inline-block';
            if(logoutBtn) logoutBtn.style.display = 'none';
        }
    }

    // --- REGISTRATION & OTP ---
    window.registerUser = function() {
        let name = prompt("Aapka Naam?");
        let phone = prompt("Aapka Mobile Number?");
        
        if(name && phone && phone.length >= 10) {
            let tempOTP = Math.floor(1000 + Math.random() * 9000);
            alert("Verification Code: RSK-" + tempOTP + "\n\nIse WhatsApp par bhejein.");
            
            let verifyMsg = encodeURIComponent("Pranam RSK! Mera Verification Code hai: RSK-" + tempOTP + " (Name: " + name + ")");
            window.open(`https://wa.me/917489999890?text=${verifyMsg}`, '_blank');

            localStorage.setItem('userName', name);
            localStorage.setItem('userPhone', phone);
            updateUserUI();
            return true;
        }
        return false;
    };

    // --- LOGOUT ---
    window.logout = function() {
        if(confirm("Kya aap Logout karna chahte hain?")) {
            localStorage.clear();
            alert("Aap Logout ho gaye hain.");
            location.reload();
        }
    };

    // --- CART & CHECKOUT ---
    window.addToCart = function(name, price) {
        window.cart.push({name, price});
        alert(name + " added! Niche 'Place Order' dabayein.");
        const bar = document.getElementById('floatingCheckout');
        if(bar) bar.style.display = 'flex';
    };

    window.checkout = function() {
        let uName = localStorage.getItem('userName');
        if(!uName) {
            if(!window.registerUser()) return;
            return;
        }

        if(window.cart.length === 0) return alert("Pehle kuch tasty add karein!");

        let tokenNo = Math.floor(Math.random() * 100) + 1; 
        let total = window.cart.reduce((s, i) => s + i.price, 0);
        let items = window.cart.map(i => `- ${i.name}`).join('%0A');

        let message = `*ROYAL STREET KITCHEN* 👑%0A--------------------------%0A*Token No:* %23${tokenNo}%0A*Date:* ${new Date().toLocaleDateString('en-GB')}%0A*Customer:* ${uName}%0A--------------------------%0A*Order:*%0A${items}%0A--------------------------%0A*Total:* ₹${total}%0A--------------------------%0A_Kripya counter par token dikhayein._`;

        window.open(`https://wa.me/917489999890?text=${message}`, '_blank');
        window.cart = [];
        if(document.getElementById('floatingCheckout')) document.getElementById('floatingCheckout').style.display = 'none';
    };

    window.onload = () => showTab(localStorage.getItem('activeTab') || 'home');
</script>
</body>
</html>
