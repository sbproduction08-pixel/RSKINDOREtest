<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Street Kitchen | RSK Indore</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #0a0a0a; 
            --royal-red: #3a0d0d; 
            --gold-glow: rgba(212, 175, 55, 0.6); 
            --fire: #ff4500;
        }

        body { 
            margin: 0; 
            background: var(--black); 
            background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
        }

        /* --- HORIZONTAL ROYAL HEADER SECTION --- */
        header { 
            padding: 25px 5px; 
            text-align: center; 
            border-bottom: 2px solid rgba(212,175,55,0.3); 
            position: relative;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: row; 
            justify-content: space-between; 
            align-items: center;
            gap: 5px;
            flex-wrap: nowrap; 
        }

        /* 1. Main Logo with Fire Motion */
        .logo-box {
            position: relative;
            flex-shrink: 0;
            width: 80px;
            height: 80px;
        }
        .main-logo { 
            position: relative;
            width: 70px; height: 70px; 
            border-radius: 50%; 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 15px var(--gold); 
            cursor: pointer; 
            z-index: 10;
            background: #000;
        }
        .fire-motion {
            position: absolute;
            top: -2px; left: -2px;
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--fire);
            filter: blur(1px);
            box-shadow: 0 0 15px var(--fire), inset 0 0 10px var(--fire);
            animation: burn 3s linear infinite;
            z-index: 5;
        }
        @keyframes burn {
            0% { transform: rotate(0deg) scale(1); opacity: 0.8; }
            50% { transform: rotate(180deg) scale(1.1); opacity: 0.5; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.8; }
        }

        /* 2. Royal Text Image (Center) */
        .title-wrapper {
            position: relative;
            flex-grow: 1;
            min-width: 150px;
            max-width: 450px; /* Isse title katega nahi */
            overflow: visible;
            z-index: 10;
            display: flex;
            justify-content: center;
        }
        .royal-title-img {
            width: 100%;
            max-width: 450px;
            display: block;
            filter: drop-shadow(0 0 10px var(--gold));
            animation: titlePulse 3s infinite ease-in-out;
            transform-origin: center;
        }
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 3. Indore Vector (Right) */
        .vector-container {
            flex-shrink: 0;
            width: 90px;
        }
        .indore-vector { 
            width: 100%; 
            display: block;
            filter: drop-shadow(0 0 8px var(--gold)); 
            animation: heartBeat 1.2s infinite ease-in-out;
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* --- User Panel & Royal Buttons --- */
        .user-panel { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 15px; min-height: 40px; }
        #welcome-user { color: var(--gold); font-weight: bold; font-size: 17px; font-family: 'Marcellus', serif; letter-spacing: 1.5px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); margin-bottom: 5px; }
        
        #loginBtn { 
            background: linear-gradient(45deg, #8a6d3b, #D4AF37, #f1d36d, #8a6d3b);
            background-size: 200% auto;
            color: #000; 
            border: 1px solid #5c4013;
            box-shadow: 0 0 15px var(--gold-glow), inset 0 0 5px rgba(255,255,255,0.5);
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 13px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.5s;
            font-family: 'Marcellus', serif;
            font-weight: 800;
        }
        #loginBtn:hover { background-position: right center; transform: scale(1.05); }

        #logoutBtn { 
            background: rgba(20, 20, 20, 0.8); 
            color: #ff4444; 
            border: 1px solid #ff4444; 
            display: none; 
            padding: 6px 18px; 
            border-radius: 30px;
            font-size: 10px; 
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- Navigation & UI --- */
        .bottom-nav { position: sticky; top: 0; z-index: 2000; width: 100%; background: rgba(15, 12, 5, 0.95); border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; padding: 15px 0; backdrop-filter: blur(10px); }
        .nav-item { color: #888; font-size: 11px; text-transform: uppercase; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; text-shadow: 0 0 10px var(--gold); }

        .app-container { max-width: 500px; margin: 0 auto; min-height: 65vh; padding: 15px; padding-bottom: 120px; }
        
        #cancel-bar { display: none; background: rgba(255, 68, 68, 0.15); border: 1px solid #ff4444; padding: 12px; margin: 10px; border-radius: 10px; text-align: center; animation: fadeIn 0.5s ease; }

        /* --- FOOTER --- */
        .footer-section { text-align: center; padding: 50px 20px; background: linear-gradient(to bottom, #1a1a1a, #2a0a0a); border-top: 3px solid var(--gold); margin-top: 30px; }
        .sub-logos { display: flex; justify-content: center; align-items: center; gap: 30px; }
        .swachh-logo { height: 90px !important; filter: drop-shadow(0 0 10px var(--gold-glow)); }

        #floatingCheckout { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-top: 2px solid #D4AF37; padding: 15px; display: none; justify-content: space-between; align-items: center; z-index: 9999; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <div class="fire-motion"></div>
        <img src="MAIN_LOGO.jpeg" class="main-logo" alt="RSK Logo" onclick="handleAdminAccess()">
    </div>
    <div class="title-wrapper">
        <img src="royalstreetkitchen.png" class="royal-title-img" alt="Royal Street Kitchen Title">
    </div>
    <div class="vector-container">
        <img src="vectoriloveindore.png" class="indore-vector" alt="I Love Indore">
    </div>
</header>

<div class="user-panel">
    <span id="welcome-user"></span>
    <button onclick="window.registerUser()" id="loginBtn">👑 Login / Register 👑</button>
    <button onclick="window.logout()" id="logoutBtn">Logout Account</button>
</div>

<div class="bottom-nav">
    <div class="nav-item" id="btn-home" onclick="showTab('home')">Home</div>
    <div class="nav-item" id="btn-menu" onclick="showTab('menu')">Menu</div>
    <div class="nav-item" id="btn-safar" onclick="showTab('safar')">Safar</div>
    <div class="nav-item" id="btn-reach" onclick="showTab('reach')">Reach</div>
</div>

<div id="cancel-bar">
    <div style="font-size: 12px; color: #fff;">🕒 <b>Active Order: Token #<span id="last-token">00</span></b><br>Cancel karne ke liye <span id="timer-display" style="color: #ff4444; font-weight: bold;">05:00</span> bache hain.</div>
    <button onclick="window.cancelOrder()" style="background:#ff4444; color:white; border:none; padding:5px 15px; border-radius:5px; margin-top:8px; cursor:pointer;">Urgent Cancel ❌</button>
</div>

<div class="app-container" id="content-area"></div>

<div id="floatingCheckout">
    <div style="flex: 1; padding-right: 10px;">
        <div id="cart-items-list" style="font-size: 11px; color: #fff; margin-bottom: 8px;"></div>
        <div style="font-size: 10px; color: #D4AF37;">Total Amount</div>
        <div style="font-size: 20px; font-weight: bold; color: #D4AF37;">₹<span id="cart-total-display">0</span></div>
    </div>
    <button onclick="window.checkout()" id="orderNowBtn" style="background: #25D366; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">Order Now</button>
</div>

<div class="footer-section">
    <img src="FSSAI_Logo.png" style="width: 200px; margin-bottom: 30px;">
    <div class="sub-logos">
        <img src="msme_logo.avif" style="height: 50px; margin-right: 20px;">
        <img src="Swachh_Bharat_Mission_Logo.png.png" class="swachh-logo">
    </div>
    <p style="color:#555; font-size:10px; margin-top:30px;">© 2026 ROYAL STREET KITCHEN • RSK INDORE</p>
</div>

<script>
    window.cart = []; let cancelInterval;
    const bridgeUrl = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';

    function showTab(tabId) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const btn = document.getElementById('btn-' + tabId); if(btn) btn.classList.add('active');
        document.getElementById('content-area').innerHTML = "<div style='text-align:center; padding:50px; color:var(--gold);'>👑 Loading...</div>";
        fetch('./' + tabId + '-tab.html?v=' + Date.now()).then(res => res.text()).then(data => {
            document.getElementById('content-area').innerHTML = data; updateUserUI();
        });
    }

    function updateUserUI() {
        const name = localStorage.getItem('userName');
        document.getElementById('welcome-user').innerHTML = name ? "Namaste, " + name + "! ✨" : "";
        document.getElementById('loginBtn').style.display = name ? 'none' : 'inline-block';
        document.getElementById('logoutBtn').style.display = name ? 'inline-block' : 'none';
    }

    window.checkout = function() {
        let uName = localStorage.getItem('userName');
        const btn = document.getElementById('orderNowBtn');
        btn.innerText = "Wait... ⏳"; btn.disabled = true;

        fetch(bridgeUrl).then(res => res.text()).then(currentCount => {
            let nextToken = (parseInt(currentCount) + 1).toString().padStart(2, '0');
            let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            let itemsStr = window.cart.map(i => `${i.name} x${i.qty}`).join(', ');
            
            const params = new URLSearchParams();
            params.append('token', nextToken);
            params.append('name', uName);
            params.append('items', itemsStr);
            params.append('total', total);

            fetch(bridgeUrl, { method: 'POST', mode: 'no-cors', body: params });
            window.open(`https://wa.me/917489999890?text=*TOKEN: %23${nextToken}*%0AOrder: ${itemsStr}%0ATotal: ₹${total}`, '_blank');
            
            localStorage.setItem('lastTokenNo', nextToken);
            document.getElementById('last-token').innerText = nextToken;
            startCancelTimer(300);
            window.cart = []; updateCartUI();
            btn.innerText = "Order Now"; btn.disabled = false;
        });
    };

    window.cancelOrder = function() {
        const t = localStorage.getItem('lastTokenNo'); const n = localStorage.getItem('userName');
        if(confirm("Order cancel karein?")) {
            const params = new URLSearchParams(); params.append('token', t); params.append('name', n); params.append('status', 'Cancelled');
            fetch(bridgeUrl, { method: 'POST', mode: 'no-cors', body: params });
            clearInterval(cancelInterval); document.getElementById('cancel-bar').style.display = 'none';
            localStorage.removeItem('lastTokenNo'); alert("Cancellation Request Sent!");
        }
    };

    function startCancelTimer(duration) {
        clearInterval(cancelInterval);
        const bar = document.getElementById('cancel-bar'); bar.style.display = 'block';
        let timer = duration;
        cancelInterval = setInterval(() => {
            let m = parseInt(timer / 60, 10); let s = parseInt(timer % 60, 10);
            document.getElementById('timer-display').textContent = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            if (--timer < 0) { clearInterval(cancelInterval); bar.style.display = 'none'; localStorage.removeItem('lastTokenNo'); }
        }, 1000);
    }

    window.registerUser = function() {
        let n = prompt("Naam?"); let p = prompt("WhatsApp?");
        if(n && p) { localStorage.setItem('userName', n); localStorage.setItem('userPhone', p); updateUserUI(); }
    };

    function updateCartUI() {
        const bar = document.getElementById('floatingCheckout');
        const total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
        if (window.cart.length > 0) {
            bar.style.display = 'flex'; document.getElementById('cart-total-display').innerText = total;
            document.getElementById('cart-items-list').innerHTML = window.cart.map(i => `<div>${i.name} x${i.qty}</div>`).join('');
        } else bar.style.display = 'none';
    }

    window.logout = function() { if(confirm("Logout?")) { localStorage.clear(); location.reload(); } };
    window.onload = () => { 
        showTab(localStorage.getItem('activeTab') || 'home');
        const t = localStorage.getItem('lastTokenNo');
        if(t) { document.getElementById('last-token').innerText = t; startCancelTimer(300); }
        else { document.getElementById('cancel-bar').style.display = 'none'; }
    };
</script>
</body>
</html>
