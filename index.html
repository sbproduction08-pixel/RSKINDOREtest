<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Street Kitchen | RSK Indore</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --royal-red: #3a0d0d; --gold-glow: rgba(212, 175, 55, 0.5); }
        body { margin: 0; background: var(--black); background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(212,175,55,0.3); }
        .main-logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 20px var(--gold); }
        h1 { font-family: 'Marcellus', serif; color: var(--gold); margin: 15px 0 5px; letter-spacing: 2px; text-transform: uppercase; font-size: 22px; }
        .i-love-ind { width: 110px; margin-top: 5px; filter: drop-shadow(0 0 5px var(--gold)); }

        .user-panel { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 15px; min-height: 40px; }
        #welcome-user { color: var(--gold); font-weight: bold; font-size: 15px; font-family: 'Marcellus', serif; letter-spacing: 1px; }
        .auth-btn { padding: 8px 20px; border-radius: 30px; font-size: 11px; cursor: pointer; text-transform: uppercase; font-weight: 800; transition: 0.4s; border: 1px solid var(--gold); }
        #loginBtn { background: linear-gradient(45deg, #af8d19, #f1d36d); color: #000; box-shadow: 0 0 10px var(--gold-glow); }
        #logoutBtn { background: transparent; color: #ff4444; border: 1px solid #ff4444; display: none; padding: 4px 12px; font-size: 9px; }

        .bottom-nav { position: sticky; top: 0; z-index: 2000; width: 100%; background: rgba(15, 12, 5, 0.95); border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; padding: 15px 0; backdrop-filter: blur(10px); }
        .nav-item { color: #888; font-size: 11px; text-transform: uppercase; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; text-shadow: 0 0 10px var(--gold); }

        .app-container { max-width: 500px; margin: 0 auto; min-height: 65vh; padding: 15px; padding-bottom: 120px; }
        #content-area { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .insta-jumpu { position: fixed; bottom: 110px; right: 20px; z-index: 2100; width: 50px; height: 50px; border-radius: 50%; background: #fff; display: flex; justify-content: center; align-items: center; animation: jump 3s infinite; box-shadow: 0 0 15px var(--gold); text-decoration: none; }
        @keyframes jump { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }

        .footer-section { text-align: center; padding: 40px 20px; border-top: 1px solid rgba(212,175,55,0.2); background: rgba(0,0,0,0.6); margin-top: 20px; }
        .fssai-main { width: 150px; margin-bottom: 20px; opacity: 0.9; }
        .sub-logos { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .sub-logos img { height: 45px; filter: drop-shadow(0 0 5px var(--gold-glow)); }
    </style>
</head>
<body>

<header>
    <img src="MAIN_LOGO.jpeg" class="main-logo" alt="RSK Logo">
    <h1>Royal Street Kitchen</h1>
    <img src="i_love_ind.png" class="i-love-ind" alt="I Love Indore">
    
    <div class="user-panel">
        <span id="welcome-user"></span>
        <button onclick="window.registerUser()" id="loginBtn" class="auth-btn">✨ Login / Register ✨</button>
        <button onclick="window.logout()" id="logoutBtn" class="auth-btn">Logout</button>
    </div>
</header>

<div class="bottom-nav">
    <div class="nav-item" id="btn-home" onclick="showTab('home')">Home</div>
    <div class="nav-item" id="btn-menu" onclick="showTab('menu')">Menu</div>
    <div class="nav-item" id="btn-safar" onclick="showTab('safar')">Safar</div>
    <div class="nav-item" id="btn-reach" onclick="showTab('reach')">Reach</div>
</div>

<div class="app-container" id="content-area"></div>

<div id="floatingCheckout" style="position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-top: 2px solid #D4AF37; padding: 15px; display: none; justify-content: space-between; align-items: center; z-index: 9999; box-sizing: border-box; box-shadow: 0 -5px 20px rgba(0,0,0,0.8);">
    <div style="flex: 1; padding-right: 10px;">
        <div id="cart-items-list" style="font-size: 11px; color: #fff; margin-bottom: 8px; max-height: 80px; overflow-y: auto;"></div>
        <div style="font-size: 10px; color: #D4AF37; text-transform: uppercase; letter-spacing: 1px;">Total Amount</div>
        <div style="font-size: 20px; font-weight: bold; color: #D4AF37;">₹<span id="cart-total-display">0</span></div>
    </div>
    <button onclick="window.checkout()" style="background: #25D366; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        Order Now
    </button>
</div>

<a href="https://www.instagram.com/rsk.indore/" class="insta-jumpu" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="25">
</a>

<div class="footer-section">
    <img src="FSSAI_Logo.png" class="fssai-main">
    <div class="sub-logos">
        <img src="msme_logo.avif" alt="MSME">
        <img src="Swachh_Bharat_Mission_Logo.png.png" alt="Swachh Bharat">
    </div>
    <p style="font-size: 10px; color: #555; margin-top: 25px;">© 2026 ROYAL STREET KITCHEN • INDORE</p>
</div>

<script>
    window.cart = []; 

    function showTab(tabId) {
        var navItems = document.getElementsByClassName('nav-item');
        for (var i = 0; i < navItems.length; i++) { navItems[i].classList.remove('active'); }
        const activeBtn = document.getElementById('btn-' + tabId);
        if(activeBtn) activeBtn.classList.add('active');

        const contentArea = document.getElementById('content-area');
        contentArea.innerHTML = "<div style='text-align:center; padding:50px; color:var(--gold);'>👑 Loading...</div>";

        fetch('./' + tabId + '-tab.html?v=' + Date.now())
            .then(res => res.text())
            .then(data => {
                contentArea.innerHTML = data;
                updateUserUI(); 
                const scripts = contentArea.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            })
            .catch(err => { contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>Swagat Hai!</div>"; });

        localStorage.setItem('activeTab', tabId);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function updateUserUI() {
        const userName = localStorage.getItem('userName');
        const welcomeDiv = document.getElementById('welcome-user');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        if(userName) {
            welcomeDiv.innerHTML = "Namaste, " + userName + "! ✨";
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
        } else {
            welcomeDiv.innerHTML = "";
            loginBtn.style.display = 'inline-block';
            logoutBtn.style.display = 'none';
        }
    }

    window.registerUser = function() {
        let name = prompt("Aapka Naam?");
        let phone = prompt("Aapka WhatsApp Number?");
        if(name && phone && phone.length >= 10) {
            localStorage.setItem('userName', name);
            localStorage.setItem('userPhone', phone);
            updateUserUI();
            alert("Login Safal!");
        }
    };

    window.logout = function() {
        if(confirm("Logout karna chahte hain?")) {
            localStorage.clear();
            location.reload();
        }
    };

    window.addToCart = function(name, price) {
        if(!localStorage.getItem('userName')) {
            alert("Pehle Login karein!");
            window.registerUser();
            return;
        }
        const existing = window.cart.find(item => item.name === name);
        if (existing) { existing.qty += 1; } 
        else { window.cart.push({ name: name, price: price, qty: 1 }); }
        updateCartUI();
    };

    window.removeFromCart = function(name) {
        const idx = window.cart.findIndex(item => item.name === name);
        if (idx > -1) {
            if (window.cart[idx].qty > 1) { window.cart[idx].qty -= 1; } 
            else { window.cart.splice(idx, 1); }
        }
        updateCartUI();
    };

    function updateCartUI() {
        const bar = document.getElementById('floatingCheckout');
        const totalDisp = document.getElementById('cart-total-display');
        const listDisp = document.getElementById('cart-items-list');
        
        let total = window.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        if (window.cart.length > 0) {
            bar.style.display = 'flex';
            totalDisp.innerText = total;
            listDisp.innerHTML = window.cart.map(item => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; background:rgba(255,255,255,0.08); padding:6px 10px; border-radius:6px; border:1px solid rgba(212,175,55,0.2);">
                    <span style="font-size:12px; color:#fff;">${item.name} <b style="color:#D4AF37;">x${item.qty}</b></span>
                    <button onclick="window.removeFromCart('${item.name}')" style="background:#ff4444; color:white; border:none; border-radius:4px; width:22px; height:22px; font-size:16px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center;">-</button>
                </div>
            `).join('');
        } else {
            bar.style.display = 'none';
        }
    }

    window.checkout = function() {
        let uName = localStorage.getItem('userName');
        let uPhone = localStorage.getItem('userPhone');
        
        let today = new Date().toDateString();
        let count = parseInt(localStorage.getItem('dailyCount')) || 0;
        if (localStorage.getItem('tokenDate') !== today) { count = 1; localStorage.setItem('tokenDate', today); } 
        else { count++; }
        localStorage.setItem('dailyCount', count);
        let tokenNo = count.toString().padStart(2, '0');

        let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
        let items = window.cart.map((i, idx) => `*${idx+1}.* ${i.name} x ${i.qty} = ₹${i.price * i.qty}`).join('%0A');

        let message = `*ROYAL STREET KITCHEN* 👑%0A━━━━━━━━━━━━━━━%0A*Token:* %23${tokenNo}%0A*Cust:* ${uName}%0A*Mob:* ${uPhone}%0A━━━━━━━━━━━━━━━%0A*Order:*%0A${items}%0A━━━━━━━━━━━━━━━%0A*Total: ₹${total}*`;

        window.open(`https://wa.me/917489999890?text=${message}`, '_blank');
        window.cart = [];
        updateCartUI();
    };

    window.onload = () => { showTab(localStorage.getItem('activeTab') || 'home'); };
</script>
</body>
</html>
