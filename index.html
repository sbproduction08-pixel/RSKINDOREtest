    <style>
        /* --- 1. CORE THEME CONSTANTS --- */
        :root { 
            --gold: #D4AF37; 
            --black: #0a0a0a; 
            --royal-red: #3a0d0d; 
            --gold-glow: rgba(212, 175, 55, 0.6); 
            --fire: #ff4500;
            --white: #ffffff;
            --gray-text: #888888;
        }

        /* --- 2. GLOBAL RESET & BASE STYLING --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            padding: 0;
            background: var(--black); 
            background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); 
            color: var(--white); 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
            line-height: 1.6;
        }

        /* --- 3. HEADER SECTION STYLING --- */
        header { 
            padding: 30px 10px; 
            text-align: center; 
            border-bottom: 2px solid rgba(212, 175, 55, 0.3); 
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: row; 
            justify-content: space-around; 
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo-box { 
            position: relative; 
            flex-shrink: 0; 
            width: 85px; 
            height: 85px; 
        }

        .main-logo { 
            position: relative; 
            width: 75px; 
            height: 75px; 
            border-radius: 50%; 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 15px var(--gold); 
            cursor: pointer; 
            z-index: 10; 
            background: #000; 
            transition: transform 0.3s ease;
        }

        .main-logo:active {
            transform: scale(0.9);
        }
        
        .fire-motion { 
            position: absolute; 
            top: -5px; 
            left: -5px; 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            border: 3px solid var(--fire); 
            filter: blur(1px); 
            box-shadow: 0 0 15px var(--fire), inset 0 0 10px var(--fire); 
            animation: burn 3s linear infinite; 
            z-index: 5; 
        }
        
        @keyframes burn { 
            0% { transform: rotate(0deg) scale(1); opacity: 0.8; } 
            50% { transform: rotate(180deg) scale(1.1); opacity: 0.5; } 
            100% { transform: rotate(360deg) scale(1); opacity: 0.8; } 
        }

        .title-wrapper { 
            position: relative; 
            flex-grow: 1; 
            max-width: 500px; 
            display: flex; 
            justify-content: center; 
        }

        .royal-title-img { 
            width: 100%; 
            max-width: 500px; 
            filter: drop-shadow(0 0 10px var(--gold)); 
            animation: titlePulse 3s infinite ease-in-out; 
        }
        
        @keyframes titlePulse { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
        }

        /* --- 4. LOGIN & USER STATUS PANEL --- */
        .user-panel { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            margin-top: 20px; 
            min-height: 50px; 
        }

        #welcome-user { 
            color: var(--gold); 
            font-weight: 800; 
            font-size: 18px; 
            font-family: 'Marcellus', serif; 
            text-shadow: 0 0 10px var(--gold-glow);
        }
        
        #loginBtn { 
            background: linear-gradient(45deg, #8a6d3b, #D4AF37, #f1d36d); 
            color: #000; 
            border: 1px solid #5c4013; 
            padding: 12px 35px; 
            border-radius: 30px; 
            font-weight: 800; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #logoutBtn { 
            background: rgba(20, 20, 20, 0.8); 
            color: #ff4444; 
            border: 1px solid #ff4444; 
            display: none; 
            padding: 8px 25px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold;
        }

        /* --- 5. NAVIGATION BAR --- */
        .bottom-nav { 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
            width: 100%; 
            background: rgba(15, 12, 5, 0.95); 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            justify-content: space-around; 
            padding: 18px 0; 
            backdrop-filter: blur(15px); 
        }

        .nav-item { 
            color: var(--gray-text); 
            font-size: 12px; 
            text-transform: uppercase; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }

        .nav-item.active { 
            color: var(--gold); 
            border-bottom: 2px solid var(--gold); 
            padding-bottom: 2px;
        }

        /* --- 6. APP CONTENT CONTAINER --- */
        .app-container { 
            max-width: 500px; 
            margin: 0 auto; 
            min-height: 65vh; 
            padding: 20px; 
            padding-bottom: 150px; 
        }

        /* --- 7. FLOATING CHECKOUT DRAWER --- */
        #floatingCheckout { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #111; 
            border-top: 2px solid var(--gold); 
            padding: 20px; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 9999; 
            box-sizing: border-box;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        #cart-items-list {
            font-size: 11px; 
            color: var(--white); 
            margin-bottom: 10px; 
            max-height: 90px; 
            overflow-y: auto;
            border-left: 2px solid var(--gold);
            padding-left: 10px;
        }

        /* --- 8. TIMER BAR STYLING --- */
        #cancel-bar { 
            display: none; 
            background: rgba(0,0,0,0.9); 
            border: 2px solid var(--gold); 
            padding: 20px; 
            margin: 15px; 
            border-radius: 12px; 
            text-align: center;
            position: sticky;
            top: 80px;
            z-index: 3000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        /* --- 9. SOCIAL FLOATING WIDGET --- */
        #royal-social-float { 
            position: fixed; 
            right: 20px; 
            bottom: 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            z-index: 9999; 
        }

        .social-icon { 
            width: 55px; 
            height: 55px; 
            background: var(--black); 
            border: 2.5px solid var(--gold); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 0 15px var(--gold-glow); 
            text-decoration: none; 
            transition: all 0.4s ease; 
            animation: royalJump 3s infinite ease-in-out; 
        }

        .social-icon img { 
            width: 30px; 
            height: 30px; 
        }

        @keyframes royalJump { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-18px); } 
        }

        .social-icon:hover {
            transform: scale(1.1);
            background: var(--gold);
        }

        /* --- 10. SHAHI DRAWER & OVERLAY --- */
        #side-drawer { 
            position: fixed; 
            top: 0; 
            right: -300px; 
            width: 280px; 
            height: 100%; 
            background: rgba(10, 10, 10, 0.98); 
            border-left: 2px solid var(--gold); 
            z-index: 5000; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 40px 25px; 
            box-shadow: -15px 0 40px rgba(0,0,0,0.9); 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
        }

        #side-drawer.open { 
            right: 0; 
        }

        .drawer-item { 
            color: var(--white); 
            font-family: 'Marcellus', serif; 
            font-size: 19px; 
            padding: 18px; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.15); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            transition: 0.3s;
        }

        .drawer-item:hover { 
            color: var(--gold); 
            background: rgba(212, 175, 55, 0.1); 
            padding-left: 25px;
        }

        #drawer-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.75); 
            display: none; 
            z-index: 4500; 
            backdrop-filter: blur(8px); 
        }

        .footer-section { 
            text-align: center; 
            padding: 60px 20px; 
            background: linear-gradient(to bottom, #1a1a1a, #2a0a0a); 
            border-top: 3px solid var(--gold); 
            margin-top: 40px; 
            font-size: 12px;
            letter-spacing: 1px;
            color: #555;
        }

    </style>
</head>
<body>

    <script>
        /**
         * GLOBAL CONFIGURATION & STATE
         */
        window.cart = JSON.parse(localStorage.getItem('userCart')) || []; 
        let cancelInterval;
        const bridgeUrl = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';

        /**
         * TAB MANAGEMENT SYSTEM
         * Fetches HTML fragments and handles script execution
         */
        function showTab(tabId) {
            // Update Navigation Highlighting
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            const activeBtn = document.getElementById('btn-' + tabId);
            if(activeBtn) {
                activeBtn.classList.add('active');
            }
            
            // Show Loading State
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `
                <div style="text-align:center; padding:80px; color:var(--gold);">
                    <div style="font-size:30px; margin-bottom:15px;">👑</div>
                    <div style="font-weight:bold; letter-spacing:2px;">PREPARING ROYAL SECTION...</div>
                </div>
            `;
            
            // AJAX Fetch with Cache Busting
            const cacheBuster = Date.now();
            fetch('./' + tabId + '-tab.html?v=' + cacheBuster)
            .then(res => res.text())
            .then(htmlData => {
                contentArea.innerHTML = htmlData;
                updateUserUI();
                
                // Deep Script Execution Logic
                const scripts = contentArea.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => {
                        newScript.setAttribute(attr.name, attr.value);
                    });
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            })
            .catch(error => { 
                console.error("Tab Load Error:", error);
                contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>Welcome to RSK!</div>"; 
            });
            
            // Persist User Location (Dashboard is dynamic)
            if(tabId !== 'admin') {
                localStorage.setItem('activeTab', tabId);
            }
            
            // Scroll to Top Smoothly
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        /**
         * USER UI RECONCILIATION
         */
        function updateUserUI() {
            const userName = localStorage.getItem('userName');
            const welcomeMsg = document.getElementById('welcome-user');
            
            if(welcomeMsg) {
                welcomeMsg.innerHTML = userName ? "Namaste, " + userName + "! ✨" : "";
            }
            
            // Toggle Button Visibility
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const trackBtn = document.getElementById('trackBtn');
            
            if(userName) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                trackBtn.style.display = 'inline-block';
            } else {
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                trackBtn.style.display = 'none';
            }
        }

        /**
         * 🛡️ ROYAL GATEKEEPER CHECKOUT ENGINE
         /**
         * 🛡️ THE ROYAL GATEKEEPER CHECKOUT ENGINE (STRICT VERSION)
         * Performs intensive stock audit before payment/booking
         */
        window.checkout = async function() {
            // 1. Initial Validations
            const user = window.auth ? window.auth.currentUser : null;
            if(!user && !localStorage.getItem('userName')) { 
                alert("Namaste! Order karne ke liye pehle login karein."); 
                return window.registerUser(); 
            }

            const uName = localStorage.getItem('userName');
            const uPhone = localStorage.getItem('userPhone');

            if(!uPhone || uPhone === "null" || uPhone === "") {
                alert("Aapka profile adhura hai! Dashboard mein number update karein.");
                return showTab('dashboard');
            }

            // 2. Local Cart Check
            // Hum yahan window.cart use karenge jo global state mein hai
            if(!window.cart || window.cart.length === 0) {
                return alert("Aapki cart khali hai!");
            }

            const btn = document.getElementById('orderNowBtn');
            const originalBtnText = btn.innerText;
            
            // UI Lock: User ko rok do jab tak check ho raha hai
            btn.innerText = "SHAHI AUDIT... 🛡️";
            btn.disabled = true;

            try {
                console.log("Gatekeeper: Checking kitchen stock...");
                
                // --- GATEKEEPER CORE: LIVE STOCK FETCH ---
                // Humein bridgeUrl se taaza inventory mangwani hai
                const inventoryResponse = await fetch(bridgeUrl + "?action=getInventory");
                
                if (!inventoryResponse.ok) throw new Error("Network issues");
                
                const latestStockData = await inventoryResponse.json();
                console.log("Latest Kitchen Stock:", latestStockData);

                let outOfStockItems = [];

                // Re-verify each item in cart against latest data
                window.cart.forEach(cartItem => {
                    // Extract base name for (H) or (F) variants (e.g., "Tawa Chicken (H)" -> "Tawa Chicken")
                    let cleanDishName = cartItem.name.split(' (')[0].trim(); 
                    
                    // Strict Check: Agar base name ya full name 'Out' marked hai
                    if (latestStockData[cleanDishName] === "Out" || latestStockData[cartItem.name] === "Out") {
                        outOfStockItems.push(cartItem.name);
                    }
                });

                // --- GATEKEEPER BLOCKING LOGIC ---
                if (outOfStockItems.length > 0) {
                    const listStr = outOfStockItems.join('\n- ');
                    alert(`🛑 MAAF KIJIYE URVASHI!\n\nKitchen mein ye items abhi khatam ho gaye hain:\n- ${listStr}\n\nHumne inhe cart se hata diya hai. Please baki order proceed karein.`);
                    
                    // Auto-purge unavailable items from cart immediately
                    window.cart = window.cart.filter(item => !outOfStockItems.includes(item.name));
                    
                    // UI aur Storage dono refresh karo
                    updateCartUI(); 
                    
                    btn.innerText = "Order Now"; 
                    btn.disabled = false;
                    return; // ⛔ STOP: Yahan se flow terminate ho jayega. Order nahi banega.
                }

                // 3. GATEKEEPER PASSED - PROCEED TO BOOKING
                console.log("Gatekeeper: Stock Clear. Proceeding to Token...");
                btn.innerText = "PREPARING TOKEN... 👑";
                
                // Fetch next token sequence from Google Script doGet
                const tokenFetchResponse = await fetch(bridgeUrl);
                const nextTokenId = await tokenFetchResponse.text(); 
                
                if (!nextTokenId) throw new Error("Token generation failed");

                // Calculate Totals for Sheet Entry
                let totalAmount = window.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                let orderedItemsString = window.cart.map(item => `${item.name} x${item.qty}`).join(', ');

                // Final POST to Google Sheets Bridge
                const apiEndpoint = bridgeUrl + 
                    "?token=" + encodeURIComponent(nextTokenId) + 
                    "&name=" + encodeURIComponent(uName) + 
                    "&phone=" + encodeURIComponent(uPhone) + 
                    "&items=" + encodeURIComponent(orderedItemsString) + 
                    "&total=" + totalAmount + 
                    "&status=Awaiting%20Payment";

                // async post (no-cors mode handles the redirect)
                await fetch(apiEndpoint, { method: 'POST', mode: 'no-cors' });

                // 4. FINAL SUCCESS ACTIONS
                localStorage.setItem('lastTokenNo', nextTokenId);
                
                // Trigger WhatsApp Confirmation window
                let waMessageString = `*ROYAL STREET KITCHEN* 👑%0A---------------------------%0A*Token:* ${encodeURIComponent(nextTokenId)}%0A*Order:* ${encodeURIComponent(orderedItemsString)}%0A*Total: ₹${totalAmount}*%0A---------------------------%0APLEASE PROCEED WITH PAYMENT.`;
                window.open(`https://wa.me/917489999890?text=${waMessageString}`, '_blank');

                alert("Waah! Order place ho gaya hai. Token #" + nextTokenId);
                
                // Cleanup Cart
                window.cart = []; 
                localStorage.setItem('userCart', JSON.stringify([]));
                updateCartUI();
                
                // Redirect to Dashboard and start timer
                showTab('dashboard'); 
                startCancelTimer(300, true);

            } catch (apiError) {
                console.error("Booking Logic Error:", apiError);
                alert("Network slow hai ya Technical Error! Order record nahi hua. Dobara koshish karein.");
            } finally {
                btn.innerText = originalBtnText;
                btn.disabled = false;
            }
        };

        /**
         * TIMER LOGIC FOR CUSTOMER CANCELLATION
         */
        function startCancelTimer(durationInSeconds, isNewOrder = false) {
            clearInterval(cancelInterval);
            
            const timerDisplayElement = document.getElementById('timer-display');
            const cancelBarContainer = document.getElementById('cancel-bar');
            const tokenValueElement = document.getElementById('last-token');
            
            let startTimeTimestamp;
            
            if (isNewOrder) {
                startTimeTimestamp = Date.now();
                localStorage.setItem('timerStartTime', startTimeTimestamp);
            } else {
                startTimeTimestamp = parseInt(localStorage.getItem('timerStartTime'));
            }

            const currentTokenNo = localStorage.getItem('lastTokenNo');
            if(!currentTokenNo || !startTimeTimestamp) return;

            tokenValueElement.innerText = currentTokenNo;
            cancelBarContainer.style.display = 'block';

            // Timer Execution Loop
            cancelInterval = setInterval(async function () {
                let currentTimestamp = Date.now();
                let elapsedSeconds = Math.floor((currentTimestamp - startTimeTimestamp) / 1000);
                let remainingSeconds = durationInSeconds - elapsedSeconds;

                // Sync with Admin every 15 seconds to check if order is already received
                if (remainingSeconds % 15 === 0 && remainingSeconds > 0) {
                    try {
                        const adminSyncRes = await fetch(bridgeUrl + "?action=readAdmin");
                        const allOrders = await adminSyncRes.json();
                        const myLiveOrder = allOrders.find(order => order.token === currentTokenNo);
                        
                        // If order status moved beyond 'Pending/Awaiting', stop the timer
                        const blockingStatuses = ["received", "preparing", "ready", "done"];
                        if (myLiveOrder && blockingStatuses.includes(myLiveOrder.status.toLowerCase())) {
                            console.log("Admin has accepted order. Cancellation locked.");
                            stopAndHideTimer();
                            return;
                        }
                    } catch(syncErr) { 
                        console.log("Background timer sync failed..."); 
                    }
                }

                if (remainingSeconds <= 0) {
                    stopAndHideTimer();
                } else {
                    let calcMins = Math.floor(remainingSeconds / 60);
                    let calcSecs = remainingSeconds % 60;
                    
                    let minStr = calcMins < 10 ? "0" + calcMins : calcMins;
                    let secStr = calcSecs < 10 ? "0" + calcSecs : calcSecs;
                    
                    timerDisplayElement.textContent = minStr + ":" + secStr;
                }
            }, 1000);
        }

        /**
         * TIMER CLEANUP UTILITY
         */
        function stopAndHideTimer() {
            clearInterval(cancelInterval);
            const bar = document.getElementById('cancel-bar');
            if(bar) {
                bar.style.display = 'none';
            }
            localStorage.removeItem('lastTokenNo');
            localStorage.removeItem('timerStartTime');
        }

        /**
         * ORDER CANCELLATION HANDLER
         */
        window.cancelOrder = function() {
            const tokenToCancel = localStorage.getItem('lastTokenNo');
            const userNameVal = localStorage.getItem('userName');
            
            if(!tokenToCancel || !confirm("Aap ye order cancel karna chahte hain?")) {
                return;
            }
            
            const cancelPayload = new URLSearchParams();
            cancelPayload.append('token', tokenToCancel);
            cancelPayload.append('name', userNameVal);
            cancelPayload.append('status', 'Cancelled By User');

            // Send async cancellation to backend
            fetch(bridgeUrl, {
                method: 'POST',
                mode: 'no-cors', 
                body: cancelPayload.toString()
            });

            // Notify via WhatsApp
            let waCancelMsg = `*CANCELLED* ❌%0A*Token:* ${encodeURIComponent(tokenToCancel)}%0AUser cancelled the order via app.`;
            window.open(`https://wa.me/917489999890?text=${waCancelMsg}`, '_blank');

            stopAndHideTimer();
            alert("Order Cancel kar diya gaya hai.");
        };

        /**
         * 🛒 SHAHI CART ENGINE
         */
        window.addToCart = function(dishName, dishPrice) {
            // Check auth first
            if(!localStorage.getItem('userName')) {
                return window.registerUser();
            }
            
            const existingCartItem = window.cart.find(item => item.name === dishName);
            
            if (existingCartItem) { 
                existingCartItem.qty += 1; 
            } else { 
                window.cart.push({ 
                    name: dishName, 
                    price: dishPrice, 
                    qty: 1 
                }); 
            }
            updateCartUI();
        };

        window.removeFromCart = function(dishName) {
            const itemIndex = window.cart.findIndex(item => item.name === dishName);
            
            if (itemIndex > -1) { 
                if (window.cart[itemIndex].qty > 1) { 
                    window.cart[itemIndex].qty -= 1; 
                } else { 
                    window.cart.splice(itemIndex, 1); 
                } 
            }
            updateCartUI();
        };

        function updateCartUI() {
            const checkoutBar = document.getElementById('floatingCheckout');
            const itemListArea = document.getElementById('cart-items-list');
            const totalDisplay = document.getElementById('cart-total-display');
            const socialDock = document.getElementById('royal-social-float');
            
            let grandTotal = window.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            if (window.cart.length > 0) {
                // Show Cart, Hide Socials to prevent clutter
                checkoutBar.style.display = 'flex'; 
                totalDisplay.innerText = grandTotal;
                
                itemListArea.innerHTML = window.cart.map(item => `
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px; align-items:center;">
                        <span style="font-weight:bold;">${item.name} x${item.qty}</span>
                        <button onclick="window.removeFromCart('${item.name}')" 
                                style="background:rgba(255,0,0,0.1); border:1px solid red; color:red; padding:2px 8px; border-radius:50%; cursor:pointer; font-weight:bold;">
                            -
                        </button>
                    </div>
                `).join('');
                
                if(socialDock) socialDock.style.display = 'none';
            } else {
                // Hide Cart, Show Socials
                checkoutBar.style.display = 'none';
                if(socialDock) socialDock.style.display = 'flex';
            }
            
            // Sync with local storage for persistence
            localStorage.setItem('userCart', JSON.stringify(window.cart));
        }

        /**
         * HIDDEN ADMIN PORTAL ACCESS
         */
        let adminClickTracker = 0; 
        let adminTimerRef;
        
        window.handleAdminAccess = function() {
            adminClickTracker++; 
            clearTimeout(adminTimerRef);
            
            // Reset clicks if not fast enough
            adminTimerRef = setTimeout(() => { adminClickTracker = 0; }, 3000);
            
            if (adminClickTracker === 3) {
                adminClickTracker = 0;
                let securityKey = prompt("🔐 ENTER ROYAL ADMIN ACCESS KEY:");
                
                if (securityKey === "RSK@2026") { 
                    localStorage.setItem('isAdminLoggedIn', 'true');
                    showTab('admin');
                } else {
                    alert("Unauthorized Access Attempt!");
                }
            }
        };

        /**
         * DRAWER INTERFACE CONTROL
         */
        function toggleSideMenu() {
            const drawerElement = document.getElementById('side-drawer');
            const overlayElement = document.getElementById('drawer-overlay');
            
            if (drawerElement.classList.contains('open')) {
                drawerElement.classList.remove('open');
                overlayElement.style.display = 'none';
            } else {
                drawerElement.classList.add('open');
                overlayElement.style.display = 'block';
            }
        }

        /**
         * INITIALIZATION ON WINDOW LOAD
         */
        window.onload = function() { 
            // 1. Check Login State
            const adminStatus = localStorage.getItem('isAdminLoggedIn');
            let initialTab = localStorage.getItem('activeTab') || 'home';
            
            // 2. Override for Admin
            if (adminStatus === 'true') { 
                initialTab = 'admin'; 
            }
            
            // 3. Render Tab
            showTab(initialTab);
            
            // 4. Refresh Cart UI
            updateCartUI(); 
            
            // 5. Restore Timer if active
            const savedToken = localStorage.getItem('lastTokenNo');
            const savedStart = localStorage.getItem('timerStartTime');
            
            if(savedToken && savedStart) {
                startCancelTimer(300, false);
            }
        };
    </script>

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // RSK Official Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDGbHAorUN14LmXtRCd1IYzKQzP8hP02AE",
            authDomain: "rsk-test-63cee.firebaseapp.com",
            projectId: "rsk-test-63cee",
            storageBucket: "rsk-test-63cee.firebasestorage.app",
            messagingSenderId: "805798855186",
            appId: "1:805798855186:web:9b0d09decca344a9478ecb"
        };

        // Initialize Firebase Apps
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // Expose to window for button access
        window.auth = auth;

        /**
         * CUSTOM GOOGLE AUTHENTICATION FLOW
         */
        window.registerUser = async function() {
            const googleProvider = new GoogleAuthProvider();
            try {
                const loginResult = await signInWithPopup(auth, googleProvider);
                const currentUser = loginResult.user;
                
                // Check if user exists in RSK Database
                const userReference = doc(db, "users", currentUser.uid);
                const userSnapshot = await getDoc(userReference);
                
                if (!userSnapshot.exists()) {
                    // New Customer Registration
                    let whatsappInput = prompt("Namaste! Aapka WhatsApp number kya hai? (Bina +91 ke)");
                    
                    if(whatsappInput && whatsappInput.length >= 10) {
                        const newUserData = {
                            name: currentUser.displayName,
                            email: currentUser.email,
                            phone: whatsappInput,
                            preference: "Normal",
                            joinedAt: serverTimestamp()
                        };
                        
                        await setDoc(userReference, newUserData);
                        
                        // Sync Local Session
                        localStorage.setItem('userName', currentUser.displayName);
                        localStorage.setItem('userPhone', whatsappInput);
                    }
                } else {
                    // Existing Customer Login
                    const databaseData = userSnapshot.data();
                    localStorage.setItem('userName', databaseData.name);
                    localStorage.setItem('userPhone', databaseData.phone);
                }
                
                // Force Refresh UI
                location.reload();
                
            } catch (firebaseError) {
                console.error("Auth Failure:", firebaseError);
                alert("Login Error: " + firebaseError.message);
            }
        };

        /**
         * GLOBAL LOGOUT HANDLER
         */
        window.logout = async function() {
            const confirmLogout = confirm("Aap Royal Street Kitchen account se logout karna chahte hain?");
            
            if(confirmLogout) {
                try {
                    await signOut(auth);
                    localStorage.clear();
                    location.reload();
                } catch(logoutErr) {
                    alert("Logout Failed!");
                }
            }
        };
    </script>
