    <style>
        /* --- SHAHI COLOR PALETTE --- */
        :root { 
            --gold: #D4AF37; 
            --black: #0a0a0a; 
            --royal-red: #3a0d0d; 
            --gold-glow: rgba(212, 175, 55, 0.6); 
            --fire: #ff4500;
        }

        /* --- GLOBAL STYLES --- */
        body { 
            margin: 0; 
            background: var(--black); 
            background-image: radial-gradient(circle at center, var(--royal-red) 0%, var(--black) 100%); 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
        }

        /* --- HEADER & ANIMATIONS --- */
        header { 
            padding: 30px 10px; 
            text-align: center; 
            border-bottom: 2px solid rgba(212,175,55,0.3); 
            position: relative;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: row; 
            justify-content: space-around; 
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap; 
        }

        .logo-box { 
            position: relative; 
            flex-shrink: 0; 
            width: 85px; 
            height: 85px; 
        }

        .main-logo { 
            position: relative; 
            width: 75px; 
            height: 75px; 
            border-radius: 50%; 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 15px var(--gold); 
            cursor: pointer; 
            z-index: 10; 
            background: #000; 
        }
        
        .fire-motion { 
            position: absolute; 
            top: -5px; 
            left: -5px; 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            border: 3px solid var(--fire); 
            filter: blur(1px); 
            box-shadow: 0 0 15px var(--fire), inset 0 0 10px var(--fire); 
            animation: burn 3s linear infinite; 
            z-index: 5; 
        }
        
        @keyframes burn { 
            0% { transform: rotate(0deg) scale(1); opacity: 0.8; } 
            50% { transform: rotate(180deg) scale(1.1); opacity: 0.5; } 
            100% { transform: rotate(360deg) scale(1); opacity: 0.8; } 
        }

        .title-wrapper { 
            position: relative; 
            flex-grow: 1; 
            max-width: 500px; 
            display: flex; 
            justify-content: center; 
        }

        .royal-title-img { 
            width: 100%; 
            max-width: 500px; 
            filter: drop-shadow(0 0 10px var(--gold)); 
            animation: titlePulse 3s infinite ease-in-out; 
        }
        
        @keyframes titlePulse { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
        }

        /* --- USER INTERFACE --- */
        .user-panel { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            margin-top: 15px; 
            min-height: 40px; 
        }

        #welcome-user { 
            color: var(--gold); 
            font-weight: bold; 
            font-size: 17px; 
            font-family: 'Marcellus', serif; 
        }
        
        #loginBtn { 
            background: linear-gradient(45deg, #8a6d3b, #D4AF37, #f1d36d); 
            color: #000; 
            border: 1px solid #5c4013; 
            padding: 10px 30px; 
            border-radius: 30px; 
            font-weight: 800; 
            cursor: pointer; 
        }

        #logoutBtn { 
            background: rgba(20, 20, 20, 0.8); 
            color: #ff4444; 
            border: 1px solid #ff4444; 
            display: none; 
            padding: 8px 20px; 
            border-radius: 30px; 
            cursor: pointer; 
        }

        /* --- NAVIGATION --- */
        .bottom-nav { 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
            width: 100%; 
            background: rgba(15, 12, 5, 0.95); 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            justify-content: space-around; 
            padding: 15px 0; 
            backdrop-filter: blur(10px); 
        }

        .nav-item { 
            color: #888; 
            font-size: 11px; 
            text-transform: uppercase; 
            font-weight: 800; 
            cursor: pointer; 
        }

        .nav-item.active { 
            color: var(--gold); 
            border-bottom: 2px solid var(--gold); 
        }

        /* --- CANCEL BAR & ALERTS --- */
        #cancel-bar { 
            display: none; 
            background: rgba(0,0,0,0.9); 
            border: 2px solid var(--gold); 
            padding: 15px; 
            margin: 10px; 
            border-radius: 12px; 
            text-align: center;
            position: sticky;
            top: 70px;
            z-index: 3000;
        }

        /* --- APP CONTENT AREA --- */
        .app-container { 
            max-width: 500px; 
            margin: 0 auto; 
            min-height: 65vh; 
            padding: 15px; 
            padding-bottom: 120px; 
        }

        /* --- FLOATING CART --- */
        #floatingCheckout { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #1a1a1a; 
            border-top: 2px solid #D4AF37; 
            padding: 15px; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 9999; 
            box-sizing: border-box;
        }

        /* --- SOCIAL FLOATING BAR --- */
        #royal-social-float { 
            position: fixed; 
            right: 20px; 
            bottom: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            z-index: 9999; 
        }

        .social-icon { 
            width: 50px; 
            height: 50px; 
            background: var(--black); 
            border: 2px solid var(--gold); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 0 10px var(--gold-glow); 
            text-decoration: none; 
            transition: transform 0.3s; 
            animation: royalJump 3s infinite ease-in-out; 
        }

        @keyframes royalJump { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }

        /* --- SIDE DRAWER --- */
        #side-drawer { 
            position: fixed; 
            top: 0; 
            right: -280px; 
            width: 260px; 
            height: 100%; 
            background: rgba(10, 10, 10, 0.98); 
            border-left: 2px solid var(--gold); 
            z-index: 5000; 
            transition: 0.4s ease-in-out; 
            padding: 30px 20px; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.8); 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        #side-drawer.open { right: 0; }
        .drawer-item { 
            color: #fff; 
            font-family: 'Marcellus', serif; 
            font-size: 18px; 
            padding: 15px; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        #drawer-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); 
            display: none; 
            z-index: 4500; 
            backdrop-filter: blur(5px); 
        }
    </style>
</head>

    <script>
        // Global State
        window.cart = JSON.parse(localStorage.getItem('userCart')) || []; 
        let cancelInterval;
        const bridgeUrl = 'https://script.google.com/macros/s/AKfycbzW74ZcMwYcbBsXa9YTExua--mx-AiY5dLmZsde9Qqpikrtkp_8OU8rjeJhy-FQiBM/exec';

        // Tab Management System
        function showTab(tabId) {
            // Update Navigation UI
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(document.getElementById('btn-' + tabId)) document.getElementById('btn-' + tabId).classList.add('active');
            
            // Content Loading
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = "<div style='text-align:center; padding:50px; color:var(--gold);'>👑 Loading Shahi Section...</div>";
            
            fetch('./' + tabId + '-tab.html?v=' + Date.now())
            .then(res => res.text())
            .then(data => {
                contentArea.innerHTML = data;
                updateUserUI();
                
                // Re-execute scripts within the loaded tab
                const scripts = contentArea.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            })
            .catch(err => { contentArea.innerHTML = "<div style='text-align:center; padding:50px;'>Welcome!</div>"; });
            
            // Persist Tab (Except Admin)
            if(tabId !== 'admin') localStorage.setItem('activeTab', tabId);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Update User Interface based on Login Status
        function updateUserUI() {
            const userName = localStorage.getItem('userName');
            document.getElementById('welcome-user').innerHTML = userName ? "Namaste, " + userName + "! ✨" : "";
            document.getElementById('loginBtn').style.display = userName ? 'none' : 'inline-block';
            document.getElementById('logoutBtn').style.display = userName ? 'inline-block' : 'none';
            document.getElementById('trackBtn').style.display = userName ? 'inline-block' : 'none';
        }

        // --- 🛡️ THE ROYAL GATEKEEPER CHECKOUT ---
        window.checkout = async function() {
            // Pre-checks
            const user = window.auth ? window.auth.currentUser : null;
            if(!user && !localStorage.getItem('userName')) { 
                alert("Pehle Login Karein!"); 
                return window.registerUser(); 
            }

            const uName = localStorage.getItem('userName');
            const uPhone = localStorage.getItem('userPhone');
            
            if(!uPhone || uPhone === "null") { 
                alert("Profile incomplete! Dashboard mein number update karein."); 
                return showTab('dashboard'); 
            }
            
            if(window.cart.length === 0) return alert("Cart khali hai!");

            const btn = document.getElementById('orderNowBtn');
            btn.innerText = "Checking Stock... 🛡️";
            btn.disabled = true;

            try {
                // STEP 1: FRESH STOCK AUDIT (GATEKEEPER)
                const invRes = await fetch(bridgeUrl + "?action=getInventory");
                const latestStock = await invRes.json();
                let outItems = [];

                window.cart.forEach(item => {
                    // Normalize dish name for checking (H/F handles)
                    let cleanName = item.name.split(' (')[0].trim(); 
                    if (latestStock[cleanName] === "Out" || latestStock[item.name] === "Out") {
                        outItems.push(item.name);
                    }
                });

                // If items are out of stock
                if (outItems.length > 0) {
                    alert(`🛑 MAAF KIJIYE!\n\nYe items khatam ho gaye hain:\n- ${outItems.join('\n- ')}\n\nInhe hata kar dobara koshish karein.`);
                    
                    // Auto-filter cart
                    window.cart = window.cart.filter(i => !outItems.includes(i.name));
                    updateCartUI();
                    
                    btn.innerText = "Order Now"; 
                    btn.disabled = false;
                    return; 
                }

                // STEP 2: TOKEN GENERATION & BOOKING
                btn.innerText = "Booking Royal Order... 👑";
                const tokenRes = await fetch(bridgeUrl);
                const nextToken = await tokenRes.text(); 
                
                let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
                let itemsStr = window.cart.map(i => `${i.name} x${i.qty}`).join(', ');

                // Final POST to Google Sheets
                const postUrl = bridgeUrl + 
                    "?token=" + encodeURIComponent(nextToken) + 
                    "&name=" + encodeURIComponent(uName) + 
                    "&phone=" + encodeURIComponent(uPhone) + 
                    "&items=" + encodeURIComponent(itemsStr) + 
                    "&total=" + total + 
                    "&status=Awaiting%20Payment";

                await fetch(postUrl, { method: 'POST', mode: 'no-cors' });

                // SUCCESS HANDLERS
                localStorage.setItem('lastTokenNo', nextToken);
                
                // WhatsApp Trigger
                let waMsg = `*ROYAL STREET KITCHEN* 👑%0A*Token:* ${encodeURIComponent(nextToken)}%0A*Order:* ${encodeURIComponent(itemsStr)}%0A*Total: ₹${total}*`;
                window.open(`https://wa.me/917489999890?text=${waMsg}`, '_blank');

                alert("Order Confirmed! Token #" + nextToken);
                
                // Reset Cart & View
                window.cart = []; 
                updateCartUI();
                showTab('dashboard'); 
                
                // Start Order Timer
                startCancelTimer(300, true);

            } catch (err) {
                alert("Connection Error! Sheet update nahi hui.");
                console.error(err);
            } finally {
                btn.innerText = "Order Now"; 
                btn.disabled = false;
            }
        };

        // --- ORDER TIMER & SYNC ---
        function startCancelTimer(duration, isNew = false) {
            clearInterval(cancelInterval);
            const display = document.getElementById('timer-display');
            const bar = document.getElementById('cancel-bar');
            
            let startTime = isNew ? Date.now() : parseInt(localStorage.getItem('timerStartTime'));
            if (isNew) localStorage.setItem('timerStartTime', startTime);
            
            const token = localStorage.getItem('lastTokenNo');
            if(!token || !startTime) return;
            
            document.getElementById('last-token').innerText = token;
            bar.style.display = 'block';

            // Timer Loop
            cancelInterval = setInterval(async function () {
                let rem = duration - Math.floor((Date.now() - startTime) / 1000);
                
                // Status Sync every 15 seconds
                if (rem % 15 === 0) {
                    try {
                        const res = await fetch(bridgeUrl + "?action=readAdmin");
                        const orders = await res.json();
                        const myOrder = orders.find(o => o.token === token);
                        
                        // Stop timer if Admin starts preparation
                        if (myOrder && !["awaiting payment", "pending", ""].includes(myOrder.status.toLowerCase())) {
                            stopAndHideTimer(); 
                            return;
                        }
                    } catch(e) { console.log("Background sync failed..."); }
                }

                if (rem <= 0) { 
                    stopAndHideTimer(); 
                } else {
                    let m = Math.floor(rem / 60);
                    let s = rem % 60;
                    display.textContent = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                }
            }, 1000);
        }

        function stopAndHideTimer() {
            clearInterval(cancelInterval);
            document.getElementById('cancel-bar').style.display = 'none';
            localStorage.removeItem('lastTokenNo'); 
            localStorage.removeItem('timerStartTime');
        }

        // Cancel Order Action
        window.cancelOrder = function() {
            const token = localStorage.getItem('lastTokenNo');
            const name = localStorage.getItem('userName');
            
            if(!token || !confirm("Aap ye order cancel karna chahte hain?")) return;
            
            // API Call
            fetch(bridgeUrl, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: new URLSearchParams({token, name, status: 'Cancelled By User'}).toString() 
            });
            
            // WhatsApp Alert
            window.open(`https://wa.me/917489999890?text=*CANCELLED* ❌%0A*Token:* ${encodeURIComponent(token)}`, '_blank');
            
            stopAndHideTimer(); 
            alert("Order Cancel Ho Gaya!");
        };

        // --- CART ENGINE ---
        window.addToCart = function(name, price) {
            if(!localStorage.getItem('userName')) return window.registerUser();
            const existing = window.cart.find(item => item.name === name);
            if (existing) { 
                existing.qty += 1; 
            } else { 
                window.cart.push({ name, price, qty: 1 }); 
            }
            updateCartUI();
        };

        window.removeFromCart = function(name) {
            const idx = window.cart.findIndex(i => i.name === name);
            if (idx > -1) { 
                if (window.cart[idx].qty > 1) { 
                    window.cart[idx].qty -= 1; 
                } else { 
                    window.cart.splice(idx, 1); 
                } 
            }
            updateCartUI();
        };

        function updateCartUI() {
            const bar = document.getElementById('floatingCheckout');
            const listDisp = document.getElementById('cart-items-list');
            const totalDisp = document.getElementById('cart-total-display');
            
            let total = window.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            
            if (window.cart.length > 0) {
                bar.style.display = 'flex'; 
                totalDisp.innerText = total;
                listDisp.innerHTML = window.cart.map(i => `
                    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                        <span>${i.name} x${i.qty}</span>
                        <button onclick="window.removeFromCart('${i.name}')" style="background:none;border:none;color:red;font-weight:bold;cursor:pointer;">-</button>
                    </div>`).join('');
                document.getElementById('royal-social-float').style.display = 'none';
            } else {
                bar.style.display = 'none'; 
                document.getElementById('royal-social-float').style.display = 'flex';
            }
            localStorage.setItem('userCart', JSON.stringify(window.cart));
        }

        // --- ADMIN ACCESS LOGIC ---
        window.handleAdminAccess = function() {
            window.adminClicks = (window.adminClicks || 0) + 1;
            setTimeout(() => window.adminClicks = 0, 3000);
            if (window.adminClicks === 3) {
                if (prompt("Royal Admin Key:") === "RSK@2026") { 
                    localStorage.setItem('isAdminLoggedIn', 'true'); 
                    showTab('admin'); 
                }
            }
        };

        // UI Helpers
        function toggleSideMenu() {
            const drawer = document.getElementById('side-drawer');
            const overlay = document.getElementById('drawer-overlay');
            drawer.classList.toggle('open');
            overlay.style.display = drawer.classList.contains('open') ? 'block' : 'none';
        }

        // Page Load Initialization
        window.onload = () => {
            let tab = localStorage.getItem('isAdminLoggedIn') === 'true' ? 'admin' : (localStorage.getItem('activeTab') || 'home');
            showTab(tab); 
            updateCartUI();
            if(localStorage.getItem('lastTokenNo')) startCancelTimer(300, false);
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDGbHAorUN14LmXtRCd1IYzKQzP8hP02AE", 
            authDomain: "rsk-test-63cee.firebaseapp.com", 
            projectId: "rsk-test-63cee", 
            storageBucket: "rsk-test-63cee.firebasestorage.app", 
            messagingSenderId: "805798855186", 
            appId: "1:805798855186:web:9b0d09decca344a9478ecb" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        window.auth = auth;

        // Firebase Google Login
        window.registerUser = async function() {
            try {
                const res = await signInWithPopup(auth, new GoogleAuthProvider());
                const user = res.user;
                const uDoc = await getDoc(doc(db, "users", user.uid));
                
                if (!uDoc.exists()) {
                    let phone = prompt("Namaste! Aapka WhatsApp number kya hai?");
                    if(phone && phone.length >= 10) {
                        await setDoc(doc(db, "users", user.uid), { 
                            name: user.displayName, 
                            email: user.email, 
                            phone: phone, 
                            joinedAt: serverTimestamp() 
                        });
                        localStorage.setItem('userName', user.displayName); 
                        localStorage.setItem('userPhone', phone);
                    }
                } else {
                    const data = uDoc.data();
                    localStorage.setItem('userName', data.name); 
                    localStorage.setItem('userPhone', data.phone);
                }
                location.reload();
            } catch (e) { alert("Login failed: " + e.message); }
        };

        // Firebase Logout
        window.logout = async () => { 
            if(confirm("Royal Account se Logout karein?")) { 
                await signOut(auth); 
                localStorage.clear(); 
                location.reload(); 
            } 
        };
    </script>

</body>
</html>
