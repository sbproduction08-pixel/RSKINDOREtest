<div class="paigaam-wrapper" style="animation: royalEntrance 1s ease-out; padding: 10px;">
    
    <style>
        /* Royal Background & Border */
        .royal-envelope {
            background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%);
            border: 2px solid #D4AF37;
            border-radius: 20px;
            padding: 30px 15px;
            position: relative;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15), inset 0 0 20px rgba(212, 175, 55, 0.05);
            overflow: hidden;
        }

        /* Decorative Corners */
        .royal-envelope::before, .royal-envelope::after {
            content: "👑";
            position: absolute;
            font-size: 20px;
            opacity: 0.4;
        }
        .royal-envelope::before { top: 10px; left: 10px; }
        .royal-envelope::after { bottom: 10px; right: 10px; }

        /* Typography */
        .paigaam-title {
            font-family: 'Marcellus', serif;
            color: #D4AF37;
            font-size: 28px;
            letter-spacing: 5px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .paigaam-subtitle {
            font-family: 'Poppins', sans-serif;
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Golden Divider */
        .royal-divider {
            height: 1px;
            width: 60%;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            margin: 0 auto 30px auto;
        }

        /* Animation */
        @keyframes royalEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Trustindex Customization Overlay */
        #trustindex-wrapper {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            min-height: 250px;
        }
    </style>

    <div class="royal-envelope">
        <div class="paigaam-title">PAIGAAM</div>
        <div class="paigaam-subtitle">Muntazir-e-Khaas (Awaiting your words)</div>
        
        <div class="royal-divider"></div>

        <p style="color: #eee; font-size: 14px; line-height: 1.6; margin-bottom: 25px; font-style: italic;">
            "Aapki rai hamare liye kisi tohfe se kam nahi. Kripya apne shahi anubhav ko duniya ke saath saajha karein."
        </p>

        <div id="trustindex-wrapper">
            <script defer async src='https://cdn.trustindex.io/loader.js?63390da67d48201047069d19ae7'></script>
        </div>

        <div style="margin-top: 30px; opacity: 0.6;">
            <img src="royalstreetkitchen.png" style="width: 80px; filter: grayscale(1) brightness(2);">
            <p style="font-size: 9px; color: #D4AF37; margin-top: 10px; letter-spacing: 2px;">
                SHAHI MEHMAN-NAWAZI • RSK INDORE
            </p>
        </div>
    </div>
</div>
