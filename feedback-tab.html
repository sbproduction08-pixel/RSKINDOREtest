<div class="paigaam-wrapper" style="animation: royalEntrance 1s ease-out; padding: 10px;">
    
    <style>
        .royal-envelope {
            background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%);
            border: 2px solid #D4AF37;
            border-radius: 20px;
            padding: 40px 20px;
            position: relative;
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.2);
            text-align: center;
            overflow: hidden;
        }

        /* --- JO AAPNE KAHA: LEFT SIDE BRANDING WITH CROWN --- */
        .left-royal-label {
            position: absolute;
            left: -45px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.4;
        }

        .label-text {
            color: #D4AF37;
            font-family: 'Marcellus', serif;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .label-crown {
            color: #D4AF37;
            font-size: 14px;
            transform: rotate(90deg); /* Crown ko seedha rakhne ke liye */
        }

        .paigaam-title {
            font-family: 'Marcellus', serif;
            color: #D4AF37;
            font-size: 30px;
            letter-spacing: 6px;
            margin-bottom: 5px;
        }

        .paigaam-subtitle {
            font-family: 'Poppins', sans-serif;
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 35px;
            display: block;
        }

        /* --- 100% WORKING GOOGLE REVIEW BUTTON --- */
        .shahi-btn {
            background: linear-gradient(45deg, #D4AF37, #8a6d3b);
            color: #000;
            border: 1px solid #000;
            padding: 16px 35px;
            border-radius: 40px;
            font-weight: 800;
            font-family: 'Marcellus', serif;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 40px;
            transition: 0.3s;
            position: relative;
            z-index: 100;
        }

        .shahi-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); }

        /* Trustindex Text Color Fix */
        .ti-widget.ti-google .ti-review-text, 
        .ti-widget.ti-google .ti-name, 
        .ti-widget.ti-google .ti-date,
        .ti-widget.ti-google .ti-header .ti-text,
        .ti-widget.ti-google .ti-rating-num {
            color: #ffffff !important;
        }

        .ti-widget.ti-google .ti-stars .ti-star.f {
            color: #D4AF37 !important;
        }

        @keyframes royalEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <div class="royal-envelope">
        <div class="left-royal-label">
            <span class="label-crown">👑</span>
            <span class="label-text">ROYAL STREET KITCHEN</span>
        </div>
        
        <span class="paigaam-subtitle">Muntazir-e-Khaas</span>
        <div class="paigaam-title">PAIGAAM</div>
        
        <div style="height: 1.5px; width: 40%; background: linear-gradient(90deg, transparent, #D4AF37, transparent); margin: 15px auto 35px auto;"></div>

        <a href="https://search.google.com/local/writereview?placeid=ChIJidkS38T4YjkRZ17fW3G8kQo" target="_blank" class="shahi-btn">
            WRITE A REVIEW ON GOOGLE 👑
        </a>

        <div id="trustindex-display" style="min-height: 250px;">
            <script defer async src='https://cdn.trustindex.io/loader.js?63390da67d48201047069d19ae7'></script>
        </div>

        <div style="margin-top: 30px; opacity: 0.3;">
            <p style="font-size: 10px; color: #D4AF37; letter-spacing: 4px;">ESTD 2026 • INDORE</p>
        </div>
    </div>
</div>
